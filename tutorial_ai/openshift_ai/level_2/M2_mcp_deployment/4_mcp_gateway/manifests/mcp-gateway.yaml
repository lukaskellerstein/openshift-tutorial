# MCP Gateway deployment
# Deploys the Envoy-based MCP Gateway that federates multiple MCP servers
#
# The MCP Gateway is part of Red Hat Connectivity Link (Technology Preview)
# CRDs: mcp.kuadrant.io/v1alpha1
# Upstream: github.com/Kuadrant/mcp-gateway
#
# Prerequisites:
# 1. Red Hat Connectivity Link operator installed (or upstream Kuadrant)
# 2. Gateway API CRDs installed (built-in on OpenShift 4.19+)
# 3. An Envoy-based Gateway resource exists
---
# Gateway API Gateway with an MCP listener
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: mcp-servers
  labels:
    app: mcp-gateway
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  gatewayClassName: istio  # Or the gateway class for your environment
  listeners:
    - name: mcp
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: mcp-gateway-tls
            kind: Secret
---
# MCPGatewayExtension: Extends the Gateway with MCP protocol capabilities
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-extension
  namespace: mcp-servers
  labels:
    app: mcp-gateway
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    namespace: mcp-servers
    sectionName: mcp  # Must match the Gateway listener name

  # Health check interval for backend MCP servers (seconds)
  backendPingIntervalSeconds: 60
---
# HTTPRoute for the ShopInsights MCP server
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shopinsights-mcp-route
  namespace: mcp-servers
  labels:
    app: mcp-gateway
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: mcp-servers
      sectionName: mcp
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: shopinsights-mcp
          port: 8080
---
# MCPServerRegistration: Register the ShopInsights MCP server with the gateway
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: shopinsights-registration
  namespace: mcp-servers
  labels:
    app: mcp-gateway
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  # Prefix namespaces tool names to avoid collisions (e.g., "list_products" -> "shop_list_products")
  prefix: "shop_"

  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: shopinsights-mcp-route
    namespace: mcp-servers
---
# HTTPRoute for the OpenShift MCP server
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-route
  namespace: mcp-servers
  labels:
    app: mcp-gateway
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: mcp-servers
      sectionName: mcp
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: openshift-mcp-server
          port: 8080
---
# MCPServerRegistration: Register the OpenShift MCP server with the gateway
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: openshift-registration
  namespace: mcp-servers
  labels:
    app: mcp-gateway
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  prefix: "ocp_"

  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: openshift-mcp-route
    namespace: mcp-servers
