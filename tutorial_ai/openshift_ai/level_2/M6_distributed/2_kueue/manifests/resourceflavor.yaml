# ResourceFlavors define hardware types available in the cluster.
# Each flavor maps to nodes via labels, so Kueue can direct
# admitted workloads to the correct hardware.
#
# Resources created:
#   - ResourceFlavor: gpu-nvidia (nodes with NVIDIA GPUs)
#   - ResourceFlavor: cpu-only (any node without GPU requirements)

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-nvidia
  labels:
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  # nodeLabels maps this flavor to nodes with NVIDIA GPUs.
  # When a workload is admitted using this flavor, Kueue adds
  # these labels as a nodeSelector to the pod spec.
  nodeLabels:
    nvidia.com/gpu.present: "true"

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: cpu-only
  labels:
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  # No nodeLabels --- matches any node.
  # Use this flavor for CPU-only workloads that do not need GPU hardware.
  nodeLabels: {}
