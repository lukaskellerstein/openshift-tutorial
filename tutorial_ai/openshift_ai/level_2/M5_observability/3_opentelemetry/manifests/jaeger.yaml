# Jaeger all-in-one -- trace storage and visualization UI
# Receives traces from the OpenTelemetry Collector and provides a web UI
# for exploring distributed traces across inference requests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
        tutorial-level: "2"
        tutorial-module: "M5"
    spec:
      containers:
        - name: jaeger
          image: quay.io/jaegertracing/all-in-one:1.62
          ports:
            - containerPort: 16686
              name: ui
              protocol: TCP
            - containerPort: 14268
              name: collector-http
              protocol: TCP
            - containerPort: 4317
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318
              name: otlp-http
              protocol: TCP
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    app: jaeger
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      protocol: TCP
    - name: collector-http
      port: 14268
      targetPort: 14268
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: jaeger-ui
  labels:
    app: jaeger
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  to:
    kind: Service
    name: jaeger
  port:
    targetPort: ui
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
