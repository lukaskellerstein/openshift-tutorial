apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM Embedding Model ServingRuntime for KServe
    opendatahub.io/template-name: vllm-embedding-runtime
    openshift.io/display-name: Nomic Embed Text v1.5 vLLM Runtime
  labels:
    opendatahub.io/dashboard: "true"
  name: nomic-embed-text-v1-5
  namespace: rag-tutorial
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - args:
        - --port=8080
        - --model=nomic-ai/nomic-embed-text-v1.5
        - --served-model-name={{.Name}}
        - --dtype=half
        - --max-model-len=8192
        - --enforce-eager
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/hf_home
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: VLLM_CACHE_DIR
          value: /tmp/.cache/vllm
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: TRANSFORMERS_OFFLINE
          value: "0"
        - name: NUMBA_CACHE_DIR
          value: /tmp/numba_cache
        - name: TRITON_CACHE_DIR
          value: /tmp/.triton
      image: docker.io/vllm/vllm-openai:v0.8.5
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
