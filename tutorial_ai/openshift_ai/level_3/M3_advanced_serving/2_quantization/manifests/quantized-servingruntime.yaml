# ServingRuntime for FP8-quantized model
# Uses the standard vLLM image -- vLLM auto-detects the compressed-tensors format
# Compare with the full-precision runtime in level_1/M2_model_serving/2_deploying_gemma/
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM FP8 Quantized Runtime
    opendatahub.io/template-name: vllm-fp8-runtime
    openshift.io/display-name: Granite 3.3 8B FP8 Runtime
  labels:
    opendatahub.io/dashboard: "true"
    tutorial-level: "3"
    tutorial-module: "M3"
  name: granite-3-3-8b-fp8
  namespace: quantized-models
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - args:
        - --port=8080
        - --model=RedHatAI/granite-3.3-8b-instruct-FP8-dynamic
        - --served-model-name={{.Name}}
        - --dtype=auto
        - --max-model-len=8192
        - --gpu-memory-utilization=0.95
        - --enforce-eager
        - --quantization=fp8
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/hf_home
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: VLLM_CACHE_DIR
          value: /tmp/.cache/vllm
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: TRANSFORMERS_OFFLINE
          value: "0"
        - name: NUMBA_CACHE_DIR
          value: /tmp/numba_cache
        - name: TRITON_CACHE_DIR
          value: /tmp/.triton
      image: quay.io/modh/vllm:stable
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
