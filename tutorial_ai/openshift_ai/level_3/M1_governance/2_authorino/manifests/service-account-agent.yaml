# ServiceAccount for AI agents that call model inference endpoints
#
# This ServiceAccount represents an internal AI agent, pipeline step,
# or orchestrator that needs to authenticate to the Gemma4-e4b model
# endpoint via Authorino's Kubernetes TokenReview method.
#
# To generate a short-lived token for this ServiceAccount:
#   oc create token agent-inference-client \
#     -n gemma-model \
#     --audience="https://kubernetes.default.svc" \
#     --duration=1h
#
# To use this SA in a pod, set spec.serviceAccountName in your pod spec.
# For projected token volumes with custom audiences, see the lesson README.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-inference-client
  namespace: gemma-model
  labels:
    app: agent-inference-client
    opendatahub.io/component: inference-client
    tutorial-level: "3"
    tutorial-module: "M1"
  annotations:
    description: "ServiceAccount for AI agents that need to call model inference endpoints"
    kubernetes.io/enforce-mountable-secrets: "true"
