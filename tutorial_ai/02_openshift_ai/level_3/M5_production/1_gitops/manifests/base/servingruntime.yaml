# Base ServingRuntime for vLLM (Gemma 4 E4B)
#
# Defines the vLLM container configuration shared across all environments.
# Overlays patch the --max-model-len, --gpu-memory-utilization, and logging
# args for each environment.
#
# Sync wave 1: deploys before InferenceService (wave 2).
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM NVIDIA GPU ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cuda-runtime-template
    openshift.io/display-name: Gemma 4 E4B vLLM Runtime
    argocd.argoproj.io/sync-wave: "1"
  labels:
    opendatahub.io/dashboard: "true"
  name: gemma-4-e4b
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - args:
        - --port=8080
        - --model=google/gemma-4-E4B-it
        - --served-model-name={{.Name}}
        - --dtype=half
        - --max-model-len=8192
        - --gpu-memory-utilization=0.95
        - --enforce-eager
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/hf_home
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: VLLM_CACHE_DIR
          value: /tmp/.cache/vllm
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: TRANSFORMERS_OFFLINE
          value: "0"
        - name: NUMBA_CACHE_DIR
          value: /tmp/numba_cache
        - name: TRITON_CACHE_DIR
          value: /tmp/.triton
      image: docker.io/vllm/vllm-openai:gemma4
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
