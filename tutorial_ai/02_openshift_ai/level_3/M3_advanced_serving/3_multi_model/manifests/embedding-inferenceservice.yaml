# ServingRuntime and InferenceService for an embedding model
# Uses vLLM with --task embedding for the /v1/embeddings endpoint
#
# Embedding models convert text into dense vector representations
# used for semantic search, RAG retrieval, and similarity matching.
# vLLM serves embedding models via the same OpenAI-compatible API
# but on the /v1/embeddings endpoint instead of /v1/chat/completions.
#
# The --task=embedding flag tells vLLM to load the model in
# embedding mode rather than generative mode.
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM Embedding Runtime
    openshift.io/display-name: Nomic Embed v1.5 Runtime
  labels:
    opendatahub.io/dashboard: "true"
    tutorial-level: "3"
    tutorial-module: "M3"
  name: nomic-embed
  namespace: multi-model-serving
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - args:
        - --port=8080
        - --model=nomic-ai/nomic-embed-text-v1.5
        - --served-model-name={{.Name}}
        - --task=embedding
        - --dtype=half
        - --max-model-len=8192
        - --enforce-eager
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /tmp/hf_home
        - name: XDG_CACHE_HOME
          value: /tmp/.cache
        - name: HF_HUB_OFFLINE
          value: "0"
        - name: TRANSFORMERS_OFFLINE
          value: "0"
      image: quay.io/modh/vllm:stable
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    openshift.io/display-name: Nomic Embed v1.5
    serving.kserve.io/deploymentMode: RawDeployment
    security.opendatahub.io/enable-auth: "false"
    opendatahub.io/model-type: embedding
  labels:
    opendatahub.io/dashboard: "true"
    tutorial-level: "3"
    tutorial-module: "M3"
  name: nomic-embed
  namespace: multi-model-serving
spec:
  predictor:
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "2"
          memory: 8Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "1"
          memory: 4Gi
          nvidia.com/gpu: "1"
      runtime: nomic-embed
