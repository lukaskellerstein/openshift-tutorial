# Grafana dashboard ConfigMap for vLLM serving metrics
# In OpenShift, dashboards labeled with console.openshift.io/dashboard=true
# are picked up by the console's monitoring UI.
# For standalone Grafana instances, use the grafana_dashboard label instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-grafana-dashboard
  labels:
    app: vllm-serving
    tutorial-level: "1"
    tutorial-module: "M5"
    # Label for OpenShift console dashboard discovery
    console.openshift.io/dashboard: "true"
    # Label for Grafana sidecar dashboard discovery (if using Grafana Operator)
    grafana_dashboard: "1"
data:
  vllm-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Comprehensive monitoring dashboard for vLLM model serving on OpenShift AI. Tracks latency, throughput, cache utilization, and request queue metrics.",
      "editable": true,
      "gnetId": null,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Request Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(vllm:request_success_total[5m])) + sum(rate(vllm:request_failure_total[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "none"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Running Requests",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(vllm:num_requests_running)",
              "legendFormat": "running",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "unit": "none"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Waiting Requests",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(vllm:num_requests_waiting)",
              "legendFormat": "waiting",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.8 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "KV Cache Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "vllm:kv_cache_usage_perc",
              "legendFormat": "kv_cache",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.85 },
                  { "color": "red", "value": 0.95 }
                ]
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "GPU Cache Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "gpu_cache",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Error Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(vllm:request_failure_total[5m])) / (sum(rate(vllm:request_success_total[5m])) + sum(rate(vllm:request_failure_total[5m])))",
              "legendFormat": "error_rate",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Latency",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 6 },
          "id": 10,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Time to First Token (TTFT)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.90, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p90",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 6 },
          "id": 11,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Inter-Token Latency (ITL)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(vllm:inter_token_latency_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.90, rate(vllm:inter_token_latency_seconds_bucket[5m]))",
              "legendFormat": "p90",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(vllm:inter_token_latency_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
          "id": 12,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "End-to-End Request Latency",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(vllm:e2e_request_latency_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.90, rate(vllm:e2e_request_latency_seconds_bucket[5m]))",
              "legendFormat": "p90",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(vllm:e2e_request_latency_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Throughput",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 20,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Token Throughput (tokens/sec)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(vllm:prompt_tokens_total[5m]))",
              "legendFormat": "Prompt tokens/s",
              "refId": "A"
            },
            {
              "expr": "sum(rate(vllm:generation_tokens_total[5m]))",
              "legendFormat": "Generation tokens/s",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 21,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Request Rate (success vs failure)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(vllm:request_success_total[5m]))",
              "legendFormat": "Success",
              "refId": "A"
            },
            {
              "expr": "sum(rate(vllm:request_failure_total[5m]))",
              "legendFormat": "Failure",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Cache and Queue",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 24 },
          "id": 30,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "KV Cache Usage Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "vllm:kv_cache_usage_perc",
              "legendFormat": "KV Cache %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 24 },
          "id": 31,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "GPU Cache Usage Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "GPU Cache %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 24 },
          "id": 32,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Running vs Waiting Requests",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(vllm:num_requests_running)",
              "legendFormat": "Running",
              "refId": "A"
