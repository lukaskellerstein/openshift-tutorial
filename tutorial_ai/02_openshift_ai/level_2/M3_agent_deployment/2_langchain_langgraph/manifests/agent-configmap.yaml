apiVersion: v1
kind: ConfigMap
metadata:
  name: langgraph-agent-config
  labels:
    app: langgraph-agent
    tutorial-level: "2"
    tutorial-module: "M3"
data:
  # vLLM inference endpoint (OpenAI-compatible API)
  VLLM_ENDPOINT: "http://vllm-server:8000/v1"
  # Model name served by vLLM
  VLLM_MODEL_NAME: "granite-3.3-8b-instruct"
  # MCP server URLs -- JSON array of {url, transport} objects
  # Adjust these to match your deployed MCP servers from L2-M2
  MCP_SERVERS: '[{"url": "http://mcp-gateway:8080/sse", "transport": "sse"}]'
  # Application log level
  LOG_LEVEL: "INFO"
