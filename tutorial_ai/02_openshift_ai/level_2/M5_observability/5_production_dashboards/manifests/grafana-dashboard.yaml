# Unified AI platform Grafana dashboard ConfigMap
# Combines vLLM inference, GPU (DCGM), agent/pipeline, and TrustyAI metrics
# into a single production monitoring view.
# Labels enable auto-discovery by Grafana sidecar and the OpenShift console.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-dashboard
  labels:
    app: ai-platform-dashboard
    tutorial-level: "2"
    tutorial-module: "M5"
    # Label for OpenShift console dashboard discovery
    console.openshift.io/dashboard: "true"
    # Label for Grafana sidecar dashboard discovery (if using Grafana Operator)
    grafana_dashboard: "1"
data:
  ai-platform-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Unified production dashboard for the OpenShift AI platform. Monitors inference performance (vLLM), GPU resources (DCGM), agent and pipeline health, and TrustyAI fairness metrics.",
      "editable": true,
      "gnetId": null,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Inference Performance",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Request Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(vllm:request_success_total[5m])) + sum(rate(vllm:request_failure_total[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Error Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(vllm:request_failure_total[5m])) / (sum(rate(vllm:request_success_total[5m])) + sum(rate(vllm:request_failure_total[5m])))",
              "legendFormat": "error_rate",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.8 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "KV Cache Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "kv_cache",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 5 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Time to First Token (TTFT)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.90, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p90",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 5 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Time Per Output Token (TPOT)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(vllm:time_per_output_token_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.90, rate(vllm:time_per_output_token_seconds_bucket[5m]))",
              "legendFormat": "p90",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(vllm:time_per_output_token_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 5 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Token Throughput (tokens/sec)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(vllm:prompt_tokens_total[5m]))",
              "legendFormat": "Prompt tokens/s",
              "refId": "A"
            },
            {
              "expr": "sum(rate(vllm:generation_tokens_total[5m]))",
              "legendFormat": "Generation tokens/s",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Request Queue Depth",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(vllm:num_requests_running)",
              "legendFormat": "Running",
              "refId": "A"
            },
            {
              "expr": "sum(vllm:num_requests_waiting)",
              "legendFormat": "Waiting",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "id": 200,
          "title": "GPU Resources",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 100,
              "min": 0,
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 14 },
          "id": 10,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "GPU Utilization",
          "type": "timeseries",
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{namespace=\"my-ai-project\"}",
              "legendFormat": "GPU {{gpu}} ({{pod}})",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "decmbytes"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 14 },
          "id": 11,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "GPU Memory (Used vs Total)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{namespace=\"my-ai-project\"}",
              "legendFormat": "Used - GPU {{gpu}}",
              "refId": "A"
            },
            {
              "expr": "DCGM_FI_DEV_FB_USED{namespace=\"my-ai-project\"} + DCGM_FI_DEV_FB_FREE{namespace=\"my-ai-project\"}",
              "legendFormat": "Total - GPU {{gpu}}",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "celsius"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 14 },
          "id": 12,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "GPU Temperature",
          "type": "timeseries",
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{namespace=\"my-ai-project\"}",
              "legendFormat": "GPU {{gpu}} ({{pod}})",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "watt"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 14 },
          "id": 13,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "GPU Power Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{namespace=\"my-ai-project\"}",
              "legendFormat": "GPU {{gpu}} ({{pod}})",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "id": 300,
          "title": "Agent & Pipeline",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 23 },
          "id": 20,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Agent Trace Duration",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(mlflow_trace_duration_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.90, rate(mlflow_trace_duration_seconds_bucket[5m]))",
              "legendFormat": "p90",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(mlflow_trace_duration_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 23 },
          "id": 21,
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Pipeline Runs by Status",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (status) (kfp_pipeline_run_status{namespace=\"my-ai-project\"})",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 23 },
          "id": 22,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "Registered Model Versions",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(model_registry_registered_models{namespace=\"my-ai-project\"})",
              "legendFormat": "Models",
              "refId": "A"
            },
            {
              "expr": "sum(model_registry_model_versions{namespace=\"my-ai-project\"})",
              "legendFormat": "Versions",
              "refId": "B"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "id": 400,
          "title": "TrustyAI",
          "type": "row"
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              },
              "custom.thresholdsStyle": { "mode": "line" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 32 },
          "id": 30,
          "options": {
            "legend": { "calcs": ["mean", "lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Statistical Parity Difference (SPD)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "trustyai_spd{namespace=\"my-ai-project\"}",
              "legendFormat": "SPD - {{model}} ({{attribute}})",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.8 },
                  { "color": "red", "value": 1.25 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 32 },
          "id": 31,
          "options": {
            "legend": { "calcs": ["mean", "lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Disparate Impact Ratio (DIR)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "trustyai_dir{namespace=\"my-ai-project\"}",
              "legendFormat": "DIR - {{model}} ({{attribute}})",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "${datasource}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.1 },
                  { "color": "red", "value": 0.2 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 32 },
          "id": 32,
          "options": {
            "legend": { "calcs": ["mean", "lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Data Drift Score",
          "type": "timeseries",
          "targets": [
            {
              "expr": "trustyai_meanshift{namespace=\"my-ai-project\"}",
              "legendFormat": "Drift - {{model}} ({{feature}})",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["openshift-ai", "ai-platform", "vllm", "gpu", "dcgm", "trustyai", "production"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Data Source",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "queryValue": "",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "AI Platform -- Production Dashboard",
      "uid": "ai-platform-production",
      "version": 1
    }
