# PostgreSQL with pgvector extension for vector similarity search.
# Deploys a single-replica PostgreSQL instance with the pgvector extension
# pre-installed, backed by persistent storage.
#
# Resources created:
#   - Secret (database credentials)
#   - PersistentVolumeClaim (data persistence)
#   - Deployment (PostgreSQL + pgvector container)
#   - Service (cluster-internal access on port 5432)

---
apiVersion: v1
kind: Secret
metadata:
  name: pgvector-credentials
  labels:
    app: pgvector
    tutorial-level: "2"
    tutorial-module: "M1"
type: Opaque
stringData:
  POSTGRES_DB: vectordb
  POSTGRES_USER: vectoruser
  POSTGRES_PASSWORD: vectorpass

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgvector-data
  labels:
    app: pgvector
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgvector
  labels:
    app: pgvector
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
        tutorial-level: "2"
        tutorial-module: "M1"
    spec:
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pgvector-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pgvector-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector-credentials
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgvector-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: pgvector-storage
          persistentVolumeClaim:
            claimName: pgvector-data

---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  labels:
    app: pgvector
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  selector:
    app: pgvector
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
