# PeerAuthentication — enforces strict mTLS for all services in the namespace
# With STRICT mode, plaintext traffic between meshed services is rejected.
# Any pod without a sidecar will not be able to call meshed services.
# In upstream Istio this resource works the same way — standard Istio API.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: shopinsights
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "03"
spec:
  mtls:
    mode: STRICT
