# NetworkPolicy — restricts ingress to ShopInsights pods
# Defense in depth: even with mTLS, restrict which pods can establish connections.
#
# This policy allows:
#   1. ShopInsights pods to communicate with each other (app: shopinsights)
#   2. Istio control plane (istio-system) to reach sidecars for config and telemetry
#   3. OpenShift ingress controller to reach pods exposed via Routes
# All other ingress traffic is denied.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shopinsights-mesh-policy
  namespace: shopinsights
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "03"
spec:
  podSelector:
    matchLabels:
      app: shopinsights
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from other ShopInsights pods (inter-service communication)
    - from:
        - podSelector:
            matchLabels:
              app: shopinsights
      ports:
        - protocol: TCP
          port: 8080
    # Allow Istio control plane (istiod, telemetry) to reach sidecars
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    # Allow OpenShift router (HAProxy) to reach pods exposed via Routes
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
