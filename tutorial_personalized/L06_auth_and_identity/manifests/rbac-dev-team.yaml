# RoleBinding: grant dev-user the "edit" ClusterRole on shopinsights-dev
# The "edit" role allows creating, modifying, and deleting most resources
# (Deployments, Services, ConfigMaps, etc.) but does NOT allow managing
# RBAC (no creating RoleBindings) or resource quotas
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-edit
  namespace: shopinsights-dev
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "06"
subjects:
  - kind: User
    name: dev-user
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
