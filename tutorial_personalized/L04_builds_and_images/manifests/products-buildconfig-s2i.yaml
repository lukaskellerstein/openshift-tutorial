# BuildConfig using Source-to-Image (S2I) strategy
# Builds the Products Service from source using the python:3.11-ubi9 builder image
# No Dockerfile needed — S2I detects pyproject.toml / requirements.txt and installs dependencies
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: products-service-s2i
  labels:
    app: shopinsights
    component: products-service
    tutorial: personalized
    lesson: "04"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/lukaskellerstein/openshift-tutorial.git
    contextDir: tutorial_personalized/shared_app/products-service
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: openshift
        name: python:3.11-ubi9
  output:
    to:
      kind: ImageStreamTag
      name: products-service:latest
  triggers:
    - type: ConfigChange
