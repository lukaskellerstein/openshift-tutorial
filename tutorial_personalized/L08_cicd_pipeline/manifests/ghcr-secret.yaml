# Secret for GitHub Container Registry authentication
# Replace <BASE64_DOCKERCONFIGJSON> with your actual credentials
# Or use the setup script: scripts/setup-ghcr-credentials.sh
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-credentials
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "08"
  annotations:
    tekton.dev/docker-0: https://ghcr.io
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_DOCKERCONFIGJSON>
