# Task: Build a container image with buildah and push to GHCR
# Runs as non-root — requires the pipeline ServiceAccount to have
# the ghcr-credentials secret linked for registry authentication
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-ghcr
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "08"
spec:
  description: Build a container image with buildah and push to GitHub Container Registry
  params:
    - name: context-dir
      type: string
      description: >
        Path to the build context relative to the workspace root
        (e.g., repo/shared_app/products-service)
    - name: image-name
      type: string
      description: >
        Full image reference including registry and tag
        (e.g., ghcr.io/lukaskellerstein/shopinsights-products:v1.0)
    - name: dockerfile
      type: string
      description: Name of the Dockerfile to build
      default: Dockerfile
  workspaces:
    - name: source
      description: The workspace containing the source code
  steps:
    - name: build
      image: registry.redhat.io/rhel8/buildah:latest
      workingDir: $(workspaces.source.path)/$(params.context-dir)
      securityContext:
        capabilities:
          add:
            - SETFCAP
      script: |
        #!/usr/bin/env bash
        set -eu

        echo "=== Building image $(params.image-name) ==="
        echo "Context: $(pwd)"
        echo "Dockerfile: $(params.dockerfile)"

        buildah bud \
          --storage-driver=vfs \
          --format=oci \
          --tls-verify=true \
          --layers \
          -f $(params.dockerfile) \
          -t $(params.image-name) \
          .

        echo "=== Build complete ==="
    - name: push
      image: registry.redhat.io/rhel8/buildah:latest
      script: |
        #!/usr/bin/env bash
        set -eu

        echo "=== Pushing $(params.image-name) to GHCR ==="

        # Tekton mounts the dockerconfigjson secret from the ServiceAccount
        # at /tekton/creds-secrets/<secret-name>/.dockerconfigjson
        # and also merges credentials into /tekton/creds/.docker/config.json
        buildah push \
          --storage-driver=vfs \
          --tls-verify=true \
          $(params.image-name)

        echo "=== Push complete ==="
