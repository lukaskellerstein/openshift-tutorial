# OpenShift Serverless Operator — installs Knative Serving and Eventing
# This Subscription tells OLM to install the operator from the Red Hat catalog.
# Same pattern as Service Mesh (L03), Pipelines (L08), and GitOps (L09).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: serverless-operator
  namespace: openshift-serverless
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "10"
spec:
  channel: stable
  name: serverless-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
