# For comparison: regular Deployment + HPA for the Analytics Service
# HPA scales from 1 to 5 based on CPU utilization — but it CANNOT scale to zero.
# The minimum is always 1 pod running, consuming resources even when idle.
#
# Compare with analytics-ksvc.yaml to see the Knative alternative.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service-hpa-demo
  namespace: shopinsights
  labels:
    app: shopinsights
    component: analytics-service-hpa-demo
    tutorial: personalized
    lesson: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopinsights
      component: analytics-service-hpa-demo
  template:
    metadata:
      labels:
        app: shopinsights
        component: analytics-service-hpa-demo
    spec:
      containers:
        - name: analytics-service
          image: ghcr.io/lukaskellerstein/shopinsights-analytics:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: shopinsights-config
            - secretRef:
                name: shopinsights-secrets
---
# HPA — scales from 1 to 5 based on CPU, but minimum is always 1
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa-demo
  namespace: shopinsights
  labels:
    app: shopinsights
    component: analytics-service-hpa-demo
    tutorial: personalized
    lesson: "10"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service-hpa-demo
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
