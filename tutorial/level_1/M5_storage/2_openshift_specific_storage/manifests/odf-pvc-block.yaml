# PVC targeting ODF block storage (Ceph RBD).
# Requires OpenShift Data Foundation to be installed on the cluster.
# On CRC or Developer Sandbox, this PVC will remain Pending.
# Ceph RBD provides ReadWriteOnce (RWO) block-level storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odf-block-pvc
  labels:
    app: odf-demo
    tutorial-level: "1"
    tutorial-module: "M5"
spec:
  storageClassName: ocs-storagecluster-ceph-rbd
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
