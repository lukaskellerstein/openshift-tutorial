# Deployment that mounts the CSI-provisioned PVC at /data.
# Writes a timestamp file on startup to demonstrate persistent storage.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-demo
  labels:
    app: storage-demo
    tutorial-level: "1"
    tutorial-module: "M5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-demo
  template:
    metadata:
      labels:
        app: storage-demo
    spec:
      containers:
        - name: writer
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Written at $(date)" > /data/timestamp.txt
              echo "Storage demo running. Data written to /data/timestamp.txt"
              sleep infinity
          volumeMounts:
            - name: data-volume
              mountPath: /data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: csi-dynamic-pvc
