# PVC using dynamic provisioning via the default CSI StorageClass.
# No storageClassName is specified, so the cluster's default StorageClass is used.
# The CSI driver will dynamically create a PV when a Pod mounts this PVC.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: csi-dynamic-pvc
  labels:
    app: storage-demo
    tutorial-level: "1"
    tutorial-module: "M5"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
