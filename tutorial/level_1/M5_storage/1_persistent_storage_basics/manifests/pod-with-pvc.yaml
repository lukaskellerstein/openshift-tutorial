# Pod that mounts the storage-demo-pvc at /data
# Uses busybox with a sleep command so you can exec into it and test storage
apiVersion: v1
kind: Pod
metadata:
  name: storage-demo-pod
  labels:
    app: storage-demo
    tutorial-level: "1"
    tutorial-module: "M5"
spec:
  containers:
    - name: busybox
      image: busybox:latest
      command: ["sleep", "3600"]
      volumeMounts:
        - name: demo-storage
          mountPath: /data
  volumes:
    - name: demo-storage
      persistentVolumeClaim:
        claimName: storage-demo-pvc
