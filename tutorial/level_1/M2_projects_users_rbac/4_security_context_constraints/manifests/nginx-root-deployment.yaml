# Nginx deployment — uses the Docker Hub nginx image which runs as root (UID 0).
# This will FAIL on OpenShift because the restricted-v2 SCC does not allow root.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-root
  labels:
    app: nginx-root
    tutorial-level: "1"
    tutorial-module: "M2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-root
  template:
    metadata:
      labels:
        app: nginx-root
    spec:
      containers:
        - name: nginx
          image: docker.io/library/nginx:1.27
          ports:
            - containerPort: 80
