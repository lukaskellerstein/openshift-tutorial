# OpenShift OAuth configuration with HTPasswd identity provider
# This configures the cluster OAuth server to authenticate users
# against an htpasswd file stored in the htpasswd-secret Secret.
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  labels:
    app: auth-tutorial
    tutorial-level: "1"
    tutorial-module: "M2"
spec:
  identityProviders:
    - name: htpasswd-local
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          name: htpasswd-secret
