# Custom Role: pod-diagnostics
# Grants read-only access to pods, pod logs, and events.
# Use this when you need a user to troubleshoot pods without being
# able to create, modify, or delete any resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-diagnostics
  labels:
    app: rbac-demo
    tutorial-level: "1"
    tutorial-module: "M2"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
