# Loki Operator subscription — installs the Loki Operator from OperatorHub
# The Loki Operator manages LokiStack instances for log storage
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-logging
  labels:
    app: openshift-logging
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  channel: stable-6.1
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
# OperatorGroup scopes the operator to the openshift-logging namespace
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-logging
  namespace: openshift-logging
  labels:
    app: openshift-logging
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  targetNamespaces:
    - openshift-logging
