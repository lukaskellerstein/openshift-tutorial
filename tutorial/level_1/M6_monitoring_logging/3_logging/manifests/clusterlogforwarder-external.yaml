# ClusterLogForwarder — example of forwarding to external systems
# This is a REFERENCE EXAMPLE — do not apply unless you have an external syslog server
#
# This configuration demonstrates:
# - Sending application logs to an external syslog server
# - Keeping infrastructure and audit logs in the internal LokiStack
# - Using multiple pipelines to route different log types differently
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
  labels:
    app: openshift-logging
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  outputs:
    - name: external-syslog
      type: syslog
      syslog:
        facility: user
        payloadKey: message
        rfc: RFC5424
        severity: informational
      url: tls://syslog.example.com:6514
    - name: external-kafka
      type: kafka
      kafka:
        brokers:
          - tls://kafka.example.com:9093
        topic: openshift-app-logs
  pipelines:
    - name: app-logs-to-syslog
      inputRefs:
        - application
      outputRefs:
        - external-syslog
    - name: infra-audit-to-loki
      inputRefs:
        - infrastructure
        - audit
      outputRefs:
        - default
    - name: app-logs-to-kafka
      inputRefs:
        - application
      outputRefs:
        - external-kafka
