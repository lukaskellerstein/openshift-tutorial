# ClusterLogForwarder — controls where logs are sent
# This configuration sends all three log types to the internal LokiStack
# Application logs = container logs from user workloads
# Infrastructure logs = OpenShift platform and node logs
# Audit logs = API server and node audit logs
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
  labels:
    app: openshift-logging
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  pipelines:
    - name: all-to-loki
      inputRefs:
        - application
        - infrastructure
        - audit
      outputRefs:
        - default
