# Secret for LokiStack object storage configuration
# In CRC/demo environments, this uses a minimal configuration
# In production, configure real S3-compatible storage (AWS S3, MinIO, ODF, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: logging-loki-s3
  namespace: openshift-logging
  labels:
    app: openshift-logging
    tutorial-level: "1"
    tutorial-module: "M6"
type: Opaque
stringData:
  access_key_id: minioadmin
  access_key_secret: minioadmin
  bucketnames: loki-logs
  endpoint: http://minio.openshift-logging.svc:9000
  region: us-east-1
