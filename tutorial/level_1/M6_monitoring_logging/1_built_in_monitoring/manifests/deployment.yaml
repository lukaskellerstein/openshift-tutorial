# Deployment for a sample application that exposes Prometheus metrics
# on port 8080 at the /metrics endpoint.
# Uses the prometheus-example-app image which provides a simple HTTP
# server with standard Prometheus metric instrumentation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-example-app
  labels:
    app: prometheus-example-app
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-example-app
  template:
    metadata:
      labels:
        app: prometheus-example-app
    spec:
      containers:
        - name: prometheus-example-app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - name: metrics
              containerPort: 8080
