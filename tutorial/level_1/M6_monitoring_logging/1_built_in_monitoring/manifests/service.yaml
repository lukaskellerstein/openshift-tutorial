# Service that exposes the prometheus-example-app pods.
# The port is named "metrics" so the ServiceMonitor can reference it by name.
# This is the standard pattern for Prometheus metric discovery in OpenShift.
apiVersion: v1
kind: Service
metadata:
  name: prometheus-example-app
  labels:
    app: prometheus-example-app
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  selector:
    app: prometheus-example-app
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
