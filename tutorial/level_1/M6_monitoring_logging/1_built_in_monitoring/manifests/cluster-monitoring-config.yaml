# ConfigMap to enable user workload monitoring in OpenShift.
# This tells the Cluster Monitoring Operator to deploy a separate
# Prometheus instance for scraping user application metrics.
# Must be applied to the openshift-monitoring namespace by a cluster admin.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
  labels:
    app: cluster-monitoring
    tutorial-level: "1"
    tutorial-module: "M6"
data:
  config.yaml: |
    enableUserWorkload: true
