# Deliberately crashing deployment -- the entrypoint exits with an error.
# Used to practice debugging CrashLoopBackOff with oc logs and oc debug.
# The container starts, prints an error about a missing config file, then exits.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashing-app
  labels:
    app: crashing-app
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashing-app
  template:
    metadata:
      labels:
        app: crashing-app
        tutorial-level: "1"
        tutorial-module: "M6"
    spec:
      containers:
        - name: crashing-app
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting up..."
              echo "ERROR: Missing required config file at /etc/app/config.yaml"
              echo "Exiting with error code 1"
              exit 1
