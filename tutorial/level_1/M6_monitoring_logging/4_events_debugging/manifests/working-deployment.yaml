# Working deployment -- a healthy application for baseline debugging practice.
# Uses the hello-openshift image which runs as non-root (SCC-compatible).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-debug
  labels:
    app: hello-debug
    tutorial-level: "1"
    tutorial-module: "M6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-debug
  template:
    metadata:
      labels:
        app: hello-debug
        tutorial-level: "1"
        tutorial-module: "M6"
    spec:
      containers:
        - name: hello-debug
          image: openshift/hello-openshift:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8888
              name: alt-http
