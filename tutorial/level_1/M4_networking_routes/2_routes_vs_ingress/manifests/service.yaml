# Service exposing the demo-app Deployment internally on port 8080
# This Service is the backend target for both the Route and the Ingress
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  labels:
    app: demo-app
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  selector:
    app: demo-app
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
