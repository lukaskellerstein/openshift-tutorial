# Kubernetes Ingress — the standard K8s approach to external HTTP routing
# Compare with openshift-route.yaml for the OpenShift equivalent
# On OpenShift, the built-in HAProxy router processes this automatically
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app-ingress
  labels:
    app: demo-app
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  rules:
    - host: demo-app-ingress-routes-demo.apps-crc.testing
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 8080
