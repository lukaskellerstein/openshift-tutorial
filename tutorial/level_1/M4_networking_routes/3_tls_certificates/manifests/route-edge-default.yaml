# Edge-terminated Route using the cluster's default wildcard certificate
# TLS terminates at the router; traffic to the pod is plain HTTP
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: tls-demo-edge-default
  labels:
    app: tls-demo
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  to:
    kind: Service
    name: tls-demo
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
