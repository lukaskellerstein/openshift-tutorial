# Edge-terminated Route with a custom TLS certificate
# Replace the certificate, key, and caCertificate fields with your actual PEM data
# TLS terminates at the router; traffic to the pod is plain HTTP
#
# In practice, use: oc create route edge --cert=server.crt --key=server.key --ca-cert=ca.crt
# This manifest is a template showing the structure
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: tls-demo-edge-custom
  labels:
    app: tls-demo
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  host: tls-demo-edge-custom-tls-demo.apps-crc.testing
  to:
    kind: Service
    name: tls-demo
  port:
    targetPort: 8080
  tls:
    termination: edge
    certificate: |
      -----BEGIN CERTIFICATE-----
      <paste contents of certs/server.crt here>
      -----END CERTIFICATE-----
    key: |
      -----BEGIN RSA PRIVATE KEY-----
      <paste contents of certs/server.key here>
      -----END RSA PRIVATE KEY-----
    caCertificate: |
      -----BEGIN CERTIFICATE-----
      <paste contents of certs/ca.crt here>
      -----END CERTIFICATE-----
