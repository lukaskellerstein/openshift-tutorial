# NGINX configuration for TLS-enabled backend
# Serves HTTPS on port 8443 using certificates mounted from a TLS Secret
# Used by passthrough and re-encrypt Routes
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-tls-config
  labels:
    app: tls-demo-passthrough
    tutorial-level: "1"
    tutorial-module: "M4"
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log;
    pid /run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        server {
            listen 8443 ssl;
            server_name _;

            ssl_certificate /etc/nginx/tls/tls.crt;
            ssl_certificate_key /etc/nginx/tls/tls.key;
            ssl_protocols TLSv1.2 TLSv1.3;

            location / {
                return 200 'TLS passthrough backend is working!\n';
                add_header Content-Type text/plain;
            }
        }
    }
