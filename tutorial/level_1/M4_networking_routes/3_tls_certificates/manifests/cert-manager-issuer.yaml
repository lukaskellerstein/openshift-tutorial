# Example ClusterIssuer for cert-manager using Let's Encrypt
# Requires cert-manager operator to be installed from OperatorHub
# This is a reference manifest -- it will NOT work without cert-manager installed
#
# In production, replace the email and configure a proper solver
# (HTTP-01 for Routes, DNS-01 for wildcard certs)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            serviceType: ClusterIP
