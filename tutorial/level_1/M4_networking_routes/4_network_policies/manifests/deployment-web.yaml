# Deployment for a simple web application used to test NetworkPolicy rules.
# This runs a lightweight HTTP server that responds with "Hello from web-app!"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
        tutorial-level: "1"
        tutorial-module: "M4"
    spec:
      containers:
        - name: web-app
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          command:
            - /bin/bash
            - -c
            - |
              echo "Hello from web-app!" > /var/www/html/index.html
              httpd -D FOREGROUND
