# NetworkPolicy: Allow ingress from client-app pods to web-app pods on port 8080.
# This works alongside the deny-all policy -- policies are additive (unioned).
# Traffic matching ANY policy is allowed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-to-web
  labels:
    app: netpol-demo
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  podSelector:
    matchLabels:
      app: web-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: client-app
      ports:
        - protocol: TCP
          port: 8080
