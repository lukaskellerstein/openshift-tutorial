# EgressFirewall: OpenShift-specific CRD for namespace-level egress control.
# Unlike K8s NetworkPolicy (which only filters egress by IP CIDR),
# EgressFirewall can match by DNS name -- useful for compliance scenarios.
#
# Rules are evaluated in order -- the first match wins.
# Only one EgressFirewall is allowed per namespace and it must be named "default".
# Requires OVN-Kubernetes network plugin (default in OpenShift 4.12+).
apiVersion: k8s.ovn.org/v1
kind: EgressFirewall
metadata:
  name: default
  labels:
    app: netpol-demo
    tutorial-level: "1"
    tutorial-module: "M4"
spec:
  egress:
    - type: Allow
      to:
        cidrSelector: 10.0.0.0/8
    - type: Allow
      to:
        cidrSelector: 172.16.0.0/12
    - type: Allow
      to:
        dnsName: api.github.com
    - type: Deny
      to:
        cidrSelector: 0.0.0.0/0
