# Kubernetes Deployment for the hello-openshift test application
# Used to demonstrate that standard kubectl commands work on OpenShift
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-openshift
  labels:
    app: hello-openshift
    tutorial-level: "1"
    tutorial-module: "M1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-openshift
  template:
    metadata:
      labels:
        app: hello-openshift
        tutorial-level: "1"
        tutorial-module: "M1"
    spec:
      containers:
        - name: hello-openshift
          image: openshift/hello-openshift:latest
          ports:
            - containerPort: 8080
              protocol: TCP
