# Kubernetes Service for the hello-openshift application
# A standard ClusterIP service — identical to what you would create on vanilla K8s
apiVersion: v1
kind: Service
metadata:
  name: hello-openshift
  labels:
    app: hello-openshift
    tutorial-level: "1"
    tutorial-module: "M1"
spec:
  selector:
    app: hello-openshift
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
