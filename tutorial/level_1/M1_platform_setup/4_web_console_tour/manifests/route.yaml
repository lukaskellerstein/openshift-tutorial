# OpenShift Route that exposes the console-demo-app externally.
# This creates a hostname like console-demo-app-console-tour.apps-crc.testing
# so we can access the app from a browser and see it in the Topology view.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: console-demo-app
  labels:
    app: console-demo-app
    tutorial-level: "1"
    tutorial-module: "M1"
spec:
  to:
    kind: Service
    name: console-demo-app
  port:
    targetPort: 8080-tcp
