# Kustomize base Deployment -- a standard Kubernetes Deployment used as the base layer.
# Kustomize overlays modify this without touching the original file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kustomize-app
  labels:
    app: kustomize-app
    tutorial-level: "1"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kustomize-app
  template:
    metadata:
      labels:
        app: kustomize-app
        tutorial-level: "1"
        tutorial-module: "M3"
    spec:
      containers:
        - name: kustomize-app
          image: openshift/hello-openshift:latest
          ports:
            - containerPort: 8080
