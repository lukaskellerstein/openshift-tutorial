# OpenShift Template -- parameterized resource definitions unique to OpenShift.
# This template creates a Deployment, Service, and Route for a simple web app.
# Process with: oc process -f openshift-template.yaml -p APP_NAME=my-app | oc apply -f -
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: web-app-template
  labels:
    app: web-app-template
    tutorial-level: "1"
    tutorial-module: "M3"
  annotations:
    description: "A simple web application template for the OpenShift tutorial."
    tags: "tutorial,web"
    openshift.io/display-name: "Tutorial Web App"
parameters:
  - name: APP_NAME
    description: "Name of the application"
    value: "template-app"
    required: true
  - name: APP_IMAGE
    description: "Container image to deploy"
    value: "openshift/hello-openshift:latest"
    required: true
  - name: REPLICAS
    description: "Number of pod replicas"
    value: "1"
    required: true
  - name: APP_PORT
    description: "Port the container listens on"
    value: "8080"
    required: true
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "${APP_NAME}"
      labels:
        app: "${APP_NAME}"
        tutorial-level: "1"
        tutorial-module: "M3"
    spec:
      replicas: ${{REPLICAS}}
      selector:
        matchLabels:
          app: "${APP_NAME}"
      template:
        metadata:
          labels:
            app: "${APP_NAME}"
            tutorial-level: "1"
            tutorial-module: "M3"
        spec:
          containers:
            - name: "${APP_NAME}"
              image: "${APP_IMAGE}"
              ports:
                - containerPort: ${{APP_PORT}}
  - apiVersion: v1
    kind: Service
    metadata:
      name: "${APP_NAME}"
      labels:
        app: "${APP_NAME}"
        tutorial-level: "1"
        tutorial-module: "M3"
    spec:
      selector:
        app: "${APP_NAME}"
      ports:
        - port: ${{APP_PORT}}
          targetPort: ${{APP_PORT}}
          protocol: TCP
  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: "${APP_NAME}"
      labels:
        app: "${APP_NAME}"
        tutorial-level: "1"
        tutorial-module: "M3"
    spec:
      to:
        kind: Service
        name: "${APP_NAME}"
      port:
        targetPort: ${{APP_PORT}}
