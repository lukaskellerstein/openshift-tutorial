# Helm values file -- example overrides for a Helm chart deployment on OpenShift.
# This is for reference only; Helm must be installed separately.
# Usage: helm install my-release my-chart/ -f helm-values.yaml
replicaCount: 2

image:
  repository: openshift/hello-openshift
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

route:
  enabled: true
  host: ""
