# BuildConfig with explicit webhook triggers
# Demonstrates GitHub and Generic webhook trigger configuration
# The webhook URLs are auto-generated by OpenShift and can be retrieved with:
#   oc describe bc/sample-app-webhook
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: sample-app-webhook
  labels:
    app: sample-app
    build-strategy: s2i
    tutorial-level: "1"
    tutorial-module: "M3"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/sclorg/httpd-ex.git
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: openshift
        name: httpd:2.4-el9
  output:
    to:
      kind: ImageStreamTag
      name: sample-app:webhook
  triggers:
    - type: GitHub
      github:
        secret: my-github-webhook-secret
    - type: Generic
      generic:
        secret: my-generic-webhook-secret
    - type: ConfigChange
    - type: ImageChange
