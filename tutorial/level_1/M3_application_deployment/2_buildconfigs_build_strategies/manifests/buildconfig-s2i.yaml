# BuildConfig using Source-to-Image (S2I) build strategy
# Builds an image from source code without needing a Dockerfile
# Uses a builder image that knows how to assemble the application
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: sample-app-s2i
  labels:
    app: sample-app
    build-strategy: s2i
    tutorial-level: "1"
    tutorial-module: "M3"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/sclorg/httpd-ex.git
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: openshift
        name: httpd:2.4-el9
  output:
    to:
      kind: ImageStreamTag
      name: sample-app:s2i
  triggers:
    - type: ConfigChange
    - type: ImageChange
