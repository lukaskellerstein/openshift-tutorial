# BuildConfig using S2I with a Python builder image
# Demonstrates S2I with a different language runtime
# The builder image automatically detects requirements.txt and installs dependencies
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: python-app-s2i
  labels:
    app: python-app
    build-strategy: s2i
    tutorial-level: "1"
    tutorial-module: "M3"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/sclorg/django-ex.git
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: openshift
        name: python:3.11-ubi9
  output:
    to:
      kind: ImageStreamTag
      name: python-app:latest
  triggers:
    - type: ConfigChange
    - type: ImageChange
