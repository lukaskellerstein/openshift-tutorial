# Copy this file to your repo's .github/workflows/ci-cd.yaml
#
# Required GitHub repository secrets:
#   OPENSHIFT_SERVER  — API server URL (e.g., https://api.sandbox-xxx.openshiftapps.com:6443)
#   OPENSHIFT_TOKEN   — ServiceAccount token from deploy-sa-token Secret
#   GHCR_USERNAME     — Your GitHub username
#   GHCR_TOKEN        — GitHub PAT with write:packages scope
#   OPENSHIFT_NAMESPACE — Target namespace (e.g., shopinsights)

name: ShopInsights CI/CD

on:
  push:
    branches: [main]
    paths:
      - "shared_app/products-service/**"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shopinsights-products
  SERVICE_PATH: shared_app/products-service

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          pip install uv
          uv sync --frozen --no-dev
          uv pip install --system pytest httpx
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            uv run pytest -v
          else
            uv run python -c "import app; print('Module import OK')"
          fi

  build-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to OpenShift
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Deploy new image
        run: |
          oc set image deployment/products-service \
            products-service=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ secrets.OPENSHIFT_NAMESPACE }}
          oc rollout status deployment/products-service \
            -n ${{ secrets.OPENSHIFT_NAMESPACE }} --timeout=120s

      - name: Verify deployment
        run: |
          oc get pods -l component=products-service \
            -n ${{ secrets.OPENSHIFT_NAMESPACE }}
          echo "Deployed image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
