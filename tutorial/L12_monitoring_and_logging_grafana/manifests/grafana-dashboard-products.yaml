apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: shopinsights-products
  namespace: shopinsights
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": { "list": [] },
      "description": "ShopInsights Products Service — Metrics + Logs",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"shopinsights\"}[5m])) by (exported_endpoint)",
              "legendFormat": "{{ exported_endpoint }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": []
          }
        },
        {
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"shopinsights\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"shopinsights\"}[5m])) * 100",
              "legendFormat": "5xx error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "P50 / P95 / P99 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"shopinsights\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"shopinsights\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"shopinsights\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        },
        {
          "title": "DuckDB Query Duration by Type",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(duckdb_query_duration_seconds_bucket{namespace=\"shopinsights\"}[5m])) by (le, query_type))",
              "legendFormat": "p95 {{ query_type }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        },
        {
          "title": "Active Connections",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "active_connections{namespace=\"shopinsights\"}",
              "legendFormat": "connections"
            }
          ]
        },
        {
          "title": "Total Requests (all time)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(http_requests_total{namespace=\"shopinsights\"})",
              "legendFormat": "total"
            }
          ]
        },
        {
          "title": "Requests by Status Code",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(http_requests_total{namespace=\"shopinsights\"}) by (status)",
              "legendFormat": "{{ status }}"
            }
          ]
        },
        {
          "title": "Recent Logs (Products Service)",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{kubernetes_namespace_name=\"shopinsights\", kubernetes_container_name=\"products-service\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "Alert Status",
          "type": "alertlist",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 38 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "showOptions": "current",
            "maxItems": 10,
            "sortOrder": 1,
            "alertName": "Products",
            "dashboardAlerts": false,
            "stateFilter": {
              "firing": true,
              "pending": true,
              "noData": true,
              "normal": true,
              "error": true
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["shopinsights", "products-service"],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" },
            "hide": 2
          },
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "current": { "text": "Loki", "value": "Loki" },
            "hide": 2
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "ShopInsights - Products Service",
      "uid": "shopinsights-products",
      "version": 1
    }
