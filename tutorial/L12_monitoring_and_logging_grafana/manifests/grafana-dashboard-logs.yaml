apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: shopinsights-logs
  namespace: shopinsights
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": { "list": [] },
      "description": "ShopInsights — Centralized logs from all services via Loki",
      "editable": true,
      "panels": [
        {
          "title": "Log Volume by Service",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "sum(count_over_time({kubernetes_namespace_name=\"shopinsights\"}[1m])) by (kubernetes_container_name)",
              "legendFormat": "{{ kubernetes_container_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "bars", "fillOpacity": 50, "stacking": { "mode": "normal" } }
            },
            "overrides": []
          }
        },
        {
          "title": "Products Service Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{kubernetes_namespace_name=\"shopinsights\", kubernetes_container_name=\"products-service\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "Orders Service Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 14 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{kubernetes_namespace_name=\"shopinsights\", kubernetes_container_name=\"orders-service\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "Analytics Service Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 22 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{kubernetes_namespace_name=\"shopinsights\", kubernetes_container_name=\"analytics-service\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "Dashboard UI Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 30 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "targets": [
            {
              "expr": "{kubernetes_namespace_name=\"shopinsights\", kubernetes_container_name=\"dashboard-ui\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["shopinsights", "logs", "loki"],
      "templating": {
        "list": [
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "current": { "text": "Loki", "value": "Loki" },
            "hide": 2
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "ShopInsights - Logs",
      "uid": "shopinsights-logs",
      "version": 1
    }
