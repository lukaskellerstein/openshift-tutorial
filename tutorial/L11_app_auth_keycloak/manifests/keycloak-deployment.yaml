apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: shopinsights
    component: keycloak
    tutorial: personalized
    lesson: "11"
spec:
  replicas: 1
  selector:
    matchLabels:
      component: keycloak
  template:
    metadata:
      labels:
        app: shopinsights
        component: keycloak
        tutorial: personalized
        lesson: "11"
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args:
            - "start-dev"
            - "--import-realm"
          env:
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: "admin"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app: shopinsights
    component: keycloak
    tutorial: personalized
    lesson: "11"
spec:
  selector:
    component: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  labels:
    app: shopinsights
    component: keycloak
    tutorial: personalized
    lesson: "11"
spec:
  to:
    kind: Service
    name: keycloak
  port:
    targetPort: 8080
  tls:
    termination: edge
