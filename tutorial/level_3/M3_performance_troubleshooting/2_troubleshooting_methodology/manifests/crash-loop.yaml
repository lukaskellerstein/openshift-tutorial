# Simulates a CrashLoopBackOff scenario
# The container starts, runs for a few seconds, then exits with an error
# Kubernetes restarts it with exponential backoff (10s, 20s, 40s, ... 5min)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-loop
  labels:
    app: crash-loop
    scenario: crash-loop
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-loop
      scenario: crash-loop
  template:
    metadata:
      labels:
        app: crash-loop
        scenario: crash-loop
        tutorial-level: "3"
        tutorial-module: "M3"
    spec:
      containers:
        - name: crash-loop
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Application starting..."
              echo "Attempting to connect to database at db.internal:5432..."
              sleep 2
              echo "ERROR: Connection refused - could not connect to database"
              echo "ERROR: Required environment variable DATABASE_URL is not set"
              echo "Application cannot start without database connection. Exiting."
              exit 1
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
