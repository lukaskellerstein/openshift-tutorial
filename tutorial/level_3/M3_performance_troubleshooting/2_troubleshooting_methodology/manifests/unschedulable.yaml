# Simulates a scheduling failure (Pending pod)
# The pod requests resources on a node with a label that does not exist,
# so the scheduler cannot place it anywhere
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unschedulable
  labels:
    app: unschedulable
    scenario: unschedulable
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unschedulable
      scenario: unschedulable
  template:
    metadata:
      labels:
        app: unschedulable
        scenario: unschedulable
        tutorial-level: "3"
        tutorial-module: "M3"
    spec:
      # This nodeSelector requires a label that no node has
      # The pod will remain Pending with a scheduling failure
      nodeSelector:
        node-type: gpu-high-memory
        accelerator: nvidia-a100
      containers:
        - name: unschedulable
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
