# Simulates an ImagePullBackOff scenario
# The image reference points to a non-existent repository/tag
# The kubelet will fail to pull the image and enter ImagePullBackOff
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-image
  labels:
    app: bad-image
    scenario: image-pull
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-image
      scenario: image-pull
  template:
    metadata:
      labels:
        app: bad-image
        scenario: image-pull
        tutorial-level: "3"
        tutorial-module: "M3"
    spec:
      containers:
        - name: bad-image
          # This image does not exist -- triggers ImagePullBackOff
          image: registry.example.com/nonexistent/app:v99.99.99
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
