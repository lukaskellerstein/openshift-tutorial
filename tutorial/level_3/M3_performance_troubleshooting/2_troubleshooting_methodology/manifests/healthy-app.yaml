# Healthy baseline deployment for comparison during troubleshooting exercises
# This pod runs successfully -- use it to verify cluster health
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-app
  labels:
    app: healthy-app
    scenario: healthy
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthy-app
      scenario: healthy
  template:
    metadata:
      labels:
        app: healthy-app
        scenario: healthy
        tutorial-level: "3"
        tutorial-module: "M3"
    spec:
      containers:
        - name: healthy-app
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
