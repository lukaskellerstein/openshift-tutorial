# Scheduled Velero backup — runs daily at 02:00 UTC.
# Backs up production and staging namespaces.
# Excludes transient resources (events, pods) to reduce backup size.
# Retains backups for 30 days (720h).
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-app-backup
  namespace: openshift-adp
  labels:
    app: oadp
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  schedule: "0 2 * * *"
  useOwnerReferencesInBackup: false
  template:
    includedNamespaces:
      - production
      - staging
    excludedResources:
      - events
      - events.events.k8s.io
      - pods
    storageLocation: dr-dpa-1
    ttl: 720h
    snapshotMoveData: true
    defaultVolumesToFsBackup: true
    metadata:
      labels:
        backup-type: scheduled
        schedule-name: daily-app-backup
