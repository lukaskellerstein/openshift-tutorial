# OADP (OpenShift API for Data Protection) operator subscription.
# Installs Velero with OpenShift-aware plugins from OperatorHub.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-adp
  labels:
    app: oadp
    tutorial-level: "3"
    tutorial-module: "M3"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: oadp-operator-group
  namespace: openshift-adp
  labels:
    app: oadp
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  targetNamespaces:
    - openshift-adp
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: redhat-oadp-operator
  namespace: openshift-adp
  labels:
    app: oadp
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  channel: stable-1.4
  installPlanApproval: Automatic
  name: redhat-oadp-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
