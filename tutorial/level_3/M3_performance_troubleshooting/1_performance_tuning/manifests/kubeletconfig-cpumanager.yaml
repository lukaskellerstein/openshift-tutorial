# KubeletConfig to enable CPU Manager static policy and Topology Manager
# Applied to MachineConfigPools labeled custom-kubelet=cpumanager-enabled
# Warning: applying this triggers a rolling reboot of nodes in the pool
apiVersion: machineconfiguration.openshift.io/v1
kind: KubeletConfig
metadata:
  name: cpumanager-enabled
  labels:
    app: performance-tuning
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  machineConfigPoolSelector:
    matchLabels:
      custom-kubelet: cpumanager-enabled
  kubeletConfig:
    cpuManagerPolicy: static
    cpuManagerReconcilePeriod: 5s
    reservedSystemCPUs: "0-1"
    topologyManagerPolicy: single-numa-node
    memoryManagerPolicy: Static
    reservedMemory:
      - numaNode: 0
        limits:
          memory: "1Gi"
          hugepages-2Mi: "128Mi"
