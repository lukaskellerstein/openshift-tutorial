# PerformanceProfile for low-latency telco/financial workloads
# This single CR generates: Tuned, MachineConfig, KubeletConfig, RuntimeClass
# Warning: applying this triggers node reboots and real-time kernel installation
#
# Requirements:
#   - Nodes with 32+ CPUs (adjust cpu.reserved and cpu.isolated for your hardware)
#   - Nodes in the worker-perf MachineConfigPool
#   - RHCOS with real-time kernel available (OpenShift 4.12+)
apiVersion: performance.openshift.io/v2
kind: PerformanceProfile
metadata:
  name: low-latency
  labels:
    app: performance-tuning
    tutorial-level: "3"
    tutorial-module: "M3"
  annotations:
    kubeletconfig.experimental: |
      {"topologyManagerScope": "pod"}
spec:
  # CPU partitioning: reserve CPUs 0-3 for OS/platform, isolate 4-31 for workloads
  cpu:
    reserved: "0-3"
    isolated: "4-31"

  # Huge pages allocation per NUMA node
  hugepages:
    defaultHugepagesSize: 1G
    pages:
      - size: 1G
        count: 4
        node: 0
      - size: 2M
        count: 1024
        node: 0
      - size: 1G
        count: 4
        node: 1
      - size: 2M
        count: 1024
        node: 1

  # NUMA-aware scheduling
  numa:
    topologyPolicy: single-numa-node

  # Real-time kernel (required for telco/financial workloads)
  realTimeKernel:
    enabled: true

  # Additional kernel arguments for low-latency
  additionalKernelArgs:
    - nohz_full=4-31
    - tsc=reliable
    - nosoftlockup
    - nmi_watchdog=0
    - intel_pstate=disable
    - idle=poll
    - processor.max_cstate=1
    - intel_idle.max_cstate=0
    - mce=off
    - audit=0

  # Apply to the worker-perf MachineConfigPool
  machineConfigPoolSelector:
    matchLabels:
      machineconfiguration.openshift.io/role: worker-perf

  # Select nodes with the performance label
  nodeSelector:
    node-role.kubernetes.io/worker-perf: ""

  # Workload partitioning hints
  workloadHints:
    highPowerConsumption: true
    realTime: true
    perPodPowerManagement: false

  # Network device tuning
  net:
    userLevelNetworking: true
    devices:
      - interfaceName: ens*f0
