# Pod that requests 2Mi huge pages to verify allocation
# Requires huge pages to be pre-allocated on the node via MachineConfig
apiVersion: v1
kind: Pod
metadata:
  name: hugepages-demo
  namespace: perf-tuning-demo
  labels:
    app: hugepages-demo
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  containers:
    - name: hugepages-app
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "Checking huge pages allocation..."
          cat /proc/meminfo | grep -i huge
          echo "---"
          echo "Mounted hugepage filesystem:"
          mount | grep hugetlbfs
          echo "---"
          echo "Hugepage files in /hugepages:"
          ls -la /hugepages/ 2>/dev/null || echo "No hugepages mount"
          sleep infinity
      resources:
        requests:
          memory: "256Mi"
          cpu: "500m"
          hugepages-2Mi: "128Mi"
        limits:
          memory: "256Mi"
          cpu: "500m"
          hugepages-2Mi: "128Mi"
      volumeMounts:
        - name: hugepage
          mountPath: /hugepages
  volumes:
    - name: hugepage
      emptyDir:
        medium: HugePages-2Mi
