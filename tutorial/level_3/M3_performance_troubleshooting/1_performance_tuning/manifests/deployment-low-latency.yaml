# Deployment for a low-latency workload using the PerformanceProfile
# Uses the auto-generated RuntimeClass, CRI-O annotations for IRQ/CPU isolation,
# and requests exclusive CPUs + 1Gi huge pages
apiVersion: apps/v1
kind: Deployment
metadata:
  name: low-latency-app
  namespace: perf-tuning-demo
  labels:
    app: low-latency-app
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: low-latency-app
  template:
    metadata:
      labels:
        app: low-latency-app
        tutorial-level: "3"
        tutorial-module: "M3"
      annotations:
        # Disable CPU load balancing for isolated CPUs
        cpu-load-balancing.crio.io: disable
        # Disable CPU quota for real-time tasks
        cpu-quota.crio.io: disable
        # Disable IRQ balancing on the container's CPUs
        irq-load-balancing.crio.io: disable
        # Disable C-states for lowest latency
        cpu-c-states.crio.io: disable
        # Set CPU frequency governor to performance
        cpu-freq-governor.crio.io: performance
    spec:
      # Use the RuntimeClass generated by PerformanceProfile
      runtimeClassName: performance-low-latency
      nodeSelector:
        node-role.kubernetes.io/worker-perf: ""
      tolerations:
        - key: node-role.kubernetes.io/worker-perf
          operator: Exists
          effect: NoSchedule
      containers:
        - name: latency-app
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Low-Latency Workload Running ==="
              echo "CPU Affinity:"
              taskset -p $$ 2>/dev/null || echo "N/A"
              echo "---"
              echo "NUMA Node:"
              cat /sys/fs/cgroup/cpuset.mems 2>/dev/null || echo "N/A"
              echo "---"
              echo "Huge Pages Available:"
              cat /proc/meminfo | grep -i huge
              echo "---"
              echo "Kernel (should be -rt):"
              uname -r
              echo "---"
              echo "Timer resolution:"
              cat /proc/timer_list 2>/dev/null | head -5 || echo "N/A"
              sleep infinity
          resources:
            requests:
              memory: "1Gi"
              cpu: "4"
              hugepages-1Gi: "2Gi"
            limits:
              memory: "1Gi"
              cpu: "4"
              hugepages-1Gi: "2Gi"
          volumeMounts:
            - name: hugepages-1gi
              mountPath: /hugepages-1Gi
          securityContext:
            capabilities:
              add:
                - SYS_NICE
                - IPC_LOCK
      volumes:
        - name: hugepages-1gi
          emptyDir:
            medium: HugePages-1Gi
