# MachineConfig to allocate huge pages at boot time
# Applies to the worker-perf MachineConfigPool
# Warning: applying this triggers a rolling reboot of all nodes in the pool
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 50-hugepages
  labels:
    machineconfiguration.openshift.io/role: worker-perf
    app: performance-tuning
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  kernelArguments:
    - hugepagesz=2M
    - hugepages=1024
    - hugepagesz=1G
    - hugepages=4
