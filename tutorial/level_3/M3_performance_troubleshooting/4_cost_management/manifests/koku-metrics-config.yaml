# KokuMetricsConfig — the primary configuration for the Cost Management Operator.
# This configures what metrics to collect, how to package reports,
# and where to send them.
#
# upload_toggle: false — stores reports locally (air-gapped mode).
# Set to true for production clusters connected to console.redhat.com.
apiVersion: koku-metrics-cfg.openshift.io/v1beta1
kind: KokuMetricsConfig
metadata:
  name: koku-metrics
  namespace: cost-management
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  authentication:
    type: basic
  packaging:
    max_reports_to_store: 60
    max_size_MB: 100
  prometheus_config:
    collect_previous_data: true
    context_timeout: 120
    disable_metrics_collection_cost_management: false
    disable_metrics_collection_resource_optimization: false
  source:
    check_cycle: 1440
    create_source: false
    name: openshift-local-cluster
  upload:
    upload_toggle: false
    upload_cycle: 360
  volume_claim_template:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
