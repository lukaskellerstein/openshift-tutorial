# Sample frontend workload for cost management demonstration.
# Low resource profile: lightweight web server replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-portal
  labels:
    app: web-portal
    cost-center: "CC-2001"
    team: frontend
    service: web-portal
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-portal
  template:
    metadata:
      labels:
        app: web-portal
        cost-center: "CC-2001"
        team: frontend
        service: web-portal
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-122:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-portal
  labels:
    app: web-portal
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  selector:
    app: web-portal
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
