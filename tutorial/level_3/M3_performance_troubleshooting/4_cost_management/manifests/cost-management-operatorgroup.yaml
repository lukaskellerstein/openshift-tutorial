# OperatorGroup for the Cost Management Operator.
# Scoped to the cost-management namespace where the operator runs.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: cost-management-operator-group
  namespace: cost-management
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  targetNamespaces:
    - cost-management
