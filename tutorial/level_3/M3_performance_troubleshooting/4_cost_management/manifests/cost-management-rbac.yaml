# ClusterRole and ClusterRoleBinding for the Cost Management Operator.
# The operator needs cluster-wide read access to query Prometheus,
# list namespaces, read node metrics, and inspect PVC usage.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cost-management-reader
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - resourcequotas
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["quota.openshift.io"]
    resources:
      - clusterresourcequotas
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - prometheuses
      - prometheuses/api
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /api/v1/query
      - /api/v1/query_range
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cost-management-reader-binding
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cost-management-reader
subjects:
  - kind: ServiceAccount
    name: koku-metrics-operator
    namespace: cost-management
