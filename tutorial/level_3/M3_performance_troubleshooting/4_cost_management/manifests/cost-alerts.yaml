# PrometheusRule for cost management alerts.
# Detects over-provisioned namespaces, cost spikes, and wasted storage.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cost-management-alerts
  namespace: openshift-monitoring
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  groups:
    - name: cost-management
      rules:
        # Alert when CPU usage exceeds 90% of requests (under-provisioned)
        - alert: NamespaceCPUCostSpike
          expr: |
            (
              sum by (namespace) (rate(container_cpu_usage_seconds_total{container!="POD",container!=""}[1h]))
              /
              sum by (namespace) (kube_pod_container_resource_requests{resource="cpu"})
            ) > 0.9
          for: 30m
          labels:
            severity: warning
            cost_impact: "high"
          annotations:
            summary: "Namespace {{ $labels.namespace }} CPU usage exceeds 90% of requests"
            description: >
              CPU usage in namespace {{ $labels.namespace }} has exceeded 90% of
              total CPU requests for more than 30 minutes. This may indicate
              under-provisioning (risk of throttling) or an unexpected workload spike.
              Review resource requests and consider scaling.

        # Alert when CPU usage is below 20% of requests for 7 days (over-provisioned)
        - alert: NamespaceOverProvisionedCPU
          expr: |
            (
              sum by (namespace) (rate(container_cpu_usage_seconds_total{container!="POD",container!=""}[24h]))
              /
              sum by (namespace) (kube_pod_container_resource_requests{resource="cpu"})
            ) < 0.2
          for: 7d
          labels:
            severity: info
            cost_impact: "medium"
          annotations:
            summary: "Namespace {{ $labels.namespace }} is over-provisioned (CPU < 20% of requests)"
            description: >
              CPU usage in namespace {{ $labels.namespace }} has been below 20% of
              total CPU requests for 7 days. Consider reducing resource requests to
              lower costs without impacting performance.

        # Alert when PVC storage is less than 10% utilized for 7 days
        - alert: PVCStorageWaste
          expr: |
            (
              kubelet_volume_stats_used_bytes
              /
              kubelet_volume_stats_capacity_bytes
            ) < 0.1
          for: 7d
          labels:
            severity: info
            cost_impact: "low"
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is less than 10% utilized"
            description: >
              The PVC {{ $labels.persistentvolumeclaim }} has been using less than
              10% of its provisioned capacity for 7 days. Consider resizing the PVC
              or migrating to a smaller volume to reduce storage costs.

        # Alert when memory usage exceeds 85% of limits (OOM risk + cost issue)
        - alert: NamespaceMemoryNearLimit
          expr: |
            (
              sum by (namespace) (container_memory_working_set_bytes{container!="POD",container!=""})
              /
              sum by (namespace) (kube_pod_container_resource_limits{resource="memory"})
            ) > 0.85
          for: 15m
          labels:
            severity: warning
            cost_impact: "high"
          annotations:
            summary: "Namespace {{ $labels.namespace }} memory usage at 85% of limits"
            description: >
              Memory usage in namespace {{ $labels.namespace }} has reached 85% of
              total memory limits. Pods are at risk of OOM kills. Increase memory
              limits or scale horizontally to distribute the load.
