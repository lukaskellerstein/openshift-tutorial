# PersistentVolumeClaim for local cost report storage.
# Used in air-gapped or disconnected environments where reports
# cannot be uploaded to console.redhat.com.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cost-reports-storage
  namespace: cost-management
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
