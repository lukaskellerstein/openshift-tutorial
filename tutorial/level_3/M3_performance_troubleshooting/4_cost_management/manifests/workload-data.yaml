# Sample data processing workload for cost management demonstration.
# High resource profile: compute-intensive analytics worker.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-worker
  labels:
    app: analytics-worker
    cost-center: "CC-2003"
    team: data-engineering
    service: analytics-pipeline
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-worker
  template:
    metadata:
      labels:
        app: analytics-worker
        cost-center: "CC-2003"
        team: data-engineering
        service: analytics-pipeline
    spec:
      containers:
        - name: worker
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - /bin/bash
            - -c
            - |
              python3 -c "
              import time, math
              print('Analytics worker started')
              while True:
                  # Simulate compute work
                  [math.sqrt(i) for i in range(100000)]
                  time.sleep(10)
              "
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - "true"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - "true"
            initialDelaySeconds: 10
            periodSeconds: 30
