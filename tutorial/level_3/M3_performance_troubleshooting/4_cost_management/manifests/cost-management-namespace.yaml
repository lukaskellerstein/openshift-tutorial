# Namespace for the Cost Management Operator and its resources.
# Keeps cost-management components isolated from application workloads.
apiVersion: v1
kind: Namespace
metadata:
  name: cost-management
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
  annotations:
    openshift.io/description: "Cost Management Operator namespace for metering and usage tracking"
    openshift.io/display-name: "Cost Management"
