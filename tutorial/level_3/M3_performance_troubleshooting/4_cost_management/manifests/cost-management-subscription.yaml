# Subscription for the Cost Management Operator (koku-metrics-operator).
# Installs from the Red Hat operators catalog in the stable channel.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: koku-metrics-operator
  namespace: cost-management
  labels:
    app: cost-management
    tutorial-level: "3"
    tutorial-module: "M3"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: koku-metrics-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
