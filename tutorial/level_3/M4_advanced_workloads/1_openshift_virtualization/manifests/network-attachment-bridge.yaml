# NetworkAttachmentDefinition — provides a bridge-based secondary network for VMs
# Enables VMs to connect to external VLANs or flat networks alongside the pod network
# Requires the linux-bridge CNI plugin (installed by OpenShift Virtualization)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vm-bridge-network
  namespace: virtualization-lab
  labels:
    app: virtualization-lab
    tutorial-level: "3"
    tutorial-module: "M4"
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/br-ext
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vm-bridge-network",
      "type": "cnv-bridge",
      "bridge": "br-ext",
      "macspoofchk": true,
      "vlan": 100,
      "ipam": {}
    }
