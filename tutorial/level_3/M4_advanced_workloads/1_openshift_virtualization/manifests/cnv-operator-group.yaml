# OperatorGroup for the OpenShift Virtualization (CNV) operator
# This targets all namespaces (cluster-scoped operator)
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: kubevirt-hyperconverged-group
  namespace: openshift-cnv
  labels:
    app: openshift-cnv
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  targetNamespaces: []
