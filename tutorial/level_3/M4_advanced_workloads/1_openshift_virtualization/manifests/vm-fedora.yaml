# VirtualMachine — a Fedora-based VM with production-quality resource configuration
# This VM uses a containerDisk for simplicity (no PVC required for the OS image)
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: fedora-vm
  namespace: virtualization-lab
  labels:
    app: fedora-vm
    tutorial-level: "3"
    tutorial-module: "M4"
    vm-workload: web
spec:
  running: false
  template:
    metadata:
      labels:
        app: fedora-vm
        kubevirt.io/domain: fedora-vm
        tutorial-level: "3"
        tutorial-module: "M4"
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: fedora
        vm.kubevirt.io/workload: server
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        resources:
          requests:
            memory: 2Gi
            cpu: 500m
          limits:
            memory: 4Gi
            cpu: "2"
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
          rng: {}
        machine:
          type: q35
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: containerdisk
          containerDisk:
            image: registry.redhat.io/rhel9/rhel-guest-image:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: changeme
              chpasswd:
                expire: false
              ssh_pwauth: true
              packages:
                - httpd
              runcmd:
                - systemctl enable --now httpd
                - echo "Hello from OpenShift Virtualization" > /var/www/html/index.html
