# Subscription to install the OpenShift Virtualization operator from OperatorHub
# Manual approval recommended for production clusters
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kubevirt-hyperconverged
  namespace: openshift-cnv
  labels:
    app: openshift-cnv
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  channel: stable
  installPlanApproval: Manual
  name: kubevirt-hyperconverged
  source: redhat-operators
  sourceNamespace: openshift-marketplace
