# VirtualMachineSnapshot — creates a point-in-time snapshot of a VM's disks and metadata
# Requires a CSI driver that supports VolumeSnapshots (ODF/Ceph provides this)
apiVersion: snapshot.kubevirt.io/v1beta1
kind: VirtualMachineSnapshot
metadata:
  name: persistent-vm-snap-01
  namespace: virtualization-lab
  labels:
    app: persistent-vm
    tutorial-level: "3"
    tutorial-module: "M4"
    snapshot-reason: pre-upgrade
spec:
  source:
    apiGroup: kubevirt.io
    kind: VirtualMachine
    name: persistent-vm
