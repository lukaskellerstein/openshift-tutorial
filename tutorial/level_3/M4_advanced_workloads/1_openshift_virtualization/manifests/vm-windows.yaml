# VirtualMachine — Windows Server workload
# Demonstrates running legacy Windows applications on OpenShift
# Requires a Windows ISO imported via DataVolume (see README for instructions)
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: windows-vm
  namespace: virtualization-lab
  labels:
    app: windows-vm
    tutorial-level: "3"
    tutorial-module: "M4"
    vm-workload: legacy-windows
spec:
  running: false
  dataVolumeTemplates:
    - metadata:
        name: windows-vm-rootdisk
        labels:
          app: windows-vm
          tutorial-level: "3"
          tutorial-module: "M4"
      spec:
        storage:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 60Gi
          storageClassName: ocs-storagecluster-ceph-rbd-virtualization
        source:
          pvc:
            name: windows-iso
            namespace: virtualization-lab
  template:
    metadata:
      labels:
        app: windows-vm
        kubevirt.io/domain: windows-vm
        tutorial-level: "3"
        tutorial-module: "M4"
      annotations:
        vm.kubevirt.io/flavor: large
        vm.kubevirt.io/os: windows2k22
        vm.kubevirt.io/workload: server
    spec:
      domain:
        clock:
          utc: {}
          timer:
            hpet:
              present: false
            pit:
              tickPolicy: delay
            rtc:
              tickPolicy: catchup
            hyperv: {}
        cpu:
          cores: 4
          sockets: 1
          threads: 2
        resources:
          requests:
            memory: 8Gi
            cpu: "2"
          limits:
            memory: 16Gi
            cpu: "8"
        features:
          acpi: {}
          apic: {}
          hyperv:
            relaxed: {}
            vapic: {}
            spinlocks:
              spinlocks: 8191
            vpindex: {}
            runtime: {}
            synic: {}
            stimer:
              direct: {}
            reset: {}
            frequencies: {}
            reenlightenment: {}
            tlbflush: {}
            ipi: {}
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: sata
            - name: virtiocontainerdisk
              cdrom:
                bus: sata
          interfaces:
            - name: default
              masquerade: {}
          tpm: {}
        machine:
          type: q35
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 600
      evictionStrategy: LiveMigrate
      volumes:
        - name: rootdisk
          dataVolume:
            name: windows-vm-rootdisk
        - name: virtiocontainerdisk
          containerDisk:
            image: registry.redhat.io/container-native-virtualization/virtio-win-rhel9:latest
