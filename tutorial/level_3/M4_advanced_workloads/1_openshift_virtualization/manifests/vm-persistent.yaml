# VirtualMachine with persistent storage — survives restarts and migrations
# Uses a DataVolume to import a disk image into a PVC automatically
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: persistent-vm
  namespace: virtualization-lab
  labels:
    app: persistent-vm
    tutorial-level: "3"
    tutorial-module: "M4"
    vm-workload: database
spec:
  running: false
  dataVolumeTemplates:
    - metadata:
        name: persistent-vm-rootdisk
        labels:
          app: persistent-vm
          tutorial-level: "3"
          tutorial-module: "M4"
      spec:
        storage:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 30Gi
          storageClassName: ocs-storagecluster-ceph-rbd-virtualization
        source:
          registry:
            url: docker://registry.redhat.io/rhel9/rhel-guest-image:latest
  template:
    metadata:
      labels:
        app: persistent-vm
        kubevirt.io/domain: persistent-vm
        tutorial-level: "3"
        tutorial-module: "M4"
      annotations:
        vm.kubevirt.io/flavor: medium
        vm.kubevirt.io/os: rhel9
        vm.kubevirt.io/workload: server
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        resources:
          requests:
            memory: 4Gi
            cpu: "1"
          limits:
            memory: 8Gi
            cpu: "4"
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
          rng: {}
        machine:
          type: q35
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 300
      evictionStrategy: LiveMigrate
      volumes:
        - name: rootdisk
          dataVolume:
            name: persistent-vm-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: admin
              password: changeme
              chpasswd:
                expire: false
              ssh_pwauth: true
