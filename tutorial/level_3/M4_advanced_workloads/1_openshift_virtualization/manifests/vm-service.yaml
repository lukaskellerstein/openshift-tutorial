# Service to expose the Fedora VM's HTTP server to other pods in the cluster
# Works exactly like a Kubernetes Service — VMs get pod-level networking
apiVersion: v1
kind: Service
metadata:
  name: fedora-vm-http
  namespace: virtualization-lab
  labels:
    app: fedora-vm
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  selector:
    kubevirt.io/domain: fedora-vm
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: ssh
      protocol: TCP
      port: 22
      targetPort: 22
  type: ClusterIP
