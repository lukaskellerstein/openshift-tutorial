# MigrationPolicy — defines live migration behavior for VMs matching the label selector
# Controls bandwidth limits, timeouts, and completion strategies
apiVersion: migrations.kubevirt.io/v1alpha1
kind: MigrationPolicy
metadata:
  name: production-migration-policy
  labels:
    app: virtualization-lab
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  selectors:
    virtualMachineInstanceSelector:
      vm-workload: database
  bandwidthPerMigration: 512Mi
  completionTimeoutPerGiB: 800
  allowAutoConverge: true
  allowPostCopy: false
