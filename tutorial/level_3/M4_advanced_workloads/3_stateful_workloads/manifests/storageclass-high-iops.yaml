# High-IOPS StorageClass for database workloads.
# This example uses AWS EBS io2 volumes. Adapt parameters for your
# storage backend (GCP pd-ssd, Azure Premium_LRS, ODF Ceph pool, etc.).
#
# Compare with the default gp3 StorageClass:
# - gp3: 3000 baseline IOPS, 125 MB/s throughput, $0.08/GB-month
# - io2: up to 64000 IOPS, 1000 MB/s throughput, $0.125/GB-month + $0.065/IOPS-month
#
# For ODF (Ceph), create a separate pool with SSD-only OSDs and
# reference it via the StorageClass parameters.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: high-iops-ssd
  labels:
    tutorial-level: "3"
    tutorial-module: "M4"
  annotations:
    description: "High-IOPS SSD storage for database workloads"
provisioner: ebs.csi.aws.com
parameters:
  type: io2
  iopsPerGB: "50"
  # Encryption at rest
  encrypted: "true"
  # Filesystem type — ext4 for general use, xfs for large sequential writes
  csi.storage.k8s.io/fstype: xfs
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
# Mount options for performance
mountOptions:
  - noatime
  - nodiratime
