# CrunchyData PostgreSQL cluster — production-grade HA configuration.
# Features: 3-instance HA (Patroni), PgBouncer connection pooling,
# pgBackRest backups to PVC (and optionally S3), monitoring exporter.
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: pg-production
  labels:
    app: pg-production
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  postgresVersion: 16
  # Image from the Red Hat certified catalog
  image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi8-16.4-1

  # --- Instance configuration ---
  instances:
    - name: pgha
      replicas: 3
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        # Uncomment for production storage class:
        # storageClassName: high-iops-ssd
      # Anti-affinity: spread PostgreSQL instances across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: pg-production
                    postgres-operator.crunchydata.com/instance-set: pgha
                topologyKey: kubernetes.io/hostname
      # Tolerations for dedicated database nodes (optional):
      # tolerations:
      #   - key: "workload-type"
      #     operator: "Equal"
      #     value: "database"
      #     effect: "NoSchedule"

  # --- Connection pooling with PgBouncer ---
  proxy:
    pgBouncer:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      # PgBouncer configuration
      config:
        global:
          # Transaction pooling mode — best for web applications
          pool_mode: transaction
          max_client_conn: "200"
          default_pool_size: "20"

  # --- Backup configuration with pgBackRest ---
  backups:
    pgbackrest:
      image: registry.developers.crunchydata.com/crunchydata/crunchy-pgbackrest:ubi8-2.51-1
      # Backup to a PVC (local). For production, add an S3 repo.
      repos:
        - name: repo1
          schedules:
            # Full backup every Sunday at 1:00 AM
            full: "0 1 * * 0"
            # Differential backup every day at 1:00 AM (except Sunday)
            differential: "0 1 * * 1-6"
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
        # Uncomment to add S3 backup repo for offsite backups:
        # - name: repo2
        #   schedules:
        #     full: "0 3 * * 0"
        #   s3:
        #     bucket: "my-pg-backups"
        #     endpoint: "s3.amazonaws.com"
        #     region: "us-east-1"
      # Global pgBackRest options
      global:
        # Retain 4 full backups (roughly 1 month with weekly fulls)
        repo1-retention-full: "4"
        repo1-retention-full-type: count
        # Compress backups
        repo1-cipher-type: none
        # Parallel processes for backup speed
        repo1-path: /pgbackrest/repo1
        process-max: "4"

  # --- PostgreSQL configuration ---
  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          # WAL configuration for HA
          wal_level: replica
          max_wal_senders: "10"
          max_replication_slots: "10"
          # Performance tuning (adjust based on instance resources)
          shared_buffers: 512MB
          effective_cache_size: 1536MB
          work_mem: 16MB
          maintenance_work_mem: 128MB
          # Checkpoint tuning
          checkpoint_completion_target: "0.9"
          wal_buffers: 16MB
          # Logging
          log_min_duration_statement: "1000"
          log_checkpoints: "on"

  # --- Monitoring ---
  monitoring:
    pgmonitor:
      exporter:
        image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres-exporter:ubi8-0.15.0-3
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # --- User and database configuration ---
  users:
    - name: appuser
      databases:
        - appdb
      options: "CREATEROLE"
    - name: readonly
      databases:
        - appdb
      options: "NOSUPERUSER NOCREATEDB"
