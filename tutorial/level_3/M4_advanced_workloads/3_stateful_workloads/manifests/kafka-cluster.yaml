# Strimzi Kafka cluster — production-grade 3-broker configuration.
# Features: JBOD storage, rack awareness, resource limits,
# TLS listeners, metrics exporter, and log retention tuning.
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-production
  labels:
    app: kafka-production
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  kafka:
    version: 3.6.0
    replicas: 3
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    # JVM tuning — heap should be ~50% of container memory limit
    jvmOptions:
      -Xms: 1536m
      -Xmx: 1536m
    listeners:
      # Internal plaintext listener for in-cluster clients
      - name: plain
        port: 9092
        type: internal
        tls: false
      # Internal TLS listener for secure in-cluster communication
      - name: tls
        port: 9093
        type: internal
        tls: true
      # External Route-based listener for out-of-cluster clients
      # OpenShift Routes provide TLS termination automatically
      - name: external
        port: 9094
        type: route
        tls: true
    config:
      # Replication factor — must be <= number of brokers
      default.replication.factor: 3
      min.insync.replicas: 2
      # Log retention — 7 days or 10 GB per partition, whichever first
      log.retention.hours: 168
      log.retention.bytes: 10737418240
      log.segment.bytes: 1073741824
      # Transaction and offset settings
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      # Performance tuning
      num.io.threads: 8
      num.network.threads: 3
      num.partitions: 12
      # Unclean leader election — set to false for data safety
      unclean.leader.election.enable: false
    # JBOD storage — multiple volumes per broker for throughput.
    # Use separate volumes for log data vs state/indexes.
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 20Gi
          deleteClaim: false
          # Uncomment for production storage class:
          # class: high-iops-ssd
        - id: 1
          type: persistent-claim
          size: 20Gi
          deleteClaim: false
    # Rack awareness — spreads replicas across failure domains.
    # Uses the topology.kubernetes.io/zone node label.
    rack:
      topologyKey: kubernetes.io/hostname
    # Pod anti-affinity
    template:
      pod:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      strimzi.io/cluster: kafka-production
                      strimzi.io/kind: Kafka
                  topologyKey: kubernetes.io/hostname
        # Graceful shutdown for clean partition handoff
        terminationGracePeriodSeconds: 120
    # Prometheus metrics exporter
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml

  # --- ZooKeeper configuration ---
  zookeeper:
    replicas: 3
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    jvmOptions:
      -Xms: 384m
      -Xmx: 384m
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
    template:
      pod:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      strimzi.io/cluster: kafka-production
                      strimzi.io/kind: Kafka
                  topologyKey: kubernetes.io/hostname

  # --- Entity Operator (manages topics and users) ---
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    userOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
---
# Kafka metrics ConfigMap for Prometheus JMX exporter
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics-config
  labels:
    app: kafka-production
    tutorial-level: "3"
    tutorial-module: "M4"
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: "kafka.server<type=(.+), name=(.+)><>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
      - pattern: "kafka.server<type=(.+), name=(.+)><>Count"
        name: "kafka_server_$1_$2_total"
        type: COUNTER
      - pattern: "kafka.server<type=(.+), name=(.+)><>(\\d+)thPercentile"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          quantile: "0.$3"
