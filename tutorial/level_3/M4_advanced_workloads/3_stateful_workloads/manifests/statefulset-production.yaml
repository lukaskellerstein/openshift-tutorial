# Production StatefulSet pattern — demonstrates anti-affinity, PDBs,
# resource limits, and proper storage configuration on OpenShift.
# This deploys a 3-node Redis cluster as a concrete example.
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  labels:
    app: redis-cluster
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  clusterIP: None
  selector:
    app: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: gossip
      port: 16379
      targetPort: 16379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-client
  labels:
    app: redis-cluster
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  type: ClusterIP
  selector:
    app: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-cluster-pdb
  labels:
    app: redis-cluster
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  # For a 3-node cluster, minAvailable=2 ensures quorum is maintained
  # during voluntary disruptions (node drains, upgrades)
  minAvailable: 2
  selector:
    matchLabels:
      app: redis-cluster
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  labels:
    app: redis-cluster
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  serviceName: redis-cluster
  replicas: 3
  selector:
    matchLabels:
      app: redis-cluster
  # OrderedReady: pods are created sequentially (pod-0 must be ready
  # before pod-1 starts). Use Parallel for workloads that don't
  # require ordered startup (e.g., Kafka brokers).
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable controls how many pods can be updated at once.
      # For quorum-based systems, keep this at 1.
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: redis-cluster
        tutorial-level: "3"
        tutorial-module: "M4"
    spec:
      # Service account for SCC binding — the restricted SCC is
      # sufficient for UBI-based Redis images.
      serviceAccountName: default
      # Topology spread constraints distribute pods across failure
      # domains. This is more flexible than podAntiAffinity.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: redis-cluster
      # Pod anti-affinity as a fallback — ensures no two Redis pods
      # run on the same node. Use preferredDuringScheduling on
      # clusters with fewer nodes than replicas (e.g., CRC).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: redis-cluster
                topologyKey: kubernetes.io/hostname
      # Graceful shutdown — give Redis time to persist data
      terminationGracePeriodSeconds: 60
      containers:
        - name: redis
          image: registry.redhat.io/rhel9/redis-7:latest
          ports:
            - containerPort: 6379
              name: redis
            - containerPort: 16379
              name: gossip
          # Resource requests == limits for Guaranteed QoS class.
          # This is required for CPU pinning (CPU Manager static policy)
          # and ensures predictable performance.
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Readiness probe — Redis responds to PING
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness probe — detects hung Redis processes
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          # Startup probe — allows extra time for initial data loading
          startupProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: redis-data
              mountPath: /var/lib/redis/data
          # Security context compatible with OpenShift restricted SCC
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
  # volumeClaimTemplates create a PVC per pod (redis-data-redis-cluster-0,
  # redis-data-redis-cluster-1, etc.). These persist across pod restarts.
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app: redis-cluster
          tutorial-level: "3"
          tutorial-module: "M4"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        # Uncomment and set to a specific StorageClass for production:
        # storageClassName: high-iops-ssd
