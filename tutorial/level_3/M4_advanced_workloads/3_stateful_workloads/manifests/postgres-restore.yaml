# PostgreSQL cluster restored from backup — point-in-time recovery example.
# This creates a NEW cluster from the pg-production backup repository.
# Use this for disaster recovery or creating a test clone from production data.
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: pg-restored
  labels:
    app: pg-restored
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  postgresVersion: 16
  image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi8-16.4-1

  # Restore from the pg-production backup
  dataSource:
    postgresCluster:
      clusterName: pg-production
      repoName: repo1
      # Point-in-time recovery options:
      # Uncomment to restore to a specific timestamp:
      # options:
      #   - --type=time
      #   - --target="2024-01-15 14:30:00+00"
      # Or restore to the latest available backup:
      # (default behavior when no options are specified)

  instances:
    - name: restore
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

  backups:
    pgbackrest:
      image: registry.developers.crunchydata.com/crunchydata/crunchy-pgbackrest:ubi8-2.51-1
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
