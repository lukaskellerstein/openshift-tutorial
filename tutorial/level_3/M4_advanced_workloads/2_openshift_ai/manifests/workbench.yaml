# Workbench (Notebook) CR -- creates a JupyterLab pod managed by RHOAI
# Uses the Kubeflow Notebook Controller CRD
# The notebook runs as non-root and complies with OpenShift restricted SCC
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: ml-workbench
  namespace: ds-project
  labels:
    app: ml-workbench
    tutorial-level: "3"
    tutorial-module: "M4"
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    notebooks.opendatahub.io/inject-oauth: "true"
    notebooks.opendatahub.io/oauth-logout-url: ""
    opendatahub.io/image-display-name: "Standard Data Science"
    opendatahub.io/accelerator-name: ""
spec:
  template:
    spec:
      containers:
        - name: ml-workbench
          # Standard Data Science notebook image with NumPy, Pandas, Scikit-learn, etc.
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-notebook:2024.1
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/ds-project/ml-workbench
                --ServerApp.quit_button=False
          volumeMounts:
            - name: workbench-storage
              mountPath: /opt/app-root/src
            - name: shm
              mountPath: /dev/shm
          workingDir: /opt/app-root/src
          livenessProbe:
            httpGet:
              path: /notebook/ds-project/ml-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /notebook/ds-project/ml-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
      volumes:
        - name: workbench-storage
          persistentVolumeClaim:
            claimName: ml-workbench-storage
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      tolerations: []
