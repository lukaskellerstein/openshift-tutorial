# KServe InferenceService -- deploys a single sklearn model with Knative Serving
# The model is loaded from S3-compatible storage and served via REST/gRPC
# Knative provides scale-to-zero when no inference requests are received
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sklearn-iris
  namespace: ds-project
  labels:
    app: sklearn-iris
    tutorial-level: "3"
    tutorial-module: "M4"
  annotations:
    serving.kserve.io/deploymentMode: Serverless
    sidecar.istio.io/inject: "true"
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 3
    scaleTarget: 10
    scaleMetric: concurrency
    model:
      modelFormat:
        name: sklearn
        version: "1"
      runtime: kserve-sklearnserver
      storageUri: "s3://models/sklearn/iris"
      resources:
        requests:
          cpu: "500m"
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
    serviceAccountName: default
