# ModelMesh ServingRuntime for scikit-learn models
# ModelMesh shares a pool of pods across multiple models for efficiency
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: modelmesh-sklearnserver
  namespace: ds-project
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/template-display-name: "Scikit-learn ServingRuntime (ModelMesh)"
    openshift.io/display-name: "Scikit-learn ModelMesh Runtime"
spec:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
  supportedModelFormats:
    - name: sklearn
      version: "1"
      autoSelect: true
  multiModel: true
  protocolVersions:
    - v1
    - v2
  grpcEndpoint: "port:8085"
  grpcDataEndpoint: "port:8001"
  containers:
    - name: mlserver
      image: docker.io/seldonio/mlserver:1.3.5-sklearn
      env:
        - name: MLSERVER_MODELS_DIR
          value: /models/_mlserver_models
        - name: MLSERVER_GRPC_PORT
          value: "8001"
        - name: MLSERVER_HTTP_PORT
          value: "8002"
        - name: MLSERVER_LOAD_MODELS_AT_STARTUP
          value: "false"
        - name: MLSERVER_MODEL_NAME
          value: dummy-model
        - name: MLSERVER_HOST
          value: "127.0.0.1"
      resources:
        requests:
          cpu: "500m"
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
  builtInAdapter:
    serverType: mlserver
    runtimeManagementPort: 8001
    memBufferBytes: 134217728
    modelLoadingTimeoutMillis: 90000
