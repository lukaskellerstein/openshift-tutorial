# Data connection secret for S3-compatible object storage
# Used by notebooks, model serving, and pipelines to access model artifacts
# In production, replace these values with your actual S3/Minio credentials
apiVersion: v1
kind: Secret
metadata:
  name: aws-connection-models
  namespace: ds-project
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: "Model Storage"
type: Opaque
stringData:
  # Replace with your actual S3-compatible storage credentials
  AWS_ACCESS_KEY_ID: "minio-access-key"
  AWS_SECRET_ACCESS_KEY: "minio-secret-key"
  AWS_S3_ENDPOINT: "http://minio.ds-project.svc:9000"
  AWS_S3_BUCKET: "models"
  AWS_DEFAULT_REGION: "us-east-1"
