# Node Feature Discovery (NFD) operator -- detects hardware features
# including GPU presence on cluster nodes. Required before the GPU Operator.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-nfd
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: nfd-operator-group
  namespace: openshift-nfd
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  targetNamespaces:
    - openshift-nfd
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: nfd
  namespace: openshift-nfd
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  channel: stable
  name: nfd
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
