# ModelMesh InferenceService -- deploys a model using the shared ModelMesh pod pool
# Compare with kserve-inference-service.yaml which uses dedicated Knative pods
# ModelMesh is more efficient when serving many small models concurrently
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sklearn-mm
  namespace: ds-project
  labels:
    app: sklearn-mm
    tutorial-level: "3"
    tutorial-module: "M4"
  annotations:
    # This annotation selects ModelMesh instead of KServe Serverless
    serving.kserve.io/deploymentMode: ModelMesh
spec:
  predictor:
    model:
      modelFormat:
        name: sklearn
        version: "1"
      runtime: modelmesh-sklearnserver
      storageUri: "s3://models/sklearn/iris-v2"
      storage:
        key: aws-connection-models
        path: sklearn/iris-v2
      resources:
        requests:
          cpu: "250m"
          memory: 256Mi
        limits:
          cpu: "500m"
          memory: 512Mi
