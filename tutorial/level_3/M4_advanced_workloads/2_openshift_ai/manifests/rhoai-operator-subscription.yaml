# Red Hat OpenShift AI (RHOAI) operator subscription
# This installs the rhods-operator which manages all RHOAI components
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhods-operator-group
  namespace: redhat-ods-operator
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhods-operator
  namespace: redhat-ods-operator
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  channel: stable
  name: rhods-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
