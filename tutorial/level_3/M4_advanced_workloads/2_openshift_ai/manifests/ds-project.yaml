# Data science project namespace with RHOAI labels
# The opendatahub.io/dashboard label makes this project visible in the RHOAI Dashboard
apiVersion: v1
kind: Namespace
metadata:
  name: ds-project
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "true"
  annotations:
    openshift.io/display-name: "Data Science Project"
    openshift.io/description: "Tutorial project for OpenShift AI workloads"
