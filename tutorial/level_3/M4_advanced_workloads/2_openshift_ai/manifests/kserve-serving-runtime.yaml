# KServe ServingRuntime for scikit-learn models
# Defines how sklearn models are loaded and served
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: kserve-sklearnserver
  namespace: ds-project
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/template-display-name: "Scikit-learn ServingRuntime (KServe)"
    openshift.io/display-name: "Scikit-learn ServingRuntime"
spec:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
  supportedModelFormats:
    - name: sklearn
      version: "1"
      autoSelect: true
  multiModel: false
  protocolVersions:
    - v1
    - v2
  containers:
    - name: kserve-container
      image: docker.io/kserve/sklearnserver:latest
      args:
        - "--model_name={{.Name}}"
        - "--model_dir=/mnt/models"
        - "--http_port=8080"
      resources:
        requests:
          cpu: "500m"
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      ports:
        - containerPort: 8080
          protocol: TCP
