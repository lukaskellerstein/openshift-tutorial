# NVIDIA GPU Operator -- automates GPU driver installation, device plugin,
# DCGM monitoring exporter, and GPU feature discovery on OpenShift nodes
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-gpu-operator
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: gpu-operator-group
  namespace: nvidia-gpu-operator
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  targetNamespaces:
    - nvidia-gpu-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: gpu-operator-certified
  namespace: nvidia-gpu-operator
  labels:
    app: rhoai
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  channel: v24.3
  name: gpu-operator-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
