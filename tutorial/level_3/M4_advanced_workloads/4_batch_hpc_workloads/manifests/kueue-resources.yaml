# Kueue resources for job queueing and fair scheduling
# Requires: Kueue operator installed (available via OperatorHub)
#
# Kueue manages job admission based on cluster capacity and fair-sharing
# policies. It does NOT replace the kube-scheduler; instead it gates
# when a Job's pods are allowed to be created.
---
# ClusterQueue defines the pool of resources available for batch work
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: batch-cluster-queue
  labels:
    app: kueue-batch
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  namespaceSelector: {}
  queueingStrategy: BestEffortFIFO
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: default-flavor
          resources:
            - name: cpu
              nominalQuota: "8"
              borrowingLimit: "4"
            - name: memory
              nominalQuota: 16Gi
              borrowingLimit: 8Gi
    - coveredResources: ["nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: nvidia.com/gpu
              nominalQuota: "2"
              borrowingLimit: "0"
---
# ResourceFlavor represents a type of resource (e.g., a node pool)
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: default-flavor
  labels:
    app: kueue-batch
    tutorial-level: "3"
    tutorial-module: "M4"
spec: {}
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-flavor
  labels:
    app: kueue-batch
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  nodeLabels:
    nvidia.com/gpu.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
---
# LocalQueue is the namespace-scoped queue that users submit Jobs to
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: batch-local-queue
  labels:
    app: kueue-batch
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  clusterQueue: batch-cluster-queue
---
# WorkloadPriorityClass defines priority levels for Kueue
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: high-priority
  labels:
    app: kueue-batch
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  value: 1000
  description: "High priority batch workloads"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: low-priority
  labels:
    app: kueue-batch
    tutorial-level: "3"
    tutorial-module: "M4"
spec:
  value: 100
  description: "Low priority batch workloads (preemptible)"
