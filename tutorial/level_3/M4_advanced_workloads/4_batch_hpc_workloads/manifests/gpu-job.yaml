# GPU-accelerated batch Job using NVIDIA GPU Operator resources
# Requires: NVIDIA GPU Operator installed via OperatorHub
# Requires: Nodes with NVIDIA GPUs and the gpu-operator-resources namespace
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-ml-training
  labels:
    app: gpu-ml-training
    tutorial-level: "3"
    tutorial-module: "M4"
    workload-type: gpu
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 2
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: gpu-ml-training
        tutorial-level: "3"
        tutorial-module: "M4"
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: training
          image: nvcr.io/nvidia/cuda:12.2.0-runtime-ubi9
          command:
            - /bin/sh
            - -c
            - |
              echo "=== GPU ML Training Job ==="
              echo "Checking GPU availability..."
              nvidia-smi || echo "nvidia-smi not available (no GPU node)"
              echo "CUDA_VISIBLE_DEVICES: $CUDA_VISIBLE_DEVICES"
              echo "GPU training simulation..."
              sleep 30
              echo "Training complete."
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
