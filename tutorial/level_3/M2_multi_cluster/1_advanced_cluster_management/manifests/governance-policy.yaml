# Governance Policies — enforce standards across managed clusters.
#
# This file contains two policies:
#   1. policy-resource-quota (inform mode): Audits whether the default namespace
#      has a ResourceQuota. Does NOT auto-create it — just reports violations.
#   2. policy-deny-all-networkpolicy (enforce mode): Automatically creates a
#      deny-all-ingress NetworkPolicy on managed clusters that lack one.
#
# Production guidance:
#   - Start all policies in "inform" mode to assess impact
#   - Switch to "enforce" only after reviewing violations
#   - Use annotations for compliance framework mapping (NIST, CIS, etc.)
---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-resource-quota
  namespace: open-cluster-management
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: inform
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-resource-quota
        spec:
          remediationAction: inform
          severity: medium
          namespaceSelector:
            include:
              - default
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ResourceQuota
                metadata:
                  name: default-quota
                spec:
                  hard:
                    requests.cpu: "4"
                    requests.memory: 8Gi
                    limits.cpu: "8"
                    limits.memory: 16Gi
                    pods: "20"
                    services: "10"
---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-deny-all-networkpolicy
  namespace: open-cluster-management
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-7 Boundary Protection
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-deny-all-networkpolicy
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include:
              - default
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: deny-all-ingress
                spec:
                  podSelector: {}
                  policyTypes:
                    - Ingress
