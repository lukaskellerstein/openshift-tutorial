# KlusterletAddonConfig — configures which ACM add-ons run on the managed cluster.
# Each enabled add-on deploys a controller on the spoke that handles its domain:
#   - applicationManager: Processes Subscription-based application deployments
#   - policyController: Enforces governance policies locally
#   - certPolicyController: Monitors certificate expiration
#   - iamPolicyController: Enforces IAM-related policies
#   - searchCollector: Indexes cluster resources for the hub's federated search
apiVersion: agent.open-cluster-management.io/v1
kind: KlusterletAddonConfig
metadata:
  name: spoke-cluster-1
  namespace: spoke-cluster-1
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  clusterName: spoke-cluster-1
  clusterNamespace: spoke-cluster-1
  applicationManager:
    enabled: true
  certPolicyController:
    enabled: true
  iamPolicyController:
    enabled: true
  policyController:
    enabled: true
  searchCollector:
    enabled: true
