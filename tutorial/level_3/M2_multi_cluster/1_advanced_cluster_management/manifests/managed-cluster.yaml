# ManagedCluster — registers a spoke cluster with the ACM hub.
# Apply this on the hub cluster. The hub will generate import credentials
# in a secret within the auto-created namespace (same name as the cluster).
# Labels on this resource drive Placement selection and cluster organization.
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: spoke-cluster-1
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
    cloud: AWS
    vendor: OpenShift
    environment: staging
    region: us-east-1
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60
