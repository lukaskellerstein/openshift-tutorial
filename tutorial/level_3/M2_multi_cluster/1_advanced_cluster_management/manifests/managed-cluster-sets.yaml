# ManagedClusterSets — group clusters for RBAC and Placement selection.
# In production, group by environment (prod/staging/dev), region, or business unit.
# Clusters are added to a set by labeling them with:
#   cluster.open-cluster-management.io/clusterset=<set-name>
#
# ExclusiveClusterSetLabel means a cluster can only belong to one set at a time.
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSet
metadata:
  name: production-clusters
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  clusterSelector:
    selectorType: ExclusiveClusterSetLabel
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSet
metadata:
  name: staging-clusters
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  clusterSelector:
    selectorType: ExclusiveClusterSetLabel
