# MultiClusterHub — deploys all ACM subsystems on the hub cluster.
# This is the central resource that brings up cluster lifecycle management,
# governance, application lifecycle, observability, and console integration.
# Deployment takes 10-15 minutes and creates ~30-40 pods.
apiVersion: operator.open-cluster-management.io/v1
kind: MultiClusterHub
metadata:
  name: multiclusterhub
  namespace: open-cluster-management
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  availabilityConfig: High
