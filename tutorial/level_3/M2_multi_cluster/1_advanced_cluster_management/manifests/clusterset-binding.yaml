# ManagedClusterSetBinding — binds a ManagedClusterSet to a namespace.
# This is required before any Placement in that namespace can select
# clusters from the bound set. Without this binding, the Placement
# controller will not consider clusters from the set.
#
# RBAC note: creating a binding requires the "bind" permission on the
# ManagedClusterSet. This prevents unprivileged users from targeting
# clusters they should not have access to.
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: staging-clusters
  namespace: open-cluster-management
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  clusterSet: staging-clusters
