# Placement and PlacementBinding — connects governance policies to clusters.
#
# The Placement selects clusters from the staging-clusters ManagedClusterSet
# that have the label environment=staging. The PlacementBinding connects
# both governance policies to this Placement so they are enforced on the
# selected clusters.
#
# Note: PlacementBinding can reference multiple subjects (policies) with
# a single Placement, reducing duplication.
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: staging-placement
  namespace: open-cluster-management
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            environment: staging
  clusterSets:
    - staging-clusters
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-policy-resource-quota
  namespace: open-cluster-management
  labels:
    app: acm
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  placementRef:
    apiGroup: cluster.open-cluster-management.io
    kind: Placement
    name: staging-placement
  subjects:
    - apiGroup: policy.open-cluster-management.io
      kind: Policy
      name: policy-resource-quota
    - apiGroup: policy.open-cluster-management.io
      kind: Policy
      name: policy-deny-all-networkpolicy
