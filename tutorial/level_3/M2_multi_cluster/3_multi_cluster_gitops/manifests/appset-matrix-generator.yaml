# Matrix generator -- combines an app list with cluster discovery
# Generates one Application per (app, cluster) pair.
# 3 apps x N prod clusters = 3N Applications from a single manifest.
# Adding a new app or cluster requires changing only one list.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps
  namespace: openshift-gitops
  labels:
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - appName: frontend
                  appPath: apps/frontend
                - appName: backend-api
                  appPath: apps/backend-api
                - appName: worker
                  appPath: apps/worker
          - clusters:
              selector:
                matchLabels:
                  env: prod
              values:
                environment: prod
  template:
    metadata:
      name: '{{.appName}}-{{.name}}'
      labels:
        app: '{{.appName}}'
        environment: '{{.values.environment}}'
        tutorial-level: "3"
        tutorial-module: "M2"
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/gitops-repo.git
        targetRevision: main
        path: '{{.appPath}}/overlays/{{.values.environment}}'
      destination:
        server: '{{.server}}'
        namespace: 'platform-{{.values.environment}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
