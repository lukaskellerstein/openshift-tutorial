# ApplicationSet using cluster generator -- dynamically discovers clusters by label
# Clusters are selected by their labels in ArgoCD's cluster registry.
# Adding a new cluster with the right label automatically creates an Application.
# Compare with appset-list-generator.yaml for static cluster lists.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-cluster-gen
  namespace: openshift-gitops
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            env: dev
        values:
          environment: dev
          namespace: demo-dev
    - clusters:
        selector:
          matchLabels:
            env: staging
        values:
          environment: staging
          namespace: demo-staging
    - clusters:
        selector:
          matchLabels:
            env: prod
        values:
          environment: prod
          namespace: demo-prod
  template:
    metadata:
      name: 'demo-app-{{.name}}'
      labels:
        app: demo-app
        environment: '{{.values.environment}}'
        tutorial-level: "3"
        tutorial-module: "M2"
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/gitops-repo.git
        targetRevision: main
        path: 'apps/demo-app/overlays/{{.values.environment}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.values.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
