# ApplicationSet using clusterDecisionResource -- delegates cluster selection
# to RHACM Placement policies. This is the most powerful approach:
# RHACM evaluates cluster labels, health, and resource capacity to decide
# which clusters receive the workload.
# Requires: placement-prod.yaml and acm-placement-configmap.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-placement
  namespace: openshift-gitops
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: prod-clusters
        requeueAfterSeconds: 180
  template:
    metadata:
      name: 'demo-app-{{.clusterName}}'
      labels:
        app: demo-app
        environment: prod
        tutorial-level: "3"
        tutorial-module: "M2"
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/gitops-repo.git
        targetRevision: main
        path: apps/demo-app/overlays/prod
      destination:
        server: '{{.server}}'
        namespace: demo-prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: region
              operator: In
              values:
                - us-east
        - matchExpressions:
            - key: region
              operator: In
              values:
                - us-west
