# ConfigMap that tells ArgoCD how to read RHACM PlacementDecision resources.
# This bridges the ArgoCD clusterDecisionResource generator with RHACM's
# Placement API. Without this, ArgoCD cannot discover which clusters
# RHACM has selected.
apiVersion: v1
kind: ConfigMap
metadata:
  name: acm-placement
  namespace: openshift-gitops
  labels:
    tutorial-level: "3"
    tutorial-module: "M2"
data:
  apiVersion: cluster.open-cluster-management.io/v1beta1
  kind: PlacementDecision
  statusListKey: decisions
  matchKey: clusterName
