# RHACM Placement -- selects production clusters based on labels, platform,
# and health. Used by appset-placement.yaml via clusterDecisionResource.
# The tolerations ensure clusters briefly going unreachable (e.g., during
# upgrades) are not immediately deselected, preventing workload churn.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: prod-clusters
  namespace: openshift-gitops
  labels:
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            env: prod
        claimSelector:
          matchExpressions:
            - key: platform.open-cluster-management.io
              operator: In
              values:
                - OpenShift
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
      tolerationSeconds: 300
  decisionStrategy:
    groupStrategy:
      clustersPerDecisionGroup: 1
