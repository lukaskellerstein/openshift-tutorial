# Application Deployment targeted to remote worker nodes
# Uses nodeSelector and tolerations to schedule only on remote workers.
# Includes anti-affinity to spread across remote sites when multiple exist.
#
# This deployment pattern is typical for branch-office workloads:
# - Runs locally at the remote site for low latency
# - Survives WAN disconnects (pods keep running)
# - Managed centrally from the data center control plane
apiVersion: apps/v1
kind: Deployment
metadata:
  name: branch-pos-system
  labels:
    app: branch-pos-system
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: branch-pos-system
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: branch-pos-system
        tutorial-level: "3"
        tutorial-module: "M2"
    spec:
      # Schedule only on remote worker nodes
      nodeSelector:
        node-role.kubernetes.io/remote-worker: ""
        topology.kubernetes.io/zone: branch-nyc
      # Tolerate the remote-worker taint
      tolerations:
        - key: node-role.kubernetes.io/remote-worker
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: branch-pos-system
                topologyKey: kubernetes.io/hostname
      containers:
        - name: pos
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "POS system started at branch $(hostname)"
              while true; do
                echo "[$(date -Iseconds)] POS heartbeat --- transactions processing"
                sleep 15
              done
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      # Ensure pods restart quickly after a node reboot
      terminationGracePeriodSeconds: 30
      # Use a priority class to ensure POS pods are not evicted
      # under resource pressure
      priorityClassName: system-cluster-critical
