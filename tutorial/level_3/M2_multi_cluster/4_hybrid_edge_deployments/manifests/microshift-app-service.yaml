# Service for the MicroShift edge data collector application
# Standard Kubernetes Service --- works identically on MicroShift and full OpenShift.
apiVersion: v1
kind: Service
metadata:
  name: edge-data-collector
  labels:
    app: edge-data-collector
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  selector:
    app: edge-data-collector
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
