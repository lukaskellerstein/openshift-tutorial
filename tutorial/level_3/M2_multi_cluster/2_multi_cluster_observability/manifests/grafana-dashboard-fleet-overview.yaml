# Grafana dashboard ConfigMap for fleet-wide cluster overview.
# Imported automatically by the ACM Observability Grafana instance.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fleet-overview-dashboard
  namespace: open-cluster-management-observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
    grafana-custom-dashboard: "true"
data:
  fleet-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Managed Clusters Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(up{job=\"kubelet\"} == 1) by (cluster)",
              "legendFormat": "{{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "Fleet CPU Utilization by Cluster",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "avg by (cluster) (1 - rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100",
              "legendFormat": "{{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          }
        },
        {
          "title": "Fleet Memory Utilization by Cluster",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "avg by (cluster) (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "title": "Pod Count by Cluster",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "count by (cluster) (kube_pod_info)",
              "legendFormat": "{{ cluster }}"
            }
          ]
        },
        {
          "title": "API Server Request Rate by Cluster",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum by (cluster) (rate(apiserver_request_total[5m]))",
              "legendFormat": "{{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          }
        },
        {
          "title": "etcd Leader Changes by Cluster",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "changes(etcd_server_is_leader[1h])",
              "legendFormat": "{{ cluster }} - {{ pod }}"
            }
          ]
        },
        {
          "title": "Cluster Node Readiness",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "kube_node_status_condition{condition=\"Ready\",status=\"true\"}",
              "legendFormat": "{{ cluster }} / {{ node }}",
              "instant": true,
              "format": "table"
            }
          ]
        }
      ],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["fleet", "multi-cluster", "overview"],
      "templating": {
        "list": [
          {
            "name": "cluster",
            "type": "query",
            "query": "label_values(up, cluster)",
            "multi": true,
            "includeAll": true
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Fleet Overview",
      "uid": "fleet-overview-001"
    }
