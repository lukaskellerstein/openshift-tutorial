# MultiClusterObservability CR — enables Thanos-based metrics aggregation
# across all managed clusters registered with RHACM.
# Requires: open-cluster-management-observability namespace
# Requires: Thanos object storage secret (see thanos-object-storage-secret.yaml)
apiVersion: observability.open-cluster-management.io/v1beta2
kind: MultiClusterObservability
metadata:
  name: observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  observabilityAddonSpec:
    enableMetrics: true
    interval: 300
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  storageConfig:
    metricObjectStorage:
      name: thanos-object-storage
      key: thanos.yaml
    compactStorageSize: 100Gi
    receiveStorageSize: 100Gi
    ruleStorageSize: 20Gi
    storeStorageSize: 100Gi
    storageClass: gp3-csi
  retentionConfig:
    blockDuration: 2h
    deleteDelay: 48h
    retentionInLocal: 24h
    retentionResolutionRaw: 30d
    retentionResolution5m: 180d
    retentionResolution1h: 365d
  advanced:
    receive:
      replicas: 3
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 8Gi
    store:
      replicas: 3
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 8Gi
    query:
      replicas: 2
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
    queryFrontend:
      replicas: 2
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
    compact:
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 8Gi
    rule:
      replicas: 2
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
    grafana:
      replicas: 2
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
    alertmanager:
      replicas: 3
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
