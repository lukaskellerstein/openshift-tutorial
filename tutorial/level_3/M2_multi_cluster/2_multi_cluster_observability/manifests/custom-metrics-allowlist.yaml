# ConfigMap to allow custom application metrics to be collected
# from managed clusters and forwarded to the hub.
# By default, ACM Observability only collects a predefined set of
# platform metrics. This allowlist adds application-specific metrics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-metrics-custom-allowlist
  namespace: open-cluster-management-observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
data:
  metrics_list.yaml: |
    names:
      - http_requests_total
      - http_request_duration_seconds_bucket
      - http_request_duration_seconds_sum
      - http_request_duration_seconds_count
      - process_cpu_seconds_total
      - process_resident_memory_bytes
      - go_goroutines
      - container_cpu_usage_seconds_total
      - container_memory_working_set_bytes
      - kube_pod_container_resource_requests
      - kube_pod_container_resource_limits
      - node_cpu_seconds_total
      - node_memory_MemAvailable_bytes
      - node_disk_io_time_seconds_total
      - node_network_receive_bytes_total
      - node_network_transmit_bytes_total
    matches:
      - __name__="apiserver_request_total",job="apiserver"
      - __name__="workqueue_depth",job="apiserver"
      - __name__="etcd_server_has_leader"
