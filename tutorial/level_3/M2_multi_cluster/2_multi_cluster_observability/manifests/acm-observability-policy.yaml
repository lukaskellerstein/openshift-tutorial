# ACM Policy to ensure OpenShift Logging operator is installed and
# ClusterLogForwarder is configured on all managed clusters.
# This automates the distribution of logging configuration.
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-observability-logging
  namespace: open-cluster-management
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: AU Audit and Accountability
    policy.open-cluster-management.io/controls: AU-6 Audit Review
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ensure-logging-operator
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: cluster-logging
                  namespace: openshift-logging
                spec:
                  channel: stable
                  installPlanApproval: Automatic
                  name: cluster-logging
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: ensure-logging-instance
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: logging.openshift.io/v1
                kind: ClusterLogging
                metadata:
                  name: instance
                  namespace: openshift-logging
                spec:
                  managementState: Managed
                  collection:
                    type: vector
---
# PlacementRule to target all managed clusters
apiVersion: apps.open-cluster-management.io/v1
kind: PlacementRule
metadata:
  name: placement-observability-logging
  namespace: open-cluster-management
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  clusterSelector:
    matchExpressions:
      - key: vendor
        operator: In
        values:
          - OpenShift
---
# Bind the policy to the placement rule
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-observability-logging
  namespace: open-cluster-management
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
placementRef:
  name: placement-observability-logging
  kind: PlacementRule
  apiGroup: apps.open-cluster-management.io
subjects:
  - name: policy-observability-logging
    kind: Policy
    apiGroup: policy.open-cluster-management.io
