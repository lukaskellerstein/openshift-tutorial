# ClusterLogForwarder on managed clusters — forwards logs to the hub's
# centralized logging infrastructure.
# This manifest should be deployed to each managed cluster via ACM policies
# or GitOps (ArgoCD ApplicationSets).
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
  labels:
    app: multi-cluster-logging
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  outputs:
    - name: central-loki
      type: loki
      url: https://loki-gateway.hub-cluster.example.com:3100
      secret:
        name: central-loki-credentials
      loki:
        tenantKey: kubernetes.namespace_name
      tls:
        insecureSkipVerify: false
        caBundle:
          secretName: central-loki-ca
          key: ca-bundle.crt
    - name: central-elasticsearch
      type: elasticsearch
      url: https://elasticsearch.hub-cluster.example.com:9200
      secret:
        name: central-es-credentials
  inputs:
    - name: application-logs
      application:
        namespaces:
          - my-app-production
          - my-app-staging
    - name: infrastructure-logs
      infrastructure: {}
    - name: audit-logs
      audit: {}
  pipelines:
    - name: app-logs-to-loki
      inputRefs:
        - application-logs
      outputRefs:
        - central-loki
      labels:
        log-type: application
        cluster: managed-cluster-1
    - name: infra-logs-to-loki
      inputRefs:
        - infrastructure-logs
      outputRefs:
        - central-loki
      labels:
        log-type: infrastructure
        cluster: managed-cluster-1
    - name: audit-to-elasticsearch
      inputRefs:
        - audit-logs
      outputRefs:
        - central-elasticsearch
      labels:
        log-type: audit
        cluster: managed-cluster-1
---
# Secret for authenticating to the central Loki instance
# Replace with actual credentials
apiVersion: v1
kind: Secret
metadata:
  name: central-loki-credentials
  namespace: openshift-logging
  labels:
    app: multi-cluster-logging
    tutorial-level: "3"
    tutorial-module: "M2"
type: Opaque
stringData:
  username: managed-cluster-1
  password: <LOKI_AUTH_TOKEN>
