# Thanos object storage configuration secret.
# This example uses AWS S3. Replace with your storage provider.
# Supported backends: S3, GCS, Azure Blob, OpenShift Data Foundation (NooBaa).
# IMPORTANT: Replace placeholder values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: thanos-object-storage
  namespace: open-cluster-management-observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
type: Opaque
stringData:
  thanos.yaml: |
    type: s3
    config:
      bucket: acm-observability-metrics
      endpoint: s3.us-east-1.amazonaws.com
      insecure: false
      access_key: <YOUR_ACCESS_KEY>
      secret_key: <YOUR_SECRET_KEY>
---
