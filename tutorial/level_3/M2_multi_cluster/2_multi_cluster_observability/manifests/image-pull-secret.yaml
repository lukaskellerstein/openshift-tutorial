# Pull secret for the observability namespace.
# Copies the existing pull-secret from openshift-config.
# The scripts/setup-observability.sh automates this extraction.
#
# To create manually:
#   DOCKER_CONFIG_JSON=$(oc extract secret/pull-secret \
#     -n openshift-config --to=-)
#
#   oc create secret generic multiclusterhub-operator-pull-secret \
#     -n open-cluster-management-observability \
#     --from-literal=.dockerconfigjson="$DOCKER_CONFIG_JSON" \
#     --type=kubernetes.io/dockerconfigjson
#
# This file is a placeholder template; use the script for actual deployment.
apiVersion: v1
kind: Secret
metadata:
  name: multiclusterhub-operator-pull-secret
  namespace: open-cluster-management-observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
