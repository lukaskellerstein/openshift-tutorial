# Custom alerting rules applied across all managed clusters.
# These rules evaluate on the hub using aggregated Thanos data.
apiVersion: observability.open-cluster-management.io/v1beta1
kind: MultiClusterObservability
metadata:
  name: fleet-alerting-rules
  namespace: open-cluster-management-observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
---
# PrometheusRule deployed via ACM policies or directly on the hub
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fleet-wide-alerts
  namespace: open-cluster-management-observability
  labels:
    app: acm-observability
    tutorial-level: "3"
    tutorial-module: "M2"
spec:
  groups:
    - name: fleet-cluster-health
      interval: 60s
      rules:
        - alert: ManagedClusterHighCPU
          expr: |
            avg by (cluster) (
              1 - rate(node_cpu_seconds_total{mode="idle"}[5m])
            ) > 0.85
          for: 15m
          labels:
            severity: warning
            scope: fleet
          annotations:
            summary: "Cluster {{ $labels.cluster }} CPU usage above 85%"
            description: >
              The average CPU utilization across all nodes in cluster
              {{ $labels.cluster }} has been above 85% for 15 minutes.
              Consider scaling up or redistributing workloads.
            runbook_url: https://wiki.example.com/runbooks/high-cpu

        - alert: ManagedClusterHighMemory
          expr: |
            avg by (cluster) (
              1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
            ) > 0.90
          for: 10m
          labels:
            severity: critical
            scope: fleet
          annotations:
            summary: "Cluster {{ $labels.cluster }} memory usage above 90%"
            description: >
              Memory utilization in cluster {{ $labels.cluster }} is critically
              high. OOM kills are likely. Immediate action required.

        - alert: ManagedClusterNodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            scope: fleet
          annotations:
            summary: "Node {{ $labels.node }} in cluster {{ $labels.cluster }} is not Ready"
            description: >
              A node has been in NotReady state for 5 minutes.
              Check kubelet and node health.

        - alert: ManagedClusterAPIServerDown
          expr: |
            up{job="apiserver"} == 0
          for: 3m
          labels:
            severity: critical
            scope: fleet
          annotations:
            summary: "API server down in cluster {{ $labels.cluster }}"
            description: >
              The Kubernetes API server is unreachable in cluster
              {{ $labels.cluster }}. Investigate immediately.

        - alert: ManagedClusterEtcdHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            scope: fleet
          annotations:
            summary: "etcd WAL fsync latency high in cluster {{ $labels.cluster }}"
            description: >
              The 99th percentile etcd WAL fsync latency exceeds 500ms.
              This may indicate disk I/O issues affecting cluster stability.

    - name: fleet-observability-health
      interval: 120s
      rules:
        - alert: ObservabilityMetricsCollectionLag
          expr: |
            time() - max by (cluster) (
              timestamp(up{job="kubelet"})
            ) > 600
          for: 10m
          labels:
            severity: warning
            scope: observability
          annotations:
            summary: "Metrics collection lag from cluster {{ $labels.cluster }}"
            description: >
              No fresh metrics received from cluster {{ $labels.cluster }}
              for over 10 minutes. Check the metrics-collector addon.

        - alert: ThanosCompactHalted
          expr: thanos_compact_halted == 1
          for: 5m
          labels:
            severity: warning
            scope: observability
          annotations:
            summary: "Thanos Compact has halted"
            description: >
              Thanos Compact has stopped running. Old data will not be
              downsampled or cleaned up. Check compact pod logs.
