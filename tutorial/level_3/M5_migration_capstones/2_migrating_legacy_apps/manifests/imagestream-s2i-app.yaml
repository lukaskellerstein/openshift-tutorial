# ImageStream for the S2I-built legacy application (replatform)
# Tracks the image produced by the s2i-legacy-app BuildConfig
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: s2i-legacy-app
  labels:
    app: legacy-app
    tutorial-level: "3"
    tutorial-module: "M5"
    migration-strategy: replatform
