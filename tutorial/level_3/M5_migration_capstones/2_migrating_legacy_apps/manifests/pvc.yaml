# PersistentVolumeClaim for legacy application data
# Many legacy apps write to the local filesystem (uploads, caches, logs)
# This PVC provides persistent storage that survives pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: legacy-app-data
  labels:
    app: legacy-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
