# ConfigMap for externalized legacy application configuration
# Replaces hardcoded config files that were baked into the VM deployment
# Mount at the path the legacy app expects (e.g., /opt/app-root/config/)
apiVersion: v1
kind: ConfigMap
metadata:
  name: legacy-app-config
  labels:
    app: legacy-app
    tutorial-level: "3"
    tutorial-module: "M5"
data:
  application.properties: |
    # Database configuration (externalized from legacy hardcoded values)
    db.host=${DB_HOST:localhost}
    db.port=${DB_PORT:5432}
    db.name=legacydb
    db.pool.min=5
    db.pool.max=20
    db.pool.timeout=30000

    # Application settings
    app.context-path=/legacy
    app.session.timeout=1800
    app.logging.level=INFO
    app.logging.dir=/var/log/app

    # Feature flags for migration
    app.feature.use-external-cache=true
    app.feature.legacy-auth=false
  logging.properties: |
    # Logging configuration -- redirect to stdout for container best practices
    handlers=java.util.logging.ConsoleHandler
    java.util.logging.ConsoleHandler.level=INFO
    java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
    java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s - %5$s%6$s%n
