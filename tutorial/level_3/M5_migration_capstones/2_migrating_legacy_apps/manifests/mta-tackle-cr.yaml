# Tackle CR -- deploys the MTA (Migration Toolkit for Applications) instance
# Creates the web console for application inventory, assessment, and analysis
# Requires the MTA operator to be installed first (mta-operator-subscription.yaml)
apiVersion: tackle.konveyor.io/v1alpha1
kind: Tackle
metadata:
  name: tackle
  namespace: openshift-mta
  labels:
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  feature_auth_required: false
