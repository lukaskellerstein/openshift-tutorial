# Production Deployment for the migrated legacy application
# Key migration adaptations:
#   - Non-root execution (restricted SCC compatible)
#   - Externalized config via ConfigMap volume mount
#   - Resource requests and limits for capacity planning
#   - Health checks for platform-managed lifecycle
#   - Timezone set to match legacy environment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-app
  labels:
    app: legacy-app
    tutorial-level: "3"
    tutorial-module: "M5"
    migration-strategy: replatform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacy-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: legacy-app
        tutorial-level: "3"
        tutorial-module: "M5"
    spec:
      containers:
        - name: legacy-app
          image: s2i-legacy-app:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: "America/New_York"
            - name: DB_HOST
              value: "legacy-db.legacy-migration.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -Djava.net.preferIPv4Stack=true"
          envFrom:
            - secretRef:
                name: legacy-app-secrets
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - name: config-volume
              mountPath: /opt/app-root/config
              readOnly: true
            - name: data-volume
              mountPath: /opt/app-root/data
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config-volume
          configMap:
            name: legacy-app-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: legacy-app-data
      terminationGracePeriodSeconds: 60
