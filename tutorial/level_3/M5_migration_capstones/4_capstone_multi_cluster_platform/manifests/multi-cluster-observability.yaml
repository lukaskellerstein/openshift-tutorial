# MultiClusterObservability CR
# Deploys Thanos, Grafana, and AlertManager on the hub
# Automatically collects metrics from all managed clusters
# Builds on observability concepts from L3-M2.2
apiVersion: observability.open-cluster-management.io/v1beta2
kind: MultiClusterObservability
metadata:
  name: observability
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  observabilityAddonSpec:
    enableMetrics: true
    interval: 30
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  storageConfig:
    metricObjectStorage:
      name: thanos-object-storage
      key: thanos.yaml
    statefulSetSize: 10Gi
    statefulSetStorageClass: gp3-csi
    compactStorageSize: 50Gi
    ruleStorageSize: 5Gi
    receiveStorageSize: 50Gi
    storeStorageSize: 10Gi
  retentionConfig:
    blockDuration: 2h
    deleteDelay: 48h
    retentionInLocal: 24h
    retentionResolutionRaw: 30d
    retentionResolution5m: 180d
    retentionResolution1h: 365d
  advanced:
    grafana:
      replicas: 2
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
    alertmanager:
      replicas: 3
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi
    queryFrontend:
      replicas: 2
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
    receive:
      replicas: 3
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
    compact:
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
    store:
      replicas: 3
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 4Gi
