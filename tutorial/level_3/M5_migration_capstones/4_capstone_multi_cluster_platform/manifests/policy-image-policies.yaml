# Policy: Restrict container image sources to approved registries
# Only images from trusted registries are allowed
# Builds on image security concepts from L2-M5.1
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-image-policies
  namespace: platform-policies
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
    policy-category: security
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: allowed-registries
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: config.openshift.io/v1
                kind: Image
                metadata:
                  name: cluster
                spec:
                  registrySources:
                    allowedRegistries:
                      - registry.redhat.io
                      - registry.access.redhat.com
                      - quay.io
                      - image-registry.openshift-image-registry.svc:5000
                      - ghcr.io
                    blockedRegistries:
                      - docker.io/library
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-policy-image-policies
  namespace: platform-policies
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
placementRef:
  name: placement-production-clusters
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-image-policies
    apiGroup: policy.open-cluster-management.io
    kind: Policy
