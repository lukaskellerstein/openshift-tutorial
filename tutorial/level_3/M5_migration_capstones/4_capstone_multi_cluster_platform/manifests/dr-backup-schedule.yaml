# Velero backup schedule for the capstone application
# Runs daily at 02:00 UTC with 30-day retention
# Builds on DR concepts from L3-M3.3
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: capstone-app-daily
  namespace: velero
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
    backup-type: scheduled
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
      - capstone-app
    includedResources:
      - deployments
      - services
      - routes
      - configmaps
      - secrets
      - persistentvolumeclaims
      - networkpolicies
      - serviceaccounts
    labelSelector:
      matchLabels:
        app: capstone-app
    storageLocation: default
    volumeSnapshotLocations:
      - default
    ttl: 720h0m0s
    snapshotVolumes: true
    defaultVolumesToFsBackup: false
    metadata:
      labels:
        app: capstone-app
        backup-type: scheduled
---
# On-demand backup template for pre-failover snapshots
apiVersion: velero.io/v1
kind: Backup
metadata:
  name: capstone-app-prefailover
  namespace: velero
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
    backup-type: prefailover
spec:
  includedNamespaces:
    - capstone-app
  labelSelector:
    matchLabels:
      app: capstone-app
  storageLocation: default
  volumeSnapshotLocations:
    - default
  ttl: 168h0m0s
  snapshotVolumes: true
