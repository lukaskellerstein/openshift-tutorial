# ManagedCluster definition for production-west spoke cluster
# This resource is created on the hub cluster
# The spoke cluster must then apply the generated import manifests
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: production-west
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
    environment: production
    region: us-west
    tier: secondary
    cloud: aws
    vendor: OpenShift
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60
---
# Namespace for the managed cluster resources
apiVersion: v1
kind: Namespace
metadata:
  name: production-west
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
    cluster.open-cluster-management.io/managedCluster: production-west
---
# KlusterletAddonConfig enables addons on the managed cluster
apiVersion: agent.open-cluster-management.io/v1
kind: KlusterletAddonConfig
metadata:
  name: production-west
  namespace: production-west
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  clusterName: production-west
  clusterNamespace: production-west
  applicationManager:
    enabled: true
  certPolicyController:
    enabled: true
  iamPolicyController:
    enabled: true
  policyController:
    enabled: true
  searchCollector:
    enabled: true
