# Grafana dashboard ConfigMap for the multi-cluster platform overview
# Provides a single-pane-of-glass view across all managed clusters
apiVersion: v1
kind: ConfigMap
metadata:
  name: capstone-platform-dashboard
  namespace: open-cluster-management-observability
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
    grafana_dashboard: "true"
data:
  platform-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "description": "Multi-Cluster Platform Overview - Capstone L3-M5.4",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Managed Clusters Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(acm_managed_cluster_info{available=\"true\"})",
              "legendFormat": "Available"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 2 }
                ]
              }
            }
          }
        },
        {
          "title": "Policy Compliance Rate",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "count(acm_policy_compliance{compliant=\"Compliant\"}) / count(acm_policy_compliance) * 100",
              "legendFormat": "Compliance %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              }
            }
          }
        },
        {
          "title": "Total Pods Across Clusters",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_info{namespace=\"capstone-app\"})",
              "legendFormat": "Running Pods"
            }
          ]
        },
        {
          "title": "Cluster CPU Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "1 - avg by (cluster) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1
            }
          }
        },
        {
          "title": "Cluster Memory Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "1 - sum by (cluster) (node_memory_MemAvailable_bytes) / sum by (cluster) (node_memory_MemTotal_bytes)",
              "legendFormat": "{{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1
            }
          }
        },
        {
          "title": "Application Response Time (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, cluster) (rate(http_request_duration_seconds_bucket{namespace=\"capstone-app\"}[5m])))",
              "legendFormat": "p99 - {{ cluster }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        },
        {
          "title": "Velero Backup Status",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "velero_backup_last_successful_timestamp{schedule=\"capstone-app-daily\"}",
              "legendFormat": "{{ cluster }}",
              "format": "table",
              "instant": true
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["multi-cluster", "platform", "capstone"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Multi-Cluster Platform Overview",
      "uid": "capstone-platform-overview"
    }
