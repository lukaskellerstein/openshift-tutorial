# Placement rule for targeting all production clusters with policies
# Uses the ManagedClusterSet to scope cluster selection
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-production-clusters
  namespace: platform-policies
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  clusterSets:
    - production-clusters
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            environment: production
        claimSelector:
          matchExpressions:
            - key: platform.open-cluster-management.io
              operator: In
              values:
                - OpenShift
