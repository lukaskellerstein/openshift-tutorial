# Policy: Ensure Velero is configured on all production clusters
# Velero provides application-level backup and restore
# Builds on DR concepts from L3-M3.3
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-velero-config
  namespace: platform-policies
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
    policy-category: disaster-recovery
  annotations:
    policy.open-cluster-management.io/categories: CP Contingency Planning
    policy.open-cluster-management.io/controls: CP-9 System Backup
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: velero-namespace
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: velero
                  labels:
                    app: velero
                    tutorial-level: "3"
                    tutorial-module: "M5"
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: velero-schedule-check
        spec:
          remediationAction: inform
          severity: medium
          namespaceSelector:
            include:
              - velero
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: velero.io/v1
                kind: Schedule
                metadata:
                  name: daily-backup
                  namespace: velero
                spec:
                  schedule: "0 2 * * *"
                  template:
                    includedNamespaces:
                      - capstone-app
                    storageLocation: default
                    ttl: 720h0m0s
                    snapshotVolumes: true
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-policy-velero-config
  namespace: platform-policies
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
placementRef:
  name: placement-production-clusters
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-velero-config
    apiGroup: policy.open-cluster-management.io
    kind: Policy
