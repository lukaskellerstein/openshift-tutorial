# Service for the capstone sample application
apiVersion: v1
kind: Service
metadata:
  name: capstone-web
  namespace: capstone-app
  labels:
    app: capstone-app
    component: web
    tutorial-level: "3"
    tutorial-module: "M5"
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: capstone-web-tls
spec:
  selector:
    app: capstone-app
    component: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
