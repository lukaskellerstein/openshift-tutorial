# ApplicationSet: Deploy the capstone application to all production clusters
# Uses the cluster generator to discover target clusters from RHACM
# Builds on GitOps concepts from L2-M1.3 and L3-M2.3
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: capstone-multi-cluster-app
  namespace: openshift-gitops
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  generators:
    # Cluster generator reads ManagedClusters from RHACM
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: placement-capstone-app
        requeueAfterSeconds: 180
  template:
    metadata:
      name: "capstone-app-{{name}}"
      labels:
        app: capstone-app
        tutorial-level: "3"
        tutorial-module: "M5"
        cluster: "{{name}}"
    spec:
      project: default
      source:
        # Replace with your Git repository URL
        repoURL: https://github.com/your-org/capstone-multi-cluster-app.git
        targetRevision: main
        path: manifests/overlays/{{metadata.labels.region}}
      destination:
        server: "{{server}}"
        namespace: capstone-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
---
# Placement for the ApplicationSet -- targets all production clusters
# that are not marked as failed
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-capstone-app
  namespace: openshift-gitops
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  clusterSets:
    - production-clusters
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            environment: production
          matchExpressions:
            - key: status
              operator: NotIn
              values:
                - failed
                - maintenance
