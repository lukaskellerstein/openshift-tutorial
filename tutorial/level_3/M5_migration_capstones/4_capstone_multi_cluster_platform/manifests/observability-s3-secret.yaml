# S3-compatible object storage credentials for Thanos
# Thanos stores long-term metrics in object storage
# Replace placeholders with your actual S3/MinIO/ODF credentials
#
# WARNING: In production, use SealedSecrets or External Secrets Operator
# to manage this secret. Never commit real credentials to Git.
# See L2-M5.3 for secrets management approaches.
apiVersion: v1
kind: Secret
metadata:
  name: thanos-object-storage
  namespace: open-cluster-management-observability
  labels:
    app: capstone-platform
    tutorial-level: "3"
    tutorial-module: "M5"
type: Opaque
stringData:
  thanos.yaml: |
    type: s3
    config:
      bucket: acm-observability
      endpoint: s3.amazonaws.com
      insecure: false
      access_key: <REPLACE_WITH_ACCESS_KEY>
      secret_key: <REPLACE_WITH_SECRET_KEY>
