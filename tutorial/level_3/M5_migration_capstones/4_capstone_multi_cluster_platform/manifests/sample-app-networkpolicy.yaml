# NetworkPolicies for the capstone sample application
# Defense-in-depth: default deny + explicit allow rules
# Builds on NetworkPolicy concepts from L1-M4.4
#
# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: capstone-app
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from the OpenShift router (for Route traffic)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-router
  namespace: capstone-app
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: capstone-app
      component: web
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Ingress
---
# Allow ingress from monitoring (Prometheus scraping)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-monitoring
  namespace: capstone-app
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: capstone-app
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
      ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Ingress
---
# Default deny all egress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: capstone-app
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Allow egress to DNS (required for service discovery)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: capstone-app
  labels:
    app: capstone-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
  policyTypes:
    - Egress
