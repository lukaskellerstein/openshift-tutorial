# Route for the capstone sample application
# Uses edge TLS termination with auto-generated certificates
# Builds on Route concepts from L1-M4.2
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: capstone-web
  namespace: capstone-app
  labels:
    app: capstone-app
    component: web
    tutorial-level: "3"
    tutorial-module: "M5"
  annotations:
    haproxy.router.openshift.io/rate-limit-connections: "true"
    haproxy.router.openshift.io/rate-limit-connections.concurrent-tcp: "100"
    haproxy.router.openshift.io/rate-limit-connections.rate-http: "50"
spec:
  to:
    kind: Service
    name: capstone-web
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
