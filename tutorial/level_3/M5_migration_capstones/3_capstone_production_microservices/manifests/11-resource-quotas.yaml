# Resource Quotas and Limit Ranges for the project.
# These prevent runaway resource consumption and ensure fair sharing
# of cluster resources.
#
# In Kubernetes, ResourceQuota and LimitRange work identically.
# OpenShift adds ClusterResourceQuota for cross-namespace quotas
# (useful when teams span multiple projects). See L3-M1.5.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: capstone-compute-quota
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "40"
    services: "10"
    secrets: "20"
    configmaps: "20"
    persistentvolumeclaims: "10"
    replicationcontrollers: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: capstone-limit-range
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi
