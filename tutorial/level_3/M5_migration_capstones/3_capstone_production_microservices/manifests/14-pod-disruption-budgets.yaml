# PodDisruptionBudgets ensure availability during voluntary disruptions
# (node drains, cluster upgrades, etc.).
#
# These work identically in Kubernetes and OpenShift. They are essential
# for production workloads — without them, a node drain could take down
# all replicas of a service simultaneously.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
