# Per-service RBAC: each microservice gets its own ServiceAccount
# with minimal permissions following the principle of least privilege.
#
# In Kubernetes, many teams use the default ServiceAccount for everything.
# In OpenShift, we enforce per-service identity for audit trails and SCC binding.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service-sa
  namespace: capstone-microservices
  labels:
    app: order-service
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service-sa
  namespace: capstone-microservices
  labels:
    app: inventory-service
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service-sa
  namespace: capstone-microservices
  labels:
    app: payment-service
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
# Role for the api-gateway: allowed to read services and endpoints
# (for service discovery) but nothing else
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: capstone-microservices
  labels:
    app: api-gateway
    tutorial-level: "3"
    tutorial-module: "M5"
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-rb
  namespace: capstone-microservices
  labels:
    app: api-gateway
    tutorial-level: "3"
    tutorial-module: "M5"
subjects:
  - kind: ServiceAccount
    name: api-gateway-sa
    namespace: capstone-microservices
roleRef:
  kind: Role
  name: api-gateway-role
  apiGroup: rbac.authorization.k8s.io
---
# Role for order-service: can read configmaps and secrets for its own config
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: order-service-role
  namespace: capstone-microservices
  labels:
    app: order-service
    tutorial-level: "3"
    tutorial-module: "M5"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["order-service-config"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["order-service-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: order-service-rb
  namespace: capstone-microservices
  labels:
    app: order-service
    tutorial-level: "3"
    tutorial-module: "M5"
subjects:
  - kind: ServiceAccount
    name: order-service-sa
    namespace: capstone-microservices
roleRef:
  kind: Role
  name: order-service-role
  apiGroup: rbac.authorization.k8s.io
---
# Role for inventory-service
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inventory-service-role
  namespace: capstone-microservices
  labels:
    app: inventory-service
    tutorial-level: "3"
    tutorial-module: "M5"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["inventory-service-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inventory-service-rb
  namespace: capstone-microservices
  labels:
    app: inventory-service
    tutorial-level: "3"
    tutorial-module: "M5"
subjects:
  - kind: ServiceAccount
    name: inventory-service-sa
    namespace: capstone-microservices
roleRef:
  kind: Role
  name: inventory-service-role
  apiGroup: rbac.authorization.k8s.io
---
# Role for payment-service: most restricted — only its own secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payment-service-role
  namespace: capstone-microservices
  labels:
    app: payment-service
    tutorial-level: "3"
    tutorial-module: "M5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["payment-service-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-service-rb
  namespace: capstone-microservices
  labels:
    app: payment-service
    tutorial-level: "3"
    tutorial-module: "M5"
subjects:
  - kind: ServiceAccount
    name: payment-service-sa
    namespace: capstone-microservices
roleRef:
  kind: Role
  name: payment-service-role
  apiGroup: rbac.authorization.k8s.io
