# Network Policies implement microsegmentation — each service can only
# talk to the services it needs. This is defense in depth: even if a
# container is compromised, lateral movement is restricted.
#
# In Kubernetes, NetworkPolicies work the same way but you must install
# a CNI plugin that supports them (Calico, Cilium, etc.).
# OpenShift uses OVN-Kubernetes by default, which supports NetworkPolicy
# out of the box — no extra installation needed.
---
# Default deny all ingress — nothing can reach any pod unless explicitly allowed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Default deny all egress except DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution (required for service discovery)
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# API Gateway: accepts traffic from the OpenShift router (ingress),
# can reach order, inventory, and payment services (egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-ingress
  namespace: capstone-microservices
  labels:
    app: api-gateway
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    # Allow from OpenShift router
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-egress
  namespace: capstone-microservices
  labels:
    app: api-gateway
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Egress
  egress:
    # Allow to order, inventory, and payment services
    - to:
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: inventory-service
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - port: 8080
          protocol: TCP
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Order Service: accepts traffic only from API gateway,
# can reach inventory and payment services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-service-ingress
  namespace: capstone-microservices
  labels:
    app: order-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-service-egress
  namespace: capstone-microservices
  labels:
    app: order-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: inventory-service
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - port: 8080
          protocol: TCP
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Inventory Service: accepts traffic from API gateway and order service only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-inventory-service-ingress
  namespace: capstone-microservices
  labels:
    app: inventory-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 8080
          protocol: TCP
---
# Inventory Service egress: DNS only (no outbound service calls)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-inventory-service-egress
  namespace: capstone-microservices
  labels:
    app: inventory-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Payment Service: accepts traffic from API gateway and order service only
apiVersion: networking.k8s.io/v1
