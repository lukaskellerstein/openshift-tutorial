# Service Mesh configuration: mTLS, traffic management, and circuit breaking.
#
# In Kubernetes, you install Istio manually and manage its lifecycle.
# In OpenShift, the Service Mesh Operator manages installation, upgrades,
# and configuration via CRDs. It also integrates with OpenShift's OAuth
# for Kiali access and uses Maistra (Red Hat's Istio distribution).
#
# Prerequisites:
#   - OpenShift Service Mesh Operator installed (L2-M3.1)
#   - ServiceMeshControlPlane deployed in istio-system namespace
#   - capstone-microservices namespace added to ServiceMeshMemberRoll
---
# Add this namespace to the service mesh
apiVersion: maistra.io/v1
kind: ServiceMeshMember
metadata:
  name: default
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  controlPlaneRef:
    name: basic
    namespace: istio-system
---
# PeerAuthentication: enforce mTLS for all services in the namespace.
# This ensures all inter-service traffic is encrypted and authenticated
# using certificates managed by the mesh's certificate authority.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  mtls:
    mode: STRICT
---
# DestinationRule for api-gateway: circuit breaker and connection pool
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway-dr
  namespace: capstone-microservices
  labels:
    app: api-gateway
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  host: api-gateway
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# DestinationRule for order-service: circuit breaker
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: order-service-dr
  namespace: capstone-microservices
  labels:
    app: order-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  host: order-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 500
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: v1
---
# DestinationRule for inventory-service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: inventory-service-dr
  namespace: capstone-microservices
  labels:
    app: inventory-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  host: inventory-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 500
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# DestinationRule for payment-service: stricter circuit breaker
# (payment processing is sensitive — fail fast to avoid double-charges)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: payment-service-dr
  namespace: capstone-microservices
  labels:
    app: payment-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  host: payment-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 30
      http:
        http1MaxPendingRequests: 20
        http2MaxRequests: 200
        maxRetries: 1
    outlierDetection:
      consecutive5xxErrors: 2
      interval: 5s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
---
# VirtualService for order-service: retry policy and timeout
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: order-service-vs
  namespace: capstone-microservices
  labels:
    app: order-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  hosts:
    - order-service
  http:
    - route:
        - destination:
            host: order-service
            subset: v1
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure,retriable-4xx
---
# VirtualService for payment-service: no retries (idempotency concern),
# strict timeout
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-service-vs
  namespace: capstone-microservices
  labels:
    app: payment-service
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  hosts:
    - payment-service
  http:
    - route:
        - destination:
            host: payment-service
      timeout: 10s
      retries:
        attempts: 0
