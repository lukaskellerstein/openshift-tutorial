---
# PrometheusRules for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: capstone-microservices-alerts
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  groups:
    - name: capstone-microservices.rules
      rules:
        # Alert if any service has high error rate (>5% of requests returning 5xx)
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(api_gateway_http_requests_total{status=~"5.."}[5m])) by (endpoint)
              /
              sum(rate(api_gateway_http_requests_total[5m])) by (endpoint)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            service: api-gateway
          annotations:
            summary: "High error rate on API gateway"
            description: "API gateway endpoint {{ $labels.endpoint }} has error rate above 5% (current: {{ $value | humanizePercentage }})"

        # Alert if order processing is too slow (p99 > 2s)
        - alert: SlowOrderProcessing
          expr: |
            histogram_quantile(0.99,
              sum(rate(order_service_processing_duration_seconds_bucket[5m])) by (le)
            ) > 2.0
          for: 10m
          labels:
            severity: warning
            service: order-service
          annotations:
            summary: "Slow order processing"
            description: "P99 order processing latency is {{ $value | humanizeDuration }} (threshold: 2s)"

        # Alert if payment failure rate exceeds 10%
        - alert: HighPaymentFailureRate
          expr: |
            (
              sum(rate(payment_service_payments_processed_total{status="declined"}[5m]))
              /
              sum(rate(payment_service_payments_processed_total[5m]))
            ) > 0.10
          for: 5m
          labels:
            severity: critical
            service: payment-service
          annotations:
            summary: "High payment failure rate"
            description: "Payment decline rate is {{ $value | humanizePercentage }} (threshold: 10%)"

        # Alert if inventory stock is critically low
        - alert: LowInventoryStock
          expr: inventory_service_stock_level < 10
          for: 1m
          labels:
            severity: warning
            service: inventory-service
          annotations:
            summary: "Low inventory stock"
            description: "Product {{ $labels.product }} has only {{ $value }} units remaining"

        # Alert if a pod is restarting frequently
        - alert: PodRestartingFrequently
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="capstone-microservices"}[1h]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod restarting frequently"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last hour"

        # Alert if HPA is at max capacity
        - alert: HPAMaxedOut
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="capstone-microservices"}
            ==
            kube_horizontalpodautoscaler_spec_max_replicas{namespace="capstone-microservices"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "HPA at maximum replicas"
            description: "HPA {{ $labels.horizontalpodautoscaler }} has been at max replicas ({{ $value }}) for 15 minutes. Consider increasing maxReplicas or optimizing the service."
