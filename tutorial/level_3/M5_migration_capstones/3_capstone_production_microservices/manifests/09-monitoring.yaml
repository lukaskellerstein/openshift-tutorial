# Monitoring configuration: ServiceMonitors, PrometheusRules, and PodMonitors
#
# In Kubernetes, you install Prometheus via Helm and manually configure
# scrape targets in prometheus.yml. In OpenShift, the monitoring stack
# is pre-installed and uses ServiceMonitor CRDs for declarative scrape
# target configuration — no manual prometheus.yml editing needed.
#
# Prerequisite: User workload monitoring must be enabled (L1-M6.1).
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-monitor
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
