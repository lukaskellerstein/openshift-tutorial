# BuildConfigs define how to build container images from source.
# OpenShift's built-in build system eliminates the need for external CI
# tools just to produce images. These use the Docker strategy with
# multi-stage Dockerfiles for minimal production images.
#
# In Kubernetes, you would need Jenkins, GitHub Actions, or another
# external CI system to build and push images. OpenShift does it natively.
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: api-gateway
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: api-gateway:latest
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
