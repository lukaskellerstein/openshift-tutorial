# ImageStreams abstract image references and enable automatic deployment triggers.
# In Kubernetes, you reference images directly by registry/repo:tag.
# In OpenShift, ImageStreams provide:
#   - Automatic rollouts when a new image is pushed
#   - Image change triggers on BuildConfigs and Deployments
#   - A layer of indirection for image promotion across environments
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: api-gateway
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: order-service
  namespace: capstone-microservices
  labels:
    app: order-service
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
apiVersion: image.openshift.io/v1
