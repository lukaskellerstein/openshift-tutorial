# Project (namespace) for the capstone microservices application
# In OpenShift, Projects add RBAC defaults and metadata on top of K8s Namespaces
apiVersion: project.openshift.io/v1
kind: ProjectRequest
metadata:
  name: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
  annotations:
    openshift.io/display-name: "Capstone: Production Microservices"
    openshift.io/description: "L3-M5.3 capstone project demonstrating production-ready microservices"
