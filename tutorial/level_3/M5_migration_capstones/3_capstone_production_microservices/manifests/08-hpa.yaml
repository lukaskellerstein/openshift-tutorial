# Horizontal Pod Autoscalers for each microservice.
# HPAs work identically in Kubernetes and OpenShift, but OpenShift
# includes the Metrics Server pre-installed (no manual setup).
#
# For custom metrics-based autoscaling (e.g., scaling on queue depth
# or request latency), you would use a custom metrics adapter with
# Prometheus — see L2-M6.4 for details.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
