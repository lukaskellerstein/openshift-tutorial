# Services for inter-microservice communication.
# These are standard Kubernetes Services — they work identically on OpenShift.
# The service mesh (Istio) will use these for traffic management.
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: capstone-microservices
  labels:
