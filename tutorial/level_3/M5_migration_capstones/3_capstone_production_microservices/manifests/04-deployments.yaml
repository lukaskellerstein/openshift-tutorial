# Production Deployments with:
#   - Resource requests AND limits (Level 3 requirement)
#   - Liveness, readiness, and startup probes
#   - Per-service ServiceAccounts
#   - Pod anti-affinity for HA spread across nodes
#   - Security context compatible with OpenShift's restricted SCC
#   - Topology spread constraints for zone-aware distribution
#
# In Kubernetes, you would write nearly identical Deployments.
# The key OpenShift differences:
#   - Image references use ImageStreamTags (not registry URLs)
#   - SecurityContext must comply with the restricted SCC
#   - Annotation for sidecar injection (service mesh)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: capstone-microservices
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: capstone-microservices
    app.kubernetes.io/component: gateway
    version: v1
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
        tutorial-level: "3"
        tutorial-module: "M5"
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: api-gateway-sa
      securityContext:
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api-gateway
      containers:
        - name: api-gateway
          image: image-registry.openshift-image-registry.svc:5000/capstone-microservices/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8080"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8080"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
