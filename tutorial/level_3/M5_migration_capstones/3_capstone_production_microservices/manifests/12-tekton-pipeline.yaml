# Tekton CI/CD Pipeline for building all microservices.
#
# In Kubernetes, you would use Jenkins, GitHub Actions, or another
# external CI system. OpenShift Pipelines (Tekton) is pre-installed
# via operator and provides cloud-native, declarative CI/CD.
#
# This pipeline: clones source -> builds images -> runs tests -> deploys
#
# Prerequisite: OpenShift Pipelines Operator installed (L2-M1.1)
---
# Pipeline ServiceAccount with permissions to build and deploy
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-edit
  namespace: capstone-microservices
  labels:
    tutorial-level: "3"
    tutorial-module: "M5"
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: capstone-microservices
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# Task: Build a microservice image using OpenShift BuildConfig
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-microservice
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  params:
    - name: service-name
      type: string
      description: Name of the microservice to build
    - name: source-dir
      type: string
      description: Subdirectory containing the service source code
  workspaces:
    - name: source
      description: Workspace containing the source code
  steps:
    - name: build
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/bash
        set -e
        echo "Building $(params.service-name) from $(params.source-dir)..."
        cd $(workspaces.source.path)/$(params.source-dir)
        oc start-build $(params.service-name) \
          --from-dir=. \
          --follow \
          --wait \
          -n capstone-microservices
        echo "Build complete for $(params.service-name)"
---
# Task: Run smoke tests against deployed services
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: smoke-test
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  params:
    - name: service-name
      type: string
      description: Name of the service to test
  steps:
    - name: test
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      script: |
        #!/bin/bash
        set -e
        echo "Running smoke tests for $(params.service-name)..."

        # Wait for deployment rollout
        MAX_RETRIES=30
        RETRY_COUNT=0
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://$(params.service-name).capstone-microservices.svc:8080/healthz 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "$(params.service-name) health check passed"
            break
          fi
          echo "Waiting for $(params.service-name) (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
          RETRY_COUNT=$((RETRY_COUNT+1))
          sleep 5
        done

        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "FAIL: $(params.service-name) did not become healthy"
          exit 1
        fi

        echo "Smoke tests passed for $(params.service-name)"
---
# Task: Deploy (rollout restart) a microservice
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy-microservice
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  params:
    - name: service-name
      type: string
      description: Name of the microservice to deploy
  steps:
    - name: deploy
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/bash
        set -e
        echo "Deploying $(params.service-name)..."

        # Trigger a new rollout with the latest image
        oc rollout restart deployment/$(params.service-name) \
          -n capstone-microservices

        # Wait for rollout to complete
        oc rollout status deployment/$(params.service-name) \
          -n capstone-microservices \
          --timeout=300s

        echo "Deployment complete for $(params.service-name)"
---
# The full CI/CD Pipeline: build all services, deploy, then test
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-and-deploy-all
  namespace: capstone-microservices
  labels:
    app.kubernetes.io/part-of: capstone-microservices
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  workspaces:
    - name: shared-workspace
  params:
    - name: git-url
      type: string
      description: Git repository URL
      default: "https://github.com/your-org/capstone-microservices.git"
    - name: git-revision
      type: string
      description: Git revision to build
      default: "main"
  tasks:
    # Step 1: Clone the source code
    - name: clone-source
      taskRef:
        name: git-clone
        kind: ClusterTask
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    # Step 2: Build all services in parallel
    - name: build-api-gateway
      taskRef:
        name: build-microservice
      runAfter:
        - clone-source
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: service-name
          value: api-gateway
        - name: source-dir
          value: app/api-gateway

    - name: build-order-service
      taskRef:
        name: build-microservice
      runAfter:
        - clone-source
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: service-name
          value: order-service
        - name: source-dir
          value: app/order-service

    - name: build-inventory-service
      taskRef:
        name: build-microservice
      runAfter:
        - clone-source
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: service-name
          value: inventory-service
        - name: source-dir
          value: app/inventory-service

    - name: build-payment-service
      taskRef:
        name: build-microservice
      runAfter:
        - clone-source
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: service-name
          value: payment-service
        - name: source-dir
          value: app/payment-service

    # Step 3: Deploy all services (after builds complete)
    - name: deploy-api-gateway
      taskRef:
        name: deploy-microservice
      runAfter:
        - build-api-gateway
      params:
        - name: service-name
          value: api-gateway

    - name: deploy-order-service
      taskRef:
        name: deploy-microservice
      runAfter:
        - build-order-service
      params:
        - name: service-name
          value: order-service

    - name: deploy-inventory-service
      taskRef:
        name: deploy-microservice
      runAfter:
        - build-inventory-service
      params:
        - name: service-name
          value: inventory-service

    - name: deploy-payment-service
      taskRef:
        name: deploy-microservice
      runAfter:
        - build-payment-service
      params:
        - name: service-name
          value: payment-service

    # Step 4: Run smoke tests (after all deploys)
    - name: test-api-gateway
      taskRef:
        name: smoke-test
      runAfter:
        - deploy-api-gateway
        - deploy-order-service
        - deploy-inventory-service
        - deploy-payment-service
      params:
        - name: service-name
          value: api-gateway

    - name: test-order-service
      taskRef:
        name: smoke-test
      runAfter:
        - deploy-api-gateway
        - deploy-order-service
        - deploy-inventory-service
        - deploy-payment-service
      params:
        - name: service-name
          value: order-service
