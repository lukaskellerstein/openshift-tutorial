# Service -- unchanged between K8s and OpenShift
# Services work identically on both platforms
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  selector:
    app: demo-app
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
