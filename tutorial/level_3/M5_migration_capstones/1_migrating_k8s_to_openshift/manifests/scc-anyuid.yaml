# RoleBinding to grant anyuid SCC to a ServiceAccount
# USE WITH CAUTION: only when you cannot fix the container image
# This is a stopgap measure -- the preferred solution is using non-root images
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app-anyuid
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: demo-app-sa
    namespace: migration-demo
---
# ServiceAccount for the demo app
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app-sa
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
