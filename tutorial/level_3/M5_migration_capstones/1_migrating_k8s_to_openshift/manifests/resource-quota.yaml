# ResourceQuota -- enforce resource limits at the project level
# Best practice for production OpenShift: always set quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: migration-demo-quota
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
