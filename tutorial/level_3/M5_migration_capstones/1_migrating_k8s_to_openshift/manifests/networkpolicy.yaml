# NetworkPolicy -- restrict traffic to demo-app pods
# OpenShift enforces NetworkPolicy via OVN-Kubernetes by default
# In multi-tenant mode, all traffic between namespaces is denied unless allowed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-app-allow-http
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  podSelector:
    matchLabels:
      app: demo-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the OpenShift router (for Route access)
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 8080
          protocol: TCP
    # Allow traffic from same namespace
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to same namespace
    - to:
        - podSelector: {}
