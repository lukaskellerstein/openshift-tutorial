# LimitRange -- set default resource limits for containers in the project
# Ensures every container has resource requests/limits even if not specified
apiVersion: v1
kind: LimitRange
metadata:
  name: migration-demo-limits
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi
