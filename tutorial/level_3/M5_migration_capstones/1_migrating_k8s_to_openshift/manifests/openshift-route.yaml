# OpenShift Route -- native ingress replacement
# No ingress controller installation needed (HAProxy router is pre-installed)
# Provides edge TLS termination with auto-generated certificates
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-app
  labels:
    app: demo-app
    tutorial-level: "3"
    tutorial-module: "M5"
  annotations:
    haproxy.router.openshift.io/timeout: 60s
    haproxy.router.openshift.io/rate-limit-connections: "true"
    haproxy.router.openshift.io/rate-limit-connections.concurrent-tcp: "50"
    haproxy.router.openshift.io/rate-limit-connections.rate-http: "100"
spec:
  to:
    kind: Service
    name: demo-app
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
