# Automated etcd backup CronJob
# Runs daily etcd backups on a control plane node.
# In production, you should also copy backups to external storage (S3, NFS, etc.).
#
# This CronJob requires cluster-admin privileges and runs on a master node.
# The backup is stored on the node's local filesystem at /home/core/etcd-backups/.
#
# IMPORTANT: This is a reference configuration. Adjust the schedule, retention,
# and storage destination for your production environment.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: openshift-etcd
  labels:
    app: etcd-backup
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: etcd-backup
            tutorial-level: "3"
            tutorial-module: "M1"
        spec:
          restartPolicy: Never
          nodeSelector:
            node-role.kubernetes.io/master: ""
          tolerations:
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
          serviceAccountName: etcd-backup-sa
          containers:
            - name: etcd-backup
              image: registry.redhat.io/openshift4/ose-tools-rhel9:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  BACKUP_DIR="/home/core/etcd-backups/backup-$(date +%Y%m%d-%H%M%S)"
                  echo "Starting etcd backup to ${BACKUP_DIR}..."
                  chroot /host /usr/local/bin/cluster-backup.sh "${BACKUP_DIR}"
                  echo "Backup completed successfully."
                  # Prune backups older than 7 days
                  find /host/home/core/etcd-backups -maxdepth 1 -type d -mtime +7 -exec rm -rf {} \;
                  echo "Old backups pruned."
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                privileged: true
              volumeMounts:
                - name: host
                  mountPath: /host
          volumes:
            - name: host
              hostPath:
                path: /
                type: Directory
