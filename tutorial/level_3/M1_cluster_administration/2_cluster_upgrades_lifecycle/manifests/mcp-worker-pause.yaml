# MachineConfigPool worker pause configuration
# Apply this to pause worker node upgrades during an active cluster upgrade.
# Use this as an emergency brake if you detect issues during the upgrade
# and want to prevent additional worker nodes from being updated.
#
# To resume: change paused to false and re-apply, or run:
#   oc patch mcp/worker --type merge --patch '{"spec":{"paused":false}}'
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  name: worker
  labels:
    app: cluster-upgrade
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  paused: true
  # maxUnavailable controls how many worker nodes can be updating simultaneously.
  # Default is 1. For large clusters, increase to speed up upgrades
  # (at the cost of reduced capacity during the upgrade).
  maxUnavailable: 1
