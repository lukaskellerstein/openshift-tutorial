# ClusterVersion upgrade configuration
# Apply this to trigger an upgrade to a specific version.
# IMPORTANT: Verify the target version is available in your channel first:
#   oc adm upgrade
# Always take an etcd backup before applying this manifest.
apiVersion: config.openshift.io/v1
kind: ClusterVersion
metadata:
  name: version
  labels:
    app: cluster-upgrade
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  channel: stable-4.16
  desiredUpdate:
    version: 4.16.3
