# PodDisruptionBudgets for critical workloads
# Apply BEFORE upgrading to protect workloads during worker node drains.
# These PDBs ensure at least one replica of each critical workload
# remains available while nodes are cordoned and drained.
#
# Adjust selectors and minAvailable/maxUnavailable to match your
# actual production workloads.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: critical-web-pdb
  labels:
    app: critical-web
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: critical-web
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: critical-api-pdb
  labels:
    app: critical-api
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: critical-api
---
# Example: PDB for a database workload that must maintain quorum
# For a 3-replica StatefulSet, allow at most 1 unavailable to maintain quorum.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: critical-db-pdb
  labels:
    app: critical-db
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: critical-db
