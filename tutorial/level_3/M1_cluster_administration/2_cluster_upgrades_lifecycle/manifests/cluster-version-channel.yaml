# ClusterVersion channel configuration
# Apply this to switch the cluster to a specific upgrade channel.
# Valid channels: stable-4.x, fast-4.x, candidate-4.x, eus-4.x
# Change the channel value to match your target minor version.
apiVersion: config.openshift.io/v1
kind: ClusterVersion
metadata:
  name: version
  labels:
    app: cluster-upgrade
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  channel: stable-4.16
