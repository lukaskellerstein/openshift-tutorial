# Custom PrometheusRule for etcd monitoring alerts
# Supplements the built-in etcd alerts with production-specific thresholds
#
# These alerts cover:
#   - Database size approaching limit (warning at 6GB, critical at 7GB)
#   - High fsync latency (indicates slow disks)
#   - Excessive leader elections (indicates network instability)
#   - Backup staleness (no successful backup in 24 hours)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: etcd-custom-alerts
  namespace: openshift-etcd
  labels:
    app: etcd-monitoring
    tutorial-level: "3"
    tutorial-module: "M1"
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: etcd-custom.rules
      rules:
        - alert: EtcdDatabaseSizeWarning
          annotations:
            summary: "etcd database size is approaching the limit"
            description: >-
              etcd database size on {{ $labels.instance }} is {{ $value | humanize1024 }}B,
              which is above the 6GB warning threshold. The hard limit is 8GB.
              Investigate large resources or enable compaction.
          expr: |
            etcd_mvcc_db_total_size_in_bytes > 6442450944
          for: 10m
          labels:
            severity: warning

        - alert: EtcdDatabaseSizeCritical
          annotations:
            summary: "etcd database size is critically large"
            description: >-
              etcd database size on {{ $labels.instance }} is {{ $value | humanize1024 }}B,
              which is above the 7GB critical threshold. Immediate action required
              to prevent cluster from becoming read-only at 8GB.
          expr: |
            etcd_mvcc_db_total_size_in_bytes > 7516192768
          for: 5m
          labels:
            severity: critical

        - alert: EtcdHighFsyncDuration
          annotations:
            summary: "etcd WAL fsync latency is high"
            description: >-
              etcd WAL fsync 99th percentile duration on {{ $labels.instance }}
              is {{ $value }}s, which exceeds the 50ms threshold. This indicates
              slow disk I/O and will degrade cluster performance. Consider
              faster storage (SSD/NVMe) or reducing I/O contention.
          expr: |
            histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) > 0.05
          for: 10m
          labels:
            severity: warning

        - alert: EtcdHighCommitDuration
          annotations:
            summary: "etcd backend commit latency is high"
            description: >-
              etcd backend commit 99th percentile duration on {{ $labels.instance }}
              is {{ $value }}s, which exceeds the 100ms threshold.
          expr: |
            histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket[5m])) > 0.1
          for: 10m
          labels:
            severity: warning

        - alert: EtcdExcessiveLeaderElections
          annotations:
            summary: "etcd is experiencing frequent leader elections"
            description: >-
              etcd member {{ $labels.instance }} has seen {{ $value }} leader
              elections in the last hour. Frequent elections indicate network
              instability or resource contention on control plane nodes.
          expr: |
            increase(etcd_server_leader_changes_seen_total[1h]) > 3
          for: 5m
          labels:
            severity: warning

        - alert: EtcdMemberCommunicationSlow
          annotations:
            summary: "etcd peer communication latency is high"
            description: >-
              etcd peer round-trip time from {{ $labels.From }} to {{ $labels.To }}
              is {{ $value }}s (99th percentile), exceeding the 100ms threshold.
              Check network connectivity between control plane nodes.
          expr: |
            histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket[5m])) > 0.1
          for: 10m
          labels:
            severity: warning

        - alert: EtcdInsufficientMembers
          annotations:
            summary: "etcd cluster has insufficient members for quorum"
            description: >-
              etcd cluster has only {{ $value }} healthy members. A 3-member
              cluster requires at least 2 members for quorum. Investigate
              failed members immediately.
          expr: |
            count(up{job="etcd"} == 1) < 2
          for: 3m
          labels:
            severity: critical
