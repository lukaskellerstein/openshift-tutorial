# Automated etcd backup CronJob for OpenShift
# Runs every 4 hours and retains backups on a PersistentVolume
# Requires cluster-admin privileges and a PVC for backup storage
#
# NOTE: This CronJob requires a multi-node cluster with proper storage.
# It will not work on CRC (single-node) without modifications.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-backup-sa
  namespace: openshift-etcd
  labels:
    app: etcd-backup
    tutorial-level: "3"
    tutorial-module: "M1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etcd-backup-crb
  labels:
    app: etcd-backup
    tutorial-level: "3"
    tutorial-module: "M1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: etcd-backup-sa
    namespace: openshift-etcd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etcd-backup-pvc
  namespace: openshift-etcd
  labels:
    app: etcd-backup
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: openshift-etcd
  labels:
    app: etcd-backup
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  schedule: "0 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: etcd-backup
        tutorial-level: "3"
        tutorial-module: "M1"
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: etcd-backup
            tutorial-level: "3"
            tutorial-module: "M1"
        spec:
          serviceAccountName: etcd-backup-sa
          restartPolicy: Never
          containers:
            - name: etcd-backup
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  BACKUP_DIR="/backup/$(date +%Y%m%d_%H%M%S)"
                  RETENTION_DAYS=7

                  echo "[INFO] Starting etcd backup to ${BACKUP_DIR}"
                  mkdir -p "${BACKUP_DIR}"

                  # Use oc debug to run the backup script on a master node
                  MASTER_NODE=$(oc get nodes -l node-role.kubernetes.io/master -o jsonpath='{.items[0].metadata.name}')
                  echo "[INFO] Running backup on node: ${MASTER_NODE}"

                  oc debug "node/${MASTER_NODE}" -- \
                    chroot /host \
                    /usr/local/bin/cluster-backup.sh /tmp/etcd-backup

                  # Copy backup from node to PVC
                  oc debug "node/${MASTER_NODE}" -- \
                    cat /host/tmp/etcd-backup/snapshot_*.db > "${BACKUP_DIR}/snapshot.db"

                  oc debug "node/${MASTER_NODE}" -- \
                    cat /host/tmp/etcd-backup/static_kuberesources_*.tar.gz > "${BACKUP_DIR}/static_kuberesources.tar.gz"

                  echo "[INFO] Backup complete: $(ls -la ${BACKUP_DIR}/)"

                  # Clean up old backups beyond retention period
                  echo "[INFO] Cleaning backups older than ${RETENTION_DAYS} days"
                  find /backup -mindepth 1 -maxdepth 1 -type d -mtime +${RETENTION_DAYS} -exec rm -rf {} +

                  echo "[INFO] Remaining backups:"
                  ls -la /backup/
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: etcd-backup-pvc
          nodeSelector:
            node-role.kubernetes.io/master: ""
          tolerations:
            - key: node-role.kubernetes.io/master
              effect: NoSchedule
