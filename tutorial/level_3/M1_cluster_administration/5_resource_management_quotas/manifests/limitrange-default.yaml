# Default LimitRange for dev/staging projects
# Ensures every container gets resource requests and limits
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  labels:
    app: quota-demo
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
      maxLimitRequestRatio:
        cpu: "10"
        memory: "8"
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi
    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 50Gi
