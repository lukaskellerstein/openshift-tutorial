# Production LimitRange — tighter constraints than dev/staging
# Higher default requests ensure production pods get adequate resources
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  labels:
    app: quota-demo
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4Gi
      maxLimitRequestRatio:
        cpu: "4"
        memory: "4"
    - type: Pod
      max:
        cpu: "8"
        memory: 8Gi
    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 100Gi
