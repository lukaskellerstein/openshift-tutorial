# Intentionally large deployment to test quota enforcement
# This requests enough resources to exceed the ClusterResourceQuota
# when combined with other workloads across the team's projects
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-buster
  labels:
    app: quota-buster
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  replicas: 10
  selector:
    matchLabels:
      app: quota-buster
  template:
    metadata:
      labels:
        app: quota-buster
        tutorial-level: "3"
        tutorial-module: "M1"
    spec:
      containers:
        - name: stress
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
