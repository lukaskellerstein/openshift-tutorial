# OpenShift-specific: ClusterResourceQuota
# Enforces a single resource budget across ALL projects annotated with
# openshift.io/requester=demo-team
#
# This has no Kubernetes equivalent — it solves the multi-namespace
# team budget problem natively.
apiVersion: quota.openshift.io/v1
kind: ClusterResourceQuota
metadata:
  name: demo-team-quota
  labels:
    app: quota-demo
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  selector:
    annotations:
      openshift.io/requester: demo-team
  quota:
    hard:
      requests.cpu: "8"
      requests.memory: 16Gi
      limits.cpu: "16"
      limits.memory: 32Gi
      pods: "50"
      persistentvolumeclaims: "10"
      requests.storage: 200Gi
