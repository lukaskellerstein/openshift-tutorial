# HAProxy Load Balancer Configuration for UPI Installations
# This is NOT a Kubernetes manifest — it is an HAProxy config rendered as YAML
# for documentation purposes. Convert to haproxy.cfg format for actual use.
#
# For UPI installations on bare metal or vSphere, you need two load balancers:
# 1. API load balancer (ports 6443 and 22623)
# 2. Ingress load balancer (ports 80 and 443)
#
# This file documents the required configuration.
# See scripts/generate-haproxy-config.sh to generate the actual haproxy.cfg.
apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-lb-reference
  labels:
    app: openshift-tutorial
    tutorial-level: "3"
    tutorial-module: "M1"
data:
  haproxy.cfg: |
    # HAProxy configuration for OpenShift UPI installation
    # Place this at /etc/haproxy/haproxy.cfg on your load balancer host

    global
        log         127.0.0.1 local2
        maxconn     4000
        daemon

    defaults
        mode        tcp
        log         global
        option      tcplog
        option      dontlognull
        timeout connect 10s
        timeout client  30s
        timeout server  30s
        retries     3

    # --- Kubernetes API Server (port 6443) ---
    frontend api-server
        bind *:6443
        default_backend api-server-backend

    backend api-server-backend
        balance roundrobin
        option httpchk GET /readyz HTTP/1.0
        option log-health-checks
        http-check expect status 200
        # Include bootstrap during initial installation only
        # Remove after bootstrap-complete
        server bootstrap 192.168.1.20:6443 check check-ssl verify none
        server master-0   192.168.1.21:6443 check check-ssl verify none
        server master-1   192.168.1.22:6443 check check-ssl verify none
        server master-2   192.168.1.23:6443 check check-ssl verify none

    # --- Machine Config Server (port 22623) ---
    frontend machine-config-server
        bind *:22623
        default_backend machine-config-server-backend

    backend machine-config-server-backend
        balance roundrobin
        # Include bootstrap during initial installation only
        server bootstrap 192.168.1.20:22623 check
        server master-0   192.168.1.21:22623 check
        server master-1   192.168.1.22:22623 check
        server master-2   192.168.1.23:22623 check

    # --- Ingress HTTP (port 80) ---
    frontend ingress-http
        bind *:80
        default_backend ingress-http-backend

    backend ingress-http-backend
        balance roundrobin
        option httpchk GET /healthz/ready HTTP/1.0
        option log-health-checks
        http-check expect status 200
        server worker-0 192.168.1.31:80 check port 1936
        server worker-1 192.168.1.32:80 check port 1936
        server worker-2 192.168.1.33:80 check port 1936

    # --- Ingress HTTPS (port 443) ---
    frontend ingress-https
        bind *:443
        default_backend ingress-https-backend

    backend ingress-https-backend
        balance roundrobin
        option httpchk GET /healthz/ready HTTP/1.0
        option log-health-checks
        http-check expect status 200
        server worker-0 192.168.1.31:443 check port 1936
        server worker-1 192.168.1.32:443 check port 1936
        server worker-2 192.168.1.33:443 check port 1936
