# OpenShift install-config.yaml — AWS IPI (Installer-Provisioned Infrastructure)
# Production-grade configuration with HA across availability zones
#
# Usage:
#   1. Replace <your-pull-secret> with your pull secret from cloud.redhat.com
#   2. Replace <your-ssh-public-key> with your SSH public key
#   3. Copy to your install directory and run: openshift-install create cluster --dir <dir>
#
# IMPORTANT: The installer DELETES this file after reading it. Always keep a backup.
apiVersion: v1
metadata:
  name: production-cluster
  labels:
    app: openshift-tutorial
    tutorial-level: "3"
    tutorial-module: "M1"
baseDomain: example.com

# --- Control Plane ---
# 3 masters spread across AZs for etcd quorum and API server HA.
# m6i.xlarge: 4 vCPU, 16 GiB RAM — minimum recommended for production.
# Larger types (m6i.2xlarge) recommended for clusters with 100+ nodes.
controlPlane:
  name: master
  replicas: 3
  platform:
    aws:
      type: m6i.xlarge
      rootVolume:
        size: 120              # GiB — etcd performance requires fast storage
        type: gp3
        iops: 3000             # Explicit IOPS avoids etcd latency spikes
        throughput: 125        # MiB/s
      zones:
        - us-east-1a
        - us-east-1b
        - us-east-1c
      metadataService:
        authentication: Required  # IMDSv2 — security best practice

# --- Workers ---
# 3 workers across AZs. Scale with MachineSets post-install (L3-M1.3).
# m6i.2xlarge: 8 vCPU, 32 GiB RAM — suitable for general workloads.
compute:
  - name: worker
    replicas: 3
    platform:
      aws:
        type: m6i.2xlarge
        rootVolume:
          size: 250            # GiB — larger for container images and ephemeral storage
          type: gp3
          iops: 3000
          throughput: 125
        zones:
          - us-east-1a
          - us-east-1b
          - us-east-1c
        metadataService:
          authentication: Required
    hyperthreading: Enabled

# --- Networking ---
# OVNKubernetes is the default and recommended CNI for OpenShift 4.12+.
# clusterNetwork: pod CIDR — /14 gives ~262k pod IPs with /23 per node (512 pods/node).
# serviceNetwork: service CIDR — /16 gives ~65k service IPs.
# machineNetwork: the VPC CIDR where nodes are placed.
networking:
  networkType: OVNKubernetes
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
  machineNetwork:
    - cidr: 10.0.0.0/16

# --- Platform ---
platform:
  aws:
    region: us-east-1
    # Uncomment to use an existing VPC (common in enterprise environments):
    # subnets:
    #   - subnet-aaaaaaaaaaaaa  # us-east-1a private
    #   - subnet-bbbbbbbbbbbbb  # us-east-1b private
    #   - subnet-ccccccccccccc  # us-east-1c private
    #   - subnet-ddddddddddddd  # us-east-1a public
    #   - subnet-eeeeeeeeeeeee  # us-east-1b public
    #   - subnet-fffffffffffff  # us-east-1c public

# --- Authentication ---
# Pull secret from https://cloud.redhat.com/openshift/install/pull-secret
pullSecret: '<your-pull-secret>'

# SSH public key for node access (debugging only — production should use oc debug node/)
sshKey: '<your-ssh-public-key>'

# --- Optional: Proxy configuration (common in enterprise environments) ---
# proxy:
#   httpProxy: http://proxy.example.com:3128
#   httpsProxy: http://proxy.example.com:3128
#   noProxy: .example.com,10.0.0.0/16,172.30.0.0/16,10.128.0.0/14

# --- Optional: Additional trust bundle for private CAs ---
# additionalTrustBundle: |
#   -----BEGIN CERTIFICATE-----
#   <PEM-encoded CA certificate>
#   -----END CERTIFICATE-----

# --- Optional: Image content sources for disconnected/mirrored registries ---
# imageContentSources:
#   - mirrors:
#       - mirror.example.com:5000/openshift/release
#     source: quay.io/openshift-release-dev/ocp-release
#   - mirrors:
#       - mirror.example.com:5000/openshift/release
#     source: quay.io/openshift-release-dev/ocp-v4.0-art-dev

# --- FIPS mode (required for some compliance regimes) ---
# fips: true
