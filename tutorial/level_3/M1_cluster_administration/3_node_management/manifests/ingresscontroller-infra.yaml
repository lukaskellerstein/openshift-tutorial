# Patch the default IngressController to schedule router pods on infra nodes
# This moves the HAProxy-based router off worker nodes onto dedicated infra nodes.
apiVersion: operator.openshift.io/v1
kind: IngressController
metadata:
  name: default
  namespace: openshift-ingress-operator
  labels:
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  replicas: 3
  nodePlacement:
    nodeSelector:
      matchLabels:
        node-role.kubernetes.io/infra: ""
    tolerations:
      - key: node-role.kubernetes.io/infra
        effect: NoSchedule
  defaultCertificate:
    name: ""
  httpEmptyRequestsPolicy: Respond
  tuningOptions:
    maxConnections: 50000
    threadCount: 4
