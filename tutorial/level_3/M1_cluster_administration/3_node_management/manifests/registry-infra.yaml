# Patch the internal image registry to schedule on infra nodes
# Apply with: oc apply -f manifests/registry-infra.yaml
# NOTE: This is applied as a patch to the cluster-scoped config.
# Alternatively, use:
#   oc patch configs.imageregistry.operator.openshift.io/cluster \
#     --type=merge -p '<spec below>'
apiVersion: imageregistry.operator.openshift.io/v1
kind: Config
metadata:
  name: cluster
  labels:
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  nodeSelector:
    node-role.kubernetes.io/infra: ""
  tolerations:
    - key: node-role.kubernetes.io/infra
      effect: NoSchedule
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  replicas: 2
