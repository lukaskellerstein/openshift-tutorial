# MachineConfig for infra node kernel tuning
# Increases TCP backlog and connection limits for nodes handling
# high-traffic routing (ingress controller) workloads.
# WARNING: Applying this triggers a rolling reboot of infra nodes.
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 99-infra-kernel-tuning
  labels:
    machineconfiguration.openshift.io/role: infra
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  kernelArguments:
    - "net.core.somaxconn=32768"
    - "net.ipv4.tcp_max_syn_backlog=32768"
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /etc/sysctl.d/99-infra-tuning.conf
          mode: 0644
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
            # Decoded content:
            # # Infra node kernel tuning for high-traffic routing
            # net.core.somaxconn=32768
            # net.ipv4.tcp_max_syn_backlog=32768
            # net.core.netdev_max_backlog=5000
            # net.ipv4.tcp_fin_timeout=15
            # net.ipv4.tcp_keepalive_time=600
            # net.ipv4.tcp_keepalive_intvl=15
            # net.ipv4.tcp_keepalive_probes=5
