# Infrastructure MachineSet -- creates dedicated infra nodes
# IMPORTANT: Replace <cluster-id> and <zone> with your actual values.
# Extract your cluster ID with:
#   oc get -o jsonpath='{.status.infrastructureName}' infrastructure cluster
#
# This example uses AWS providerSpec. Adapt for your cloud provider.
apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: CLUSTER_ID-infra-ZONE
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: CLUSTER_ID
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  replicas: 3
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: CLUSTER_ID
      machine.openshift.io/cluster-api-machineset: CLUSTER_ID-infra-ZONE
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: CLUSTER_ID
        machine.openshift.io/cluster-api-machineset: CLUSTER_ID-infra-ZONE
        machine.openshift.io/cluster-api-machine-role: infra
        machine.openshift.io/cluster-api-machine-type: infra
    spec:
      metadata:
        labels:
          node-role.kubernetes.io/infra: ""
      taints:
        - key: node-role.kubernetes.io/infra
          effect: NoSchedule
      providerSpec:
        value:
          apiVersion: machine.openshift.io/v1beta1
          kind: AWSMachineProviderConfig
          ami:
            id: ami-REPLACE_ME
          instanceType: m5.2xlarge
          placement:
            availabilityZone: us-east-1a
            region: us-east-1
          subnet:
            filters:
              - name: tag:Name
                values:
                  - CLUSTER_ID-private-us-east-1a
          iamInstanceProfile:
            id: CLUSTER_ID-worker-profile
          securityGroups:
            - filters:
                - name: tag:Name
                  values:
                    - CLUSTER_ID-worker-sg
          blockDevices:
            - ebs:
                volumeSize: 120
                volumeType: gp3
                iops: 3000
                encrypted: true
          tags:
            - name: kubernetes.io/cluster/CLUSTER_ID
              value: owned
          userDataSecret:
            name: worker-user-data
          credentialsSecret:
            name: aws-cloud-credentials
