# ClusterAutoscaler -- cluster-wide autoscaling policy
# Defines maximum cluster size and scale-down behavior.
apiVersion: autoscaling.openshift.io/v1
kind: ClusterAutoscaler
metadata:
  name: default
  labels:
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  podPriorityThreshold: -10
  resourceLimits:
    maxNodesTotal: 24
    cores:
      min: 8
      max: 128
    memory:
      min: 16
      max: 512
  balanceSimilarNodeGroups: true
  ignoreDaemonsetsUtilization: false
  skipNodesWithLocalStorage: true
  scaleDown:
    enabled: true
    delayAfterAdd: 10m
    delayAfterDelete: 5m
    delayAfterFailure: 3m
    unneededTime: 10m
    utilizationThreshold: "0.5"
  logVerbosity: 4
