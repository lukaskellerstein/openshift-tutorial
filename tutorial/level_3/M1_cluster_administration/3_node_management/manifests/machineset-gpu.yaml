# GPU-capable MachineSet with dedicated taint
# Only workloads with a matching toleration will schedule on these nodes.
# IMPORTANT: Replace CLUSTER_ID and ZONE with your actual values.
# This example uses AWS p3.2xlarge instances (NVIDIA V100 GPU).
apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: CLUSTER_ID-gpu-ZONE
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: CLUSTER_ID
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: CLUSTER_ID
      machine.openshift.io/cluster-api-machineset: CLUSTER_ID-gpu-ZONE
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: CLUSTER_ID
        machine.openshift.io/cluster-api-machineset: CLUSTER_ID-gpu-ZONE
        machine.openshift.io/cluster-api-machine-role: gpu
        machine.openshift.io/cluster-api-machine-type: gpu
    spec:
      metadata:
        labels:
          node-role.kubernetes.io/gpu: ""
          nvidia.com/gpu.present: "true"
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      providerSpec:
        value:
          apiVersion: machine.openshift.io/v1beta1
          kind: AWSMachineProviderConfig
          ami:
            id: ami-REPLACE_ME
          instanceType: p3.2xlarge
          placement:
            availabilityZone: us-east-1a
            region: us-east-1
          subnet:
            filters:
              - name: tag:Name
                values:
                  - CLUSTER_ID-private-us-east-1a
          iamInstanceProfile:
            id: CLUSTER_ID-worker-profile
          securityGroups:
            - filters:
                - name: tag:Name
                  values:
                    - CLUSTER_ID-worker-sg
          blockDevices:
            - ebs:
                volumeSize: 200
                volumeType: gp3
                iops: 3000
                encrypted: true
          tags:
            - name: kubernetes.io/cluster/CLUSTER_ID
              value: owned
          userDataSecret:
            name: worker-user-data
          credentialsSecret:
            name: aws-cloud-credentials
