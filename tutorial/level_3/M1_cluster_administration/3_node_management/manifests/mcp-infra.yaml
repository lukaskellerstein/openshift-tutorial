# Infrastructure MachineConfigPool
# Groups infra-labeled nodes for separate configuration management.
# Infra nodes inherit worker MachineConfigs plus any infra-specific ones.
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  name: infra
  labels:
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  machineConfigSelector:
    matchExpressions:
      - key: machineconfiguration.openshift.io/role
        operator: In
        values:
          - worker
          - infra
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/infra: ""
  maxUnavailable: 1
