# MachineConfig adding a custom log rotation systemd timer to worker nodes
# Compresses and rotates /var/log/containers/ logs older than 7 days.
# WARNING: Applying this triggers a rolling reboot of worker nodes.
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 99-worker-custom-logrotate
  labels:
    machineconfiguration.openshift.io/role: worker
    app: node-management
    tutorial-level: "3"
    tutorial-module: "M1"
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /usr/local/bin/custom-logrotate.sh
          mode: 0755
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
            # Decoded content:
            # #!/bin/bash
            # # Custom log rotation for container logs
            # # Compresses logs older than 1 day, deletes logs older than 7 days
            #
            # LOG_DIR="/var/log/containers"
            #
            # # Compress logs older than 1 day
            # find "${LOG_DIR}" -name "*.log" -mtime +1 -exec gzip -q {} \; 2>/dev/null
            #
            # # Delete compressed logs older than 7 days
            # find "${LOG_DIR}" -name "*.gz" -mtime +7 -delete 2>/dev/null
            #
            # echo "$(date): Log rotation completed" >> /var/log/custom-logrotate.log
    systemd:
      units:
        - name: custom-logrotate.service
          enabled: false
          contents: |
            [Unit]
            Description=Custom container log rotation
            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/custom-logrotate.sh
        - name: custom-logrotate.timer
          enabled: true
          contents: |
            [Unit]
            Description=Run custom log rotation daily
            [Timer]
            OnCalendar=daily
            Persistent=true
            RandomizedDelaySec=3600
            [Install]
            WantedBy=timers.target
