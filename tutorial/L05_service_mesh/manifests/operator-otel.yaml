# Red Hat OpenTelemetry Operator — provides the OpenTelemetryCollector CR
# Used to bridge traces from Istio waypoint to Tempo with tenant authentication
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: opentelemetry-product
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: opentelemetry-product
  source: redhat-operators
  sourceNamespace: openshift-marketplace
