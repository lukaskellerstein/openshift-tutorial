# Kiali Operator — service mesh observability dashboard
# In OSSM 3.x, Kiali is installed independently (not bundled in the control plane)
# Kiali 2.x supports ambient mode: ztunnel/waypoint visualization, mesh state indicators
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kiali-ossm
  namespace: openshift-operators
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "05"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: kiali-ossm
  source: redhat-operators
  sourceNamespace: openshift-marketplace
