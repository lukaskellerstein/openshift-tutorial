# TempoMonolithic instance — distributed tracing backend
# Multitenancy (OpenShift mode) enables the Console Traces UI plugin
# and provides auth on ingest/query paths via the Tempo gateway
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: sample
  namespace: istio-system
spec:
  storage:
    traces:
      backend: memory
  jaegerui:
    enabled: true
    route:
      enabled: true
  multitenancy:
    enabled: true
    mode: openshift
    authentication:
      - tenantName: dev
        tenantId: 1610b0c3-c509-4592-a256-a1871353dbfa
