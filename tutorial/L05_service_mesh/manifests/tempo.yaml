# TempoMonolithic instance — distributed tracing backend
# Multitenancy (OpenShift mode) is required by the Console Traces UI plugin
# Jaeger UI route is disabled — not usable with multitenancy (gateway requires token auth)
# Use Console Traces (Observe > Traces) instead
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: sample
  namespace: istio-system
spec:
  storage:
    traces:
      backend: memory
  jaegerui:
    enabled: false
  multitenancy:
    enabled: true
    mode: openshift
    authentication:
      - tenantName: dev
        tenantId: 1610b0c3-c509-4592-a256-a1871353dbfa
