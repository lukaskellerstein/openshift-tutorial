{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "openshift-web-app.fullname" . }}
  labels:
    {{- include "openshift-web-app.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "openshift-web-app.fullname" . }}
    weight: 100
  port:
    targetPort: http
  {{- if .Values.route.tls }}
  tls:
    termination: {{ .Values.route.tls.termination | default "edge" }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
