# Default values for openshift-web-app
replicaCount: 2

image:
  repository: registry.access.redhat.com/ubi9/httpd-24
  tag: latest
  pullPolicy: IfNotPresent

# OpenShift Route configuration (preferred over Ingress)
route:
  enabled: true
  tls:
    termination: edge

# Kubernetes Ingress (disabled by default on OpenShift)
ingress:
  enabled: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# OpenShift-compatible security context
# No runAsUser (let OpenShift assign from the project range)
# No privileged or root requirements
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

labels:
  app: openshift-web-app
  tutorial-level: "2"
  tutorial-module: "M6"
