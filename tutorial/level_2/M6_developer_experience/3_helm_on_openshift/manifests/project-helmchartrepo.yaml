# ProjectHelmChartRepository — scoped to a single project (namespace)
# Use this instead of cluster-wide HelmChartRepository when you want
# project-level control over which charts are available
apiVersion: helm.openshift.io/v1beta1
kind: ProjectHelmChartRepository
metadata:
  name: team-charts
  labels:
    app: helm-demo
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  connectionConfig:
    url: https://charts.example.com/team-repo
  name: Team Charts
