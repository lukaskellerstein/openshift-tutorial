# HelmChartRepository — adds a custom Helm repo to the OpenShift console
# This makes charts visible in the Developer perspective under +Add > Helm Chart
apiVersion: helm.openshift.io/v1beta1
kind: HelmChartRepository
metadata:
  name: bitnami
  labels:
    app: helm-demo
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  connectionConfig:
    url: https://charts.bitnami.com/bitnami
  name: Bitnami Charts
