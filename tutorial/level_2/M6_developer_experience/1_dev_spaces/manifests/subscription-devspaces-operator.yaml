# OpenShift Dev Spaces Operator Subscription
# Installs the Dev Spaces operator from OperatorHub
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: devspaces
  namespace: openshift-operators
  labels:
    app: devspaces
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: devspaces
  source: redhat-operators
  sourceNamespace: openshift-marketplace
