# DevWorkspaceTemplate — a reusable, shared component set
# Teams can define standard tooling in a template and reference it from devfiles
apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspaceTemplate
metadata:
  name: team-standard-tools
  namespace: openshift-devspaces
  labels:
    app: devspaces
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  components:
    - name: team-tools
      container:
        image: registry.redhat.io/devspaces/udi-rhel8:latest
        memoryLimit: 2Gi
        cpuLimit: "1"
        memoryRequest: 512Mi
        cpuRequest: 250m
        env:
          - name: MAVEN_OPTS
            value: "-Xmx1g"
          - name: NODE_OPTIONS
            value: "--max-old-space-size=1024"
  commands:
    - id: lint
      exec:
        component: team-tools
        commandLine: echo "Run project-specific linter here"
        group:
          kind: build
          isDefault: false
