# Devfile for a Quarkus (Java) application workspace
# Demonstrates a multi-container workspace with a database sidecar
schemaVersion: 2.2.2
metadata:
  name: quarkus-sample
  version: 1.0.0
  displayName: Quarkus REST API with PostgreSQL
  description: Dev Spaces workspace for a Quarkus application with PostgreSQL database
  language: Java
  projectType: Quarkus
  tags:
    - Java
    - Quarkus
    - PostgreSQL
attributes:
  controller.devfile.io/storage-type: per-user
projects:
  - name: quarkus-quickstart
    git:
      remotes:
        origin: https://github.com/quarkusio/quarkus-quickstarts.git
      checkoutFrom:
        revision: main
      sparseCheckoutDirs:
        - getting-started
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 4Gi
      cpuLimit: "2"
      memoryRequest: 1Gi
      cpuRequest: 500m
      mountSources: true
      endpoints:
        - name: quarkus-dev
          targetPort: 8080
          exposure: public
          protocol: https
        - name: quarkus-debug
          targetPort: 5005
          exposure: internal
      env:
        - name: JAVA_OPTS_APPEND
          value: "-Dquarkus.http.host=0.0.0.0"
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: "jdbc:postgresql://localhost:5432/sampledb"
        - name: QUARKUS_DATASOURCE_USERNAME
          value: "developer"
        - name: QUARKUS_DATASOURCE_PASSWORD
          value: "developer"
      volumeMounts:
        - name: m2-cache
          path: /home/user/.m2
  - name: postgresql
    container:
      image: registry.redhat.io/rhel9/postgresql-15:latest
      memoryLimit: 512Mi
      cpuLimit: 500m
      memoryRequest: 128Mi
      cpuRequest: 100m
      endpoints:
        - name: postgresql
          targetPort: 5432
          exposure: internal
      env:
        - name: POSTGRESQL_USER
          value: developer
        - name: POSTGRESQL_PASSWORD
          value: developer
        - name: POSTGRESQL_DATABASE
          value: sampledb
      volumeMounts:
        - name: pgdata
          path: /var/lib/pgsql/data
  - name: m2-cache
    volume:
      size: 2Gi
  - name: pgdata
    volume:
      size: 1Gi
commands:
  - id: build
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}/getting-started
      commandLine: ./mvnw package -DskipTests
      group:
        kind: build
        isDefault: true
  - id: run-dev-mode
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}/getting-started
      commandLine: ./mvnw quarkus:dev -Dquarkus.http.host=0.0.0.0
      group:
        kind: run
        isDefault: true
  - id: debug
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}/getting-started
      commandLine: >-
        ./mvnw quarkus:dev -Dquarkus.http.host=0.0.0.0
        -Ddebug=5005 -Dsuspend=n
      group:
        kind: debug
        isDefault: true
  - id: test
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}/getting-started
      commandLine: ./mvnw test
      group:
        kind: test
        isDefault: true
