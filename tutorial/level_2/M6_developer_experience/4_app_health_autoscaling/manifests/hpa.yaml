# Horizontal Pod Autoscaler — scales probe-demo between 1 and 5 replicas
# based on CPU utilization. Uses autoscaling/v2 API with both CPU and memory targets.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: probe-demo-hpa
  labels:
    app: probe-demo
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: probe-demo
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
