# Deployment with all three probe types: startup, readiness, and liveness
# Uses Nginx on UBI9 — runs without root (compatible with restricted SCC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-demo
  labels:
    app: probe-demo
    tutorial-level: "2"
    tutorial-module: "M6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: probe-demo
  template:
    metadata:
      labels:
        app: probe-demo
        tutorial-level: "2"
        tutorial-module: "M6"
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-122:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Startup probe: gates liveness/readiness until the app is initialized.
          # Allows up to 60s for startup (30 attempts * 2s period).
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          # Readiness probe: removes the pod from Service endpoints when failing.
          # Checks every 5s; after 3 consecutive failures the pod stops receiving traffic.
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 3
          # Liveness probe: restarts the container if it becomes unresponsive.
          # Checks every 10s; after 3 consecutive failures the container is killed.
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 3
