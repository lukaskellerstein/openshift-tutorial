# Complete Devfile with both dev and deploy configurations
# This file is used in Step 9 of the lesson
schemaVersion: 2.2.2
metadata:
  name: odo-demo
  version: 1.0.0
  description: Demo Node.js application for odo lesson
  language: Node.js
  projectType: Node.js
  tags:
    - Node.js
    - tutorial
  displayName: odo Demo App
  provider: OpenShift Tutorial
starterProjects:
  - name: odo-demo
    git:
      remotes:
        origin: https://github.com/example/odo-demo.git

components:
  # Development container — used by odo dev
  - name: runtime
    container:
      image: registry.access.redhat.com/ubi9/nodejs-20:latest
      memoryLimit: 512Mi
      memoryRequest: 128Mi
      cpuLimit: "500m"
      cpuRequest: "100m"
      mountSources: true
      sourceMapping: /projects
      endpoints:
        - name: http-node
          targetPort: 3000
      env:
        - name: NODE_ENV
          value: development
        - name: DEBUG_PORT
          value: "9229"

  # Production image — used by odo deploy
  - name: image
    image:
      imageName: "{{CONTAINER_IMAGE}}"
      dockerfile:
        uri: Dockerfile
        buildContext: .

  # Kubernetes resources for production deployment
  - name: deploy
    kubernetes:
      uri: manifests/deployment.yaml

commands:
  # Development commands
  - id: install
    exec:
      component: runtime
      commandLine: npm install
      workingDir: /projects
      group:
        kind: build
        isDefault: true

  - id: run
    exec:
      component: runtime
      commandLine: npm run dev
      workingDir: /projects
      group:
        kind: run
        isDefault: true

  - id: debug
    exec:
      component: runtime
      commandLine: npm run dev -- --inspect=0.0.0.0:9229
      workingDir: /projects
      group:
        kind: debug
        isDefault: true

  # Deploy commands (outer loop)
  - id: build-image
    apply:
      component: image

  - id: deploy-k8s
    apply:
      component: deploy

  - id: deploy
    composite:
      commands:
        - build-image
        - deploy-k8s
      group:
        kind: deploy
        isDefault: true
