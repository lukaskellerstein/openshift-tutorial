# EgressIP — Assign a stable source IP for outbound traffic from a namespace
# External firewalls and audit logs see this fixed IP instead of rotating node IPs
# Requires OVN-Kubernetes CNI (default on OpenShift 4.x)
apiVersion: k8s.ovn.org/v1
kind: EgressIP
metadata:
  name: egress-demo-ip
  labels:
    app: egress-demo
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  # The stable egress IP address(es) to assign
  # These must be routable on the node's host subnet and not already in use
  egressIPs:
    - 192.168.126.100
  # Namespace selector — which namespaces get this egress IP
  namespaceSelector:
    matchLabels:
      egress-ip: "demo"
