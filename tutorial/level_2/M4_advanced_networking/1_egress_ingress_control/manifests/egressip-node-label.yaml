# Reference: label a node to host EgressIP addresses
# This is NOT a manifest you apply — it documents the node labeling command
#
# EgressIP addresses must live on a node that is labeled to host them.
# The OVN-Kubernetes CNI assigns the EgressIP to a labeled node automatically.
#
# To label a node:
#   oc label node <node-name> k8s.ovn.org/egress-assignable=""
#
# To verify:
#   oc get nodes -l k8s.ovn.org/egress-assignable
#
# In CRC (single-node), the single node must be labeled.
# In production, label multiple worker nodes for high availability —
# if one node goes down, the EgressIP fails over to another labeled node.
#
# Example:
#   oc label node worker-0.ocp.example.com k8s.ovn.org/egress-assignable=""
#   oc label node worker-1.ocp.example.com k8s.ovn.org/egress-assignable=""
