# LoadBalancer Service — MetalLB will assign an external IP from the pool
# Compare with a standard ClusterIP or NodePort Service:
# MetalLB makes LoadBalancer type work on bare-metal clusters
apiVersion: v1
kind: Service
metadata:
  name: demo-app-lb
  namespace: l2-m4-lb-demo
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M4"
  annotations:
    # Restrict to a specific IP pool (optional — uses any pool if omitted)
    metallb.universe.tf/address-pool: demo-pool
spec:
  type: LoadBalancer
  selector:
    app: demo-app
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
