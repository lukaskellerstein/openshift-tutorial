# External DNS Operator Subscription — installs from OperatorHub
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns-operator
  labels:
    app: external-dns
    tutorial-level: "2"
    tutorial-module: "M4"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: external-dns-operator
  namespace: external-dns-operator
  labels:
    app: external-dns
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  targetNamespaces:
    - external-dns-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: external-dns-operator
  namespace: external-dns-operator
  labels:
    app: external-dns
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  channel: stable-v1
  name: external-dns-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
