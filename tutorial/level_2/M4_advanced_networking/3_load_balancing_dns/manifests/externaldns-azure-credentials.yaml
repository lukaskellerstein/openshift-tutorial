# Azure DNS credentials for External DNS Operator
# Replace the values with your actual Azure service principal credentials
# In production, use Azure Managed Identity (Workload Identity) instead
#
# To create a service principal:
# az ad sp create-for-rbac --name external-dns-sp \
#   --role "DNS Zone Contributor" \
#   --scopes /subscriptions/<sub-id>/resourceGroups/<rg>/providers/Microsoft.Network/dnszones/<zone>
apiVersion: v1
kind: Secret
metadata:
  name: azure-dns-credentials
  namespace: external-dns-operator
  labels:
    app: external-dns
    tutorial-level: "2"
    tutorial-module: "M4"
type: Opaque
stringData:
  azure.json: |
    {
      "tenantId": "YOUR_TENANT_ID",
      "subscriptionId": "YOUR_SUBSCRIPTION_ID",
      "resourceGroup": "YOUR_DNS_RESOURCE_GROUP",
      "aadClientId": "YOUR_CLIENT_ID",
      "aadClientSecret": "YOUR_CLIENT_SECRET"
    }
