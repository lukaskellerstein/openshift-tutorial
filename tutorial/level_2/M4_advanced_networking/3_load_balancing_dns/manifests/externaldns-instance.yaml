# ExternalDNS instance — configures automatic DNS record management
# This example uses AWS Route 53; adjust the provider section for
# Azure DNS, Google Cloud DNS, Infoblox, or other supported providers
apiVersion: externaldns.olm.openshift.io/v1beta1
kind: ExternalDNS
metadata:
  name: demo-dns
  namespace: external-dns-operator
  labels:
    app: external-dns
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  provider:
    type: AWS
    aws:
      credentials:
        name: aws-dns-credentials
  zones:
    - Z1234567890EXAMPLE
  source:
    type: OpenShiftRoute
    openshiftRouteOptions:
      routerName: default
    labelFilter:
      matchLabels:
        tutorial-level: "2"
  domains:
    - filterType: Include
      matchType: Exact
      name: example.com
