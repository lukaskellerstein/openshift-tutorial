# Demo server — runs on Cluster-A and is exported for cross-cluster access.
# A simple nginx web server that returns the cluster name in responses.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  namespace: cross-cluster-demo
  labels:
    app: demo-server
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-server
  template:
    metadata:
      labels:
        app: demo-server
        tutorial-level: "2"
        tutorial-module: "M4"
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-122:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: html
              mountPath: /opt/app-root/src
      volumes:
        - name: html
          configMap:
            name: demo-server-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-server-html
  namespace: cross-cluster-demo
  labels:
    app: demo-server
    tutorial-level: "2"
    tutorial-module: "M4"
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
      <h1>Hello from Cluster-A!</h1>
      <p>This service is exported via Submariner ServiceExport.</p>
      <p>Hostname: HOSTNAME_PLACEHOLDER</p>
    </body>
    </html>
