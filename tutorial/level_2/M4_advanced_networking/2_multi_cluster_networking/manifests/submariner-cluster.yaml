# Submariner SubmarinerConfig — deployed on each managed cluster
# Configures the Submariner gateway and connection parameters.
apiVersion: submarineraddon.open-cluster-management.io/v1alpha1
kind: SubmarinerConfig
metadata:
  name: submariner
  namespace: managed-cluster-ns
  labels:
    app: submariner
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  gatewayConfig:
    gateways: 1
    aws:
      instanceType: m5.xlarge
  IPSecNATTPort: 4500
  NATTEnable: true
  cableDriver: libreswan
  credentialsSecret:
    name: managed-cluster-cloud-credentials
