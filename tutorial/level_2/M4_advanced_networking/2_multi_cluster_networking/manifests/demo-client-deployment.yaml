# Demo client — runs on Cluster-B and accesses the service exported from Cluster-A.
# Uses curl to reach the cross-cluster DNS name:
#   demo-server.cross-cluster-demo.svc.clusterset.local
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-client
  namespace: cross-cluster-demo
  labels:
    app: demo-client
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-client
  template:
    metadata:
      labels:
        app: demo-client
        tutorial-level: "2"
        tutorial-module: "M4"
    spec:
      containers:
        - name: curl
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - "while true; do sleep 30; done"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
