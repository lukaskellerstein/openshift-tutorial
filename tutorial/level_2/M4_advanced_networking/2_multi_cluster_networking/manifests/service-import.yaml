# ServiceImport — reference manifest showing what Submariner auto-creates
# on remote clusters. You do NOT need to create this manually; Submariner's
# lighthouse component handles it automatically.
#
# This file is provided for educational purposes to show the resource
# structure. The lighthouse agent on each remote cluster watches the broker
# and synthesizes ServiceImport resources.
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceImport
metadata:
  name: demo-server
  namespace: cross-cluster-demo
  labels:
    app: demo-server
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  type: ClusterSetIP
  ports:
    - port: 80
      protocol: TCP
