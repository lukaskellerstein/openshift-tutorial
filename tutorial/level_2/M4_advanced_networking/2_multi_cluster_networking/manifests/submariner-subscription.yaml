# Submariner Operator Subscription
# Installs the Submariner add-on from OperatorHub on the hub cluster (RHACM)
# or directly on managed clusters via the submariner-operator namespace.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: submariner
  namespace: submariner-operator
  labels:
    app: submariner
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  channel: stable-0.18
  installPlanApproval: Automatic
  name: submariner
  source: redhat-operators
  sourceNamespace: openshift-marketplace
