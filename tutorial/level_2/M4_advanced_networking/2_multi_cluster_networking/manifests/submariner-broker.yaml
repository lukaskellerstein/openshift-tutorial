# Submariner Broker — deployed on the hub/broker cluster
# The broker is the central rendezvous point for metadata exchange
# between participating clusters. It does NOT carry data traffic.
apiVersion: submariner.io/v1alpha1
kind: Broker
metadata:
  name: submariner-broker
  namespace: submariner-k8s-broker
  labels:
    app: submariner
    tutorial-level: "2"
    tutorial-module: "M4"
spec:
  globalnetEnabled: true
  globalnetCIDRRange: "242.0.0.0/8"
  defaultGlobalnetClusterSize: 65536
