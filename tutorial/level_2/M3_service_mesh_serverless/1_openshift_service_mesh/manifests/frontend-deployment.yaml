# Frontend service — calls the backend and returns combined response
# Demonstrates inter-service communication through the mesh with sidecar injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
    version: v1
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: v1
  template:
    metadata:
      labels:
        app: frontend
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: frontend
          image: registry.access.redhat.com/ubi9/python-311:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          command:
            - /bin/bash
            - -c
            - |
              cat > /tmp/app.py << 'PYEOF'
              from http.server import HTTPServer, BaseHTTPRequestHandler
              import json
              import urllib.request
              import os

              BACKEND_URL = os.environ.get("BACKEND_URL", "http://backend:8080")

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      try:
                          with urllib.request.urlopen(BACKEND_URL, timeout=5) as resp:
                              backend_data = json.loads(resp.read().decode())
                      except Exception as e:
                          backend_data = {"error": str(e)}

                      response = {
                          "source": "frontend",
                          "backend_response": backend_data
                      }

                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps(response).encode())

                  def log_message(self, format, *args):
                      pass  # Suppress request logging

              if __name__ == "__main__":
                  server = HTTPServer(("0.0.0.0", 8080), Handler)
                  print("Frontend listening on port 8080")
                  server.serve_forever()
              PYEOF
              exec python3 /tmp/app.py
          env:
            - name: BACKEND_URL
              value: "http://backend:8080"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
