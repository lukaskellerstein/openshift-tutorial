# VirtualService — controls how traffic is routed to backend subsets
# Initially routes 100% of traffic to v1
# Modify weights to implement canary or blue-green traffic splitting
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: backend
  labels:
    app: backend
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  hosts:
    - backend
  http:
    - route:
        - destination:
            host: backend
            subset: v1
          weight: 100
        - destination:
            host: backend
            subset: v2
          weight: 0
