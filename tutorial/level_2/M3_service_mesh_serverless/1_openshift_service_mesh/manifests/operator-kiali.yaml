# Kiali Operator — Service Mesh observability dashboard
# Required dependency for OpenShift Service Mesh
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kiali-ossm
  namespace: openshift-operators
  labels:
    app: service-mesh-tutorial
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: kiali-ossm
  source: redhat-operators
  sourceNamespace: openshift-marketplace
