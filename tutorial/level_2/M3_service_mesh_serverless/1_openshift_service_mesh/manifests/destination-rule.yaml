# DestinationRule — defines subsets (v1, v2) for the backend service
# Subsets map to pod labels, enabling traffic splitting via VirtualService
# Also configures mTLS for traffic to the backend
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: backend
  labels:
    app: backend
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  host: backend
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL  # Use mesh-provided certificates for mTLS
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
