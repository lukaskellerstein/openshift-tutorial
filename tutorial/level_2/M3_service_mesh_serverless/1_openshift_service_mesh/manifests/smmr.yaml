# ServiceMeshMemberRoll — enrolls namespaces into the service mesh
# Must be named "default" and live in the same namespace as the SMCP
# In upstream Istio, you'd label namespaces instead; here enrollment is explicit
apiVersion: maistra.io/v1
kind: ServiceMeshMemberRoll
metadata:
  name: default
  namespace: istio-system
  labels:
    app: service-mesh-tutorial
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  members:
    - mesh-demo
