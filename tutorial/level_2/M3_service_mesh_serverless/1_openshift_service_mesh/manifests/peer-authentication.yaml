# PeerAuthentication — enforces strict mTLS for all services in the namespace
# With STRICT mode, plaintext traffic between meshed services is rejected
# In upstream Istio this resource works the same way
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  labels:
    app: service-mesh-tutorial
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  mtls:
    mode: STRICT
