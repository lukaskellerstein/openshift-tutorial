apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: web-api
  namespace: serverless-tutorial
  labels:
    app: web-api
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  template:
    metadata:
      labels:
        app: web-api
        tutorial-level: "2"
        tutorial-module: "M3"
      annotations:
        autoscaling.knative.dev/target: "50"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/window: "30s"
        autoscaling.knative.dev/metric: "concurrency"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 30
      containers:
        - image: gcr.io/knative-samples/helloworld-go
          ports:
            - containerPort: 8080
          env:
            - name: TARGET
              value: "Production API"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
