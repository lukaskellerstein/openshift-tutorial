# Standard Kubernetes approach — Deployment + Service + Route + HPA
# Compare with production-ksvc.yaml for the Knative equivalent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api-traditional
  namespace: serverless-tutorial
  labels:
    app: web-api-traditional
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-api-traditional
  template:
    metadata:
      labels:
        app: web-api-traditional
        tutorial-level: "2"
        tutorial-module: "M3"
    spec:
      containers:
        - name: web-api
          image: gcr.io/knative-samples/helloworld-go
          ports:
            - containerPort: 8080
          env:
            - name: TARGET
              value: "Traditional Deployment"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-api-traditional
  namespace: serverless-tutorial
  labels:
    app: web-api-traditional
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  selector:
    app: web-api-traditional
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: web-api-traditional
  namespace: serverless-tutorial
  labels:
    app: web-api-traditional
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  to:
    kind: Service
    name: web-api-traditional
  port:
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-api-traditional
  namespace: serverless-tutorial
  labels:
    app: web-api-traditional
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-api-traditional
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
