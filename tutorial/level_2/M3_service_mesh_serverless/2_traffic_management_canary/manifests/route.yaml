# OpenShift Route to expose the Istio ingress gateway for this application.
# This bridges OpenShift's routing layer with Istio's Gateway.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: canary-demo
  labels:
    app: canary-demo
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  host: canary-demo.bookinfo-mesh.apps-crc.testing
  to:
    kind: Service
    name: istio-ingressgateway
    weight: 100
  port:
    targetPort: http2
  wildcardPolicy: None
