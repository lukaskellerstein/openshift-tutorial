# DestinationRule defines subsets (v1, v2) that map to pod labels.
# VirtualService routing rules reference these subset names.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: canary-demo
  labels:
    app: canary-demo
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  host: canary-demo.bookinfo-mesh.svc.cluster.local
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
