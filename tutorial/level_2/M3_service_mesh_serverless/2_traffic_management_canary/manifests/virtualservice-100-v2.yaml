# Canary Phase 3 (Promotion): 100% traffic to v2.
# The canary is now promoted to the stable version.
# After applying this, you can safely scale down or delete the v1 Deployment.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: canary-demo
  labels:
    app: canary-demo
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  hosts:
    - canary-demo.bookinfo-mesh.svc.cluster.local
    - "canary-demo.bookinfo-mesh.apps-crc.testing"
  gateways:
    - canary-demo-gateway
    - mesh
  http:
    - route:
        - destination:
            host: canary-demo.bookinfo-mesh.svc.cluster.local
            subset: v2
            port:
              number: 8080
          weight: 100
