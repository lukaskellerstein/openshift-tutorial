# VirtualService with retry and timeout policies for production resilience.
# This builds on the canary routing by adding fault tolerance.
#
# timeout: maximum time to wait for a response (prevents hung connections).
# retries: automatically retry failed requests (handles transient errors).
#
# WARNING: Be careful with retries on non-idempotent operations (POST, PUT).
# Retrying a payment or order creation could cause duplicates.
# Use retries primarily for GET requests or idempotent operations.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: canary-demo
  labels:
    app: canary-demo
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  hosts:
    - canary-demo.bookinfo-mesh.svc.cluster.local
    - "canary-demo.bookinfo-mesh.apps-crc.testing"
  gateways:
    - canary-demo-gateway
    - mesh
  http:
    - timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: canary-demo.bookinfo-mesh.svc.cluster.local
            subset: v2
            port:
              number: 8080
          weight: 100
