# Canary version (v2) of the canary demo application
# Same app, different version label -- used for traffic splitting
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-demo-v2
  labels:
    app: canary-demo
    version: v2
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary-demo
      version: v2
  template:
    metadata:
      labels:
        app: canary-demo
        version: v2
        tutorial-level: "2"
        tutorial-module: "M3"
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: canary-demo
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: APP_VERSION
              value: "v2"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          # Override the default httpd page to return version info
          command:
            - /bin/bash
            - -c
            - |
              echo '{"version":"v2","pod":"'$(hostname)'"}' > /var/www/html/version
              echo 'canary-demo v2 is running' > /var/www/html/index.html
              exec run-httpd
