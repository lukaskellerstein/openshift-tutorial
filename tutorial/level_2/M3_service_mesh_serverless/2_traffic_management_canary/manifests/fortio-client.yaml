# Fortio load testing client deployed inside the mesh.
# Used to generate concurrent traffic for testing circuit breakers.
# Fortio is a lightweight load testing tool from the Istio project.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio
  labels:
    app: fortio
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortio
  template:
    metadata:
      labels:
        app: fortio
        tutorial-level: "2"
        tutorial-module: "M3"
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: fortio
          image: docker.io/fortio/fortio:latest
          ports:
            - containerPort: 8080
              name: http-fortio
            - containerPort: 8079
              name: grpc-ping
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fortio
  labels:
    app: fortio
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  selector:
    app: fortio
  ports:
    - name: http
      port: 8080
      targetPort: 8080
