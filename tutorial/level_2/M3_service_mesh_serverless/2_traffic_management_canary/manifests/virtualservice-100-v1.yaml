# Baseline: 100% traffic to v1.
# Apply this first to establish a stable baseline before introducing the canary.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: canary-demo
  labels:
    app: canary-demo
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  hosts:
    - canary-demo.bookinfo-mesh.svc.cluster.local
    - "canary-demo.bookinfo-mesh.apps-crc.testing"
  gateways:
    - canary-demo-gateway
    - mesh
  http:
    - route:
        - destination:
            host: canary-demo.bookinfo-mesh.svc.cluster.local
            subset: v1
            port:
              number: 8080
          weight: 100
