# Canary Phase 1: 90% to v1, 10% to v2.
# The canary version receives a small slice of traffic for validation.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: canary-demo
  labels:
    app: canary-demo
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  hosts:
    - canary-demo.bookinfo-mesh.svc.cluster.local
    - "canary-demo.bookinfo-mesh.apps-crc.testing"
  gateways:
    - canary-demo-gateway
    - mesh
  http:
    - route:
        - destination:
            host: canary-demo.bookinfo-mesh.svc.cluster.local
            subset: v1
            port:
              number: 8080
          weight: 90
        - destination:
            host: canary-demo.bookinfo-mesh.svc.cluster.local
            subset: v2
            port:
              number: 8080
          weight: 10
