# Trigger with filter -- routes only events with type "com.example.critical"
# Demonstrates content-based routing using CloudEvents attributes
apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: critical-only
  labels:
    app: event-routing
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  broker: default
  filter:
    attributes:
      type: com.example.critical
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      kind: Service
      name: critical-logger
