# KafkaSource -- REFERENCE ONLY (requires a running Kafka cluster)
# Consumes messages from a Kafka topic and wraps them as CloudEvents
# Enable KnativeKafka in the knative-eventing namespace before using this
#
# To use with Strimzi-managed Kafka (see L2-M2.3):
#   1. Install the Strimzi operator and create a Kafka cluster
#   2. Create the "orders" topic
#   3. Enable KnativeKafka: create a KnativeKafka CR with source.enabled=true
#   4. Apply this manifest
apiVersion: sources.knative.dev/v1beta1
kind: KafkaSource
metadata:
  name: order-events
  labels:
    app: kafka-source
    tutorial-level: "2"
    tutorial-module: "M3"
spec:
  consumerGroup: knative-consumer-group
  bootstrapServers:
    - my-kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
  topics:
    - orders
  sink:
    ref:
      apiVersion: eventing.knative.dev/v1
      kind: Broker
      name: default
