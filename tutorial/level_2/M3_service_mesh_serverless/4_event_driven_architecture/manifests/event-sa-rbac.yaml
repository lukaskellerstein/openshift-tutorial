# ServiceAccount and RBAC for the ApiServerSource
# Grants read-only access to Pods and Events in the project
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-watcher
  labels:
    app: event-watcher
    tutorial-level: "2"
    tutorial-module: "M3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-watcher-role
  labels:
    app: event-watcher
    tutorial-level: "2"
    tutorial-module: "M3"
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-watcher-binding
  labels:
    app: event-watcher
    tutorial-level: "2"
    tutorial-module: "M3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: event-watcher-role
subjects:
  - kind: ServiceAccount
    name: event-watcher
