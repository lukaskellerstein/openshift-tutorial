# Test pod that runs as non-root with proper security context.
# This pod should pass both Gatekeeper constraints and SCC admission.
apiVersion: v1
kind: Pod
metadata:
  name: test-nonroot
  labels:
    app: gatekeeper-test
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: test-nonroot
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
