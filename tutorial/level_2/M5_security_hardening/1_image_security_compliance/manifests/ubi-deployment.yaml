# UBI-based deployment — demonstrates the recommended base image for OpenShift
# UBI images run as non-root by default and are compatible with the restricted SCC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubi-demo
  labels:
    app: ubi-demo
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubi-demo
  template:
    metadata:
      labels:
        app: ubi-demo
        tutorial-level: "2"
        tutorial-module: "M5"
    spec:
      containers:
        - name: ubi-demo
          image: registry.access.redhat.com/ubi9/ubi-minimal:9.4
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
