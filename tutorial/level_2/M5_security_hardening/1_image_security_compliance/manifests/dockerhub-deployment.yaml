# Docker Hub deployment — demonstrates why non-UBI images often fail on OpenShift
# This nginx image expects to run as root and bind to port 80,
# which violates the default restricted SCC
# Compare with ubi-deployment.yaml for the recommended approach
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dockerhub-demo
  labels:
    app: dockerhub-demo
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dockerhub-demo
  template:
    metadata:
      labels:
        app: dockerhub-demo
        tutorial-level: "2"
        tutorial-module: "M5"
    spec:
      containers:
        - name: nginx
          image: docker.io/library/nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
