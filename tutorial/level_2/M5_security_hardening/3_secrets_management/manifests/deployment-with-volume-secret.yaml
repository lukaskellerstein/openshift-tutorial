# Deployment that mounts secrets as files via a volume
# Volume-mounted secrets auto-update when the Secret changes (within kubelet sync period)
# This is the preferred approach for automatic rotation without pod restarts
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-volume-demo
  labels:
    app: secret-volume-demo
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-volume-demo
  template:
    metadata:
      labels:
        app: secret-volume-demo
        tutorial-level: "2"
        tutorial-module: "M5"
    spec:
      containers:
        - name: secret-volume-demo
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Secret files mounted at /etc/secrets:"
              ls -la /etc/secrets/
              echo "---"
              echo "Watching for secret changes..."
              while true; do
                echo "[$(date)] api-key=$(cat /etc/secrets/api-key 2>/dev/null || echo 'not found')"
                sleep 30
              done
          volumeMounts:
            - name: api-secrets
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: api-secrets
          secret:
            secretName: api-credentials
