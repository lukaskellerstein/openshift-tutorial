# SecretStore — connects ESO to a HashiCorp Vault backend
# Replace the server URL and auth details with your Vault instance
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: secrets-management-lab
  labels:
    app: secret-demo
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  provider:
    vault:
      server: "https://vault.example.com:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
