# SecretStore — connects ESO to AWS Secrets Manager
# Alternative to Vault for AWS-based deployments
# Requires an IAM role or access key with secretsmanager:GetSecretValue permission
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: secrets-management-lab
  labels:
    app: secret-demo
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
