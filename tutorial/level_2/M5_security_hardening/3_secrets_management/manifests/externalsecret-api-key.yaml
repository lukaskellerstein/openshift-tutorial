# ExternalSecret — pulls a secret from Vault and creates a K8s Secret
# The operator syncs the value on the configured refreshInterval
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-credentials
  namespace: secrets-management-lab
  labels:
    app: secret-demo
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: api-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app: secret-demo
          tutorial-level: "2"
          tutorial-module: "M5"
  data:
    - secretKey: api-key
      remoteRef:
        key: secret/data/myapp
        property: api-key
    - secretKey: api-secret
      remoteRef:
        key: secret/data/myapp
        property: api-secret
