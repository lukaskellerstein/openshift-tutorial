# Single ComplianceScan targeting the CIS OpenShift platform benchmark
# This scan evaluates platform-level controls (API server config, RBAC, etc.)
# It does NOT scan individual nodes --- use ComplianceSuite for comprehensive coverage
apiVersion: compliance.openshift.io/v1alpha1
kind: ComplianceScan
metadata:
  name: cis-platform-scan
  namespace: openshift-compliance
  labels:
    app: compliance-scanning
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  scanType: Platform
  profile: xccdf_org.ssgproject.content_profile_cis
  content: ssg-ocp4-ds.xml
  contentImage: registry.redhat.io/compliance/openscap-ocp-rhel8:stable
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
