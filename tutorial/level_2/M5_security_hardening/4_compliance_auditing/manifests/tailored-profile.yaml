# TailoredProfile that customizes the CIS benchmark
# Disables rules that may not apply in a CRC/development environment
# In production, tailor based on your organization's risk acceptance
apiVersion: compliance.openshift.io/v1alpha1
kind: TailoredProfile
metadata:
  name: cis-tailored
  namespace: openshift-compliance
  labels:
    app: compliance-scanning
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  title: CIS Tailored for Development
  description: >-
    CIS OpenShift benchmark with development environment exceptions.
    Disables checks that require infrastructure not present in CRC
    (e.g., external IdP, etcd encryption at rest).
  extends: ocp4-cis
  disableRules:
    # etcd encryption may not be configured in dev environments
    - name: ocp4-api-server-encryption-provider-config
      rationale: "Not applicable in CRC/development environments"
    # External identity providers are not configured in CRC
    - name: ocp4-idp-is-configured
      rationale: "CRC uses htpasswd by default, external IdP not required for dev"
    # FIPS mode is not enabled in CRC
    - name: ocp4-fips-mode-enabled-on-all-nodes
      rationale: "FIPS mode is not available in CRC installations"
