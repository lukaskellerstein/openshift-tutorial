# ComplianceSuite that runs CIS benchmarks across the entire cluster
# Includes both platform-level checks and node-level checks (master + worker)
# This is the recommended way to run a comprehensive CIS assessment
apiVersion: compliance.openshift.io/v1alpha1
kind: ComplianceSuite
metadata:
  name: cis-full-suite
  namespace: openshift-compliance
  labels:
    app: compliance-scanning
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  autoApplyRemediations: false
  schedule: ""
  scans:
    - name: cis-platform
      scanType: Platform
      profile: xccdf_org.ssgproject.content_profile_cis
      content: ssg-ocp4-ds.xml
      contentImage: registry.redhat.io/compliance/openscap-ocp-rhel8:stable
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    - name: cis-node-master
      scanType: Node
      profile: xccdf_org.ssgproject.content_profile_cis-node
      content: ssg-rhcos4-ds.xml
      contentImage: registry.redhat.io/compliance/openscap-ocp-rhel8:stable
      nodeSelector:
        node-role.kubernetes.io/master: ""
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    - name: cis-node-worker
      scanType: Node
      profile: xccdf_org.ssgproject.content_profile_cis-node
      content: ssg-rhcos4-ds.xml
      contentImage: registry.redhat.io/compliance/openscap-ocp-rhel8:stable
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
