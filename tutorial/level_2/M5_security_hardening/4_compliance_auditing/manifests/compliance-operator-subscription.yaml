# OperatorGroup and Subscription for the Compliance Operator
# This installs the operator from OperatorHub into the openshift-compliance namespace
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: compliance-operator
  namespace: openshift-compliance
  labels:
    app: compliance-operator
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  targetNamespaces:
    - openshift-compliance
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: compliance-operator
  namespace: openshift-compliance
  labels:
    app: compliance-operator
    tutorial-level: "2"
    tutorial-module: "M5"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: compliance-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
