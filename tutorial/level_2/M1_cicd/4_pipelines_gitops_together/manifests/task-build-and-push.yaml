# Tekton Task: Build a container image from source and push it
# to the OpenShift internal registry with a unique tag.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-and-push
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: image-name
      type: string
      description: Fully qualified image name (registry/namespace/name)
    - name: image-tag
      type: string
      description: Tag for the built image (typically a short commit SHA)
  workspaces:
    - name: source
      description: Workspace containing the application source code
  steps:
    - name: build-image
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        set -e
        echo "==> Building image $(params.image-name):$(params.image-tag)"

        # Use oc start-build to build inside the cluster
        cd $(workspaces.source.path)

        # Create a BuildConfig if it doesn't exist
        oc get buildconfig demo-app 2>/dev/null || \
          oc new-build --name=demo-app \
            --binary=true \
            --strategy=docker \
            --to="$(params.image-name):$(params.image-tag)"

        # Patch the output tag to match our desired tag
        oc patch buildconfig demo-app \
          -p "{\"spec\":{\"output\":{\"to\":{\"kind\":\"ImageStreamTag\",\"name\":\"demo-app:$(params.image-tag)\"}}}}" \
          --type=merge

        # Start the build from local source
        oc start-build demo-app \
          --from-dir=$(workspaces.source.path)/app \
          --follow --wait

        echo "==> Image built and pushed: $(params.image-name):$(params.image-tag)"
