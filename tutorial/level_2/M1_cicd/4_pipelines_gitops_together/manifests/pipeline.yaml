# Tekton Pipeline: The complete CI/CD flow.
# 1. Clone source code
# 2. Run tests
# 3. Build container image and push to registry
# 4. Update the GitOps repo with the new image tag
# 5. ArgoCD detects the Git change and syncs to the cluster (external)
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ci-cd-pipeline
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: source-repo-url
      type: string
      description: URL of the application source repository
    - name: source-repo-branch
      type: string
      description: Branch of the source repository
      default: main
    - name: gitops-repo-url
      type: string
      description: URL of the GitOps repository
    - name: gitops-repo-branch
      type: string
      description: Branch of the GitOps repository
      default: main
    - name: image-name
      type: string
      description: Fully qualified image name (registry/namespace/name)
    - name: manifest-path
      type: string
      description: Path to the deployment manifest in the GitOps repo
      default: deployment.yaml
  workspaces:
    - name: shared-workspace
      description: Workspace shared between tasks for source code
    - name: gitops-workspace
      description: Workspace for the GitOps repository operations
  tasks:
    # Step 1: Clone the source code repository
    - name: clone-source
      taskRef:
        name: git-clone
        kind: ClusterTask
      params:
        - name: url
          value: $(params.source-repo-url)
        - name: revision
          value: $(params.source-repo-branch)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 2: Run application tests
    - name: run-tests
      runAfter:
        - clone-source
      taskRef:
        name: run-tests
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 3: Generate a unique image tag from the commit SHA
    - name: generate-tag
      runAfter:
        - clone-source
      taskRef:
        name: generate-image-tag
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 4: Build the container image and push to the registry
    - name: build-image
      runAfter:
        - run-tests
        - generate-tag
      taskRef:
        name: build-and-push
      params:
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(tasks.generate-tag.results.image-tag)
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 5: Update the GitOps repo with the new image tag
    - name: update-gitops
      runAfter:
        - build-image
      taskRef:
        name: update-gitops-repo
      params:
        - name: gitops-repo-url
          value: $(params.gitops-repo-url)
        - name: gitops-repo-branch
          value: $(params.gitops-repo-branch)
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(tasks.generate-tag.results.image-tag)
        - name: manifest-path
          value: $(params.manifest-path)
      workspaces:
        - name: gitops-workspace
          workspace: gitops-workspace
