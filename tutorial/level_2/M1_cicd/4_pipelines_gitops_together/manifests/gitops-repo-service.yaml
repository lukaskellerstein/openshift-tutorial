# GitOps repo manifest — Service for the demo app.
# Lives in the GitOps repository alongside the Deployment.
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  selector:
    app: demo-app
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
