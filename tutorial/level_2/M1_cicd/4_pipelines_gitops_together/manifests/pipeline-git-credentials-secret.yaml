# Secret for authenticating to the GitOps repository.
# The pipeline needs write access to push manifest changes.
# Replace the values with your actual Git credentials before applying.
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M1"
  annotations:
    tekton.dev/git-0: https://github.com
type: kubernetes.io/basic-auth
stringData:
  username: <your-git-username>
  password: <your-git-token>
