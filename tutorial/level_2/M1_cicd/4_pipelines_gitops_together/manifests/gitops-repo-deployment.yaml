# GitOps repo manifest — this file represents what lives in your
# GitOps Git repository. ArgoCD watches this file and syncs changes
# to the cluster automatically.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        tutorial-level: "2"
        tutorial-module: "M1"
    spec:
      containers:
        - name: demo-app
          image: image-registry.openshift-image-registry.svc:5000/pipelines-gitops-demo/demo-app:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
