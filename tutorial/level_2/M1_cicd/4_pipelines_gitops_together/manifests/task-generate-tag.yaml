# Tekton Task: Generate a unique image tag from the Git commit SHA.
# Using the commit SHA as the image tag ensures traceability between
# the source code commit and the running container image.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: generate-image-tag
  labels:
    app: demo-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  workspaces:
    - name: source
      description: Workspace containing the cloned source repo
  results:
    - name: image-tag
      description: Short commit SHA to use as the image tag
  steps:
    - name: get-commit-sha
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e
        cd $(workspaces.source.path)
        COMMIT_SHA=$(git rev-parse --short HEAD)
        echo -n "${COMMIT_SHA}" | tee $(results.image-tag.path)
        echo ""
        echo "==> Image tag will be: ${COMMIT_SHA}"
