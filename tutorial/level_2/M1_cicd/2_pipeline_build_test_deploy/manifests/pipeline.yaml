# Pipeline: End-to-end build, test, and deploy workflow
# Connects clone -> build -> test -> deploy-staging -> deploy-production
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-test-deploy
  labels:
    app: pipeline-demo
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  description: >-
    End-to-end CI/CD pipeline that clones source code, builds a container
    image with Buildah, runs tests, deploys to staging, and promotes to
    production. Uses a shared workspace for data passing between Tasks.
  params:
    - name: git-url
      type: string
      description: Git repository URL
    - name: git-revision
      type: string
      description: Git branch, tag, or commit SHA
      default: main
    - name: app-name
      type: string
      description: Application name used for image and deployment
      default: pipeline-demo-app
    - name: staging-namespace
      type: string
      description: Namespace for the staging deployment
    - name: production-namespace
      type: string
      description: Namespace for the production deployment
  workspaces:
    - name: shared-workspace
      description: >-
        Shared workspace backed by a PVC. Used to pass source code
        and build artifacts between Tasks.
  tasks:
    # Stage 1: Clone the source code
    - name: clone
      taskRef:
        name: git-clone-source
      params:
        - name: repo-url
          value: "$(params.git-url)"
        - name: revision
          value: "$(params.git-revision)"
      workspaces:
        - name: source
          workspace: shared-workspace

    # Stage 2: Build the container image
    - name: build
      taskRef:
        name: build-image
      runAfter:
        - clone
      params:
        - name: image-name
          value: >-
            image-registry.openshift-image-registry.svc:5000/$(params.staging-namespace)/$(params.app-name):$(tasks.clone.results.commit-sha)
        - name: dockerfile-path
          value: Dockerfile
      workspaces:
        - name: source
          workspace: shared-workspace

    # Stage 3: Run tests
    - name: test
      taskRef:
        name: run-tests
      runAfter:
        - clone
      params:
        - name: test-command
          value: "npm test"
      workspaces:
        - name: source
          workspace: shared-workspace

    # Stage 4: Deploy to staging (requires build + test to pass)
    - name: deploy-staging
      taskRef:
        name: deploy-app
      runAfter:
        - build
        - test
      params:
        - name: app-name
          value: "$(params.app-name)"
        - name: image-name
          value: >-
            image-registry.openshift-image-registry.svc:5000/$(params.staging-namespace)/$(params.app-name):$(tasks.clone.results.commit-sha)
        - name: target-namespace
          value: "$(params.staging-namespace)"
      workspaces:
        - name: source
          workspace: shared-workspace

    # Stage 5: Promote to production
    - name: deploy-production
      taskRef:
        name: deploy-app
      runAfter:
        - deploy-staging
      params:
        - name: app-name
          value: "$(params.app-name)"
        - name: image-name
          value: >-
            image-registry.openshift-image-registry.svc:5000/$(params.staging-namespace)/$(params.app-name):$(tasks.clone.results.commit-sha)
        - name: target-namespace
          value: "$(params.production-namespace)"
      workspaces:
        - name: source
          workspace: shared-workspace
