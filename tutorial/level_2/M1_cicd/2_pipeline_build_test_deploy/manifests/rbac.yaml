# RBAC: Grant the pipeline ServiceAccount permissions to deploy
# across staging and production namespaces
---
# Allow the pipeline SA in the CI project to manage resources in staging
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-deploy-staging
  namespace: cicd-staging
  labels:
    app: pipeline-demo
    tutorial-level: "2"
    tutorial-module: "M1"
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: cicd-pipelines
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# Allow the pipeline SA in the CI project to manage resources in production
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-deploy-production
  namespace: cicd-production
  labels:
    app: pipeline-demo
    tutorial-level: "2"
    tutorial-module: "M1"
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: cicd-pipelines
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# Allow the pipeline SA to pull images from the staging registry
# (needed when promoting to production)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-puller
  namespace: cicd-staging
  labels:
    app: pipeline-demo
    tutorial-level: "2"
    tutorial-module: "M1"
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: cicd-production
roleRef:
  kind: ClusterRole
  name: system:image-puller
  apiGroup: rbac.authorization.k8s.io
