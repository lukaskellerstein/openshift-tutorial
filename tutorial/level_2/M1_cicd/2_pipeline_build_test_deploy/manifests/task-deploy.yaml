# Task: Deploy the built image to a target environment
# Updates the Deployment in the target namespace with the new image
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-app
  labels:
    app: pipeline-demo
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  description: >-
    Deploys the application to a target environment by updating the
    Deployment's container image. Creates the Deployment, Service, and
    Route if they do not already exist.
  params:
    - name: app-name
      type: string
      description: Name of the application to deploy
    - name: image-name
      type: string
      description: Fully qualified image name to deploy
    - name: target-namespace
      type: string
      description: Target namespace (project) for deployment
  workspaces:
    - name: source
      description: Workspace containing the deployment manifests
  steps:
    - name: deploy
      image: registry.redhat.io/openshift4/ose-cli:latest
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        APP="$(params.app-name)"
        IMAGE="$(params.image-name)"
        NS="$(params.target-namespace)"

        echo "Deploying ${APP} to namespace ${NS}..."
        echo "Image: ${IMAGE}"

        # Check if the deployment already exists
        if oc get deployment "${APP}" -n "${NS}" 2>/dev/null; then
          echo "Deployment exists --- updating image..."
          oc set image deployment/"${APP}" \
            "${APP}=${IMAGE}" -n "${NS}"
        else
          echo "Creating new deployment..."
          oc create deployment "${APP}" \
            --image="${IMAGE}" -n "${NS}"
        fi

        # Ensure a Service exists
        if ! oc get svc "${APP}" -n "${NS}" 2>/dev/null; then
          echo "Creating Service..."
          oc expose deployment/"${APP}" \
            --port=8080 --target-port=8080 -n "${NS}"
        fi

        # Ensure a Route exists
        if ! oc get route "${APP}" -n "${NS}" 2>/dev/null; then
          echo "Creating Route..."
          oc expose svc/"${APP}" -n "${NS}"
        fi

        echo "Waiting for rollout to complete..."
        oc rollout status deployment/"${APP}" \
          -n "${NS}" --timeout=120s

        echo ""
        ROUTE_URL=$(oc get route "${APP}" -n "${NS}" \
          -o jsonpath='{.spec.host}')
        echo "Deployment complete. Application URL: http://${ROUTE_URL}"
