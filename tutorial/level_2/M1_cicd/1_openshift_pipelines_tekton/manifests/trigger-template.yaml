# TriggerTemplate — creates a PipelineRun when triggered
# Receives params from the TriggerBinding and stamps out a PipelineRun
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: github-push-template
  labels:
    app: tekton-tutorial
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: repo-url
      description: The Git repository URL from the webhook
    - name: revision
      description: The Git commit SHA
    - name: commit-message
      description: The commit message
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: webhook-triggered-run-
        labels:
          app: tekton-tutorial
          tutorial-level: "2"
          tutorial-module: "M1"
          tekton.dev/pipeline: clone-and-build
          trigger-type: github-push
      spec:
        pipelineRef:
          name: clone-and-build
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: revision
            value: $(tt.params.revision)
          - name: image-name
            value: image-registry.openshift-image-registry.svc:5000/pipelines-tutorial/nodejs-ex
          - name: image-tag
            value: $(tt.params.revision)
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
