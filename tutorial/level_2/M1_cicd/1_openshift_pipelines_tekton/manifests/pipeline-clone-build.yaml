# Tekton Pipeline — clone a repo and build an image
# Demonstrates Pipeline structure, task references, and workspace passing
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: clone-and-build
  labels:
    app: tekton-tutorial
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: repo-url
      type: string
      description: The Git repository URL
    - name: revision
      type: string
      default: main
      description: The Git branch or tag
    - name: image-name
      type: string
      description: The target image name (fully qualified)
    - name: image-tag
      type: string
      default: latest
      description: The target image tag
  workspaces:
    - name: shared-workspace
      description: Workspace shared between clone and build tasks
  tasks:
    - name: fetch-source
      taskRef:
        name: clone-and-list
      params:
        - name: repo-url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-image
      taskRef:
        name: build-image
      runAfter:
        - fetch-source
      params:
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: source
          workspace: shared-workspace

  results:
    - name: image-digest
      description: The digest of the built image
      value: $(tasks.build-image.results.image-digest)
    - name: image-url
      description: The URL of the built image
      value: $(tasks.build-image.results.image-url)
