# Route — exposes the EventListener service externally
# This URL is what you configure as the GitHub webhook endpoint
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: github-webhook
  labels:
    app: tekton-tutorial
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  to:
    kind: Service
    name: el-github-push-listener
  port:
    targetPort: http-listener
  tls:
    termination: edge
