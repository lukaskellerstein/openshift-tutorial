# Simple Tekton Task — demonstrates Task structure
# A Task defines a series of steps that run sequentially in a pod
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: greeting
  labels:
    app: tekton-tutorial
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: message
      type: string
      default: "Hello from Tekton!"
      description: The greeting message to display
  steps:
    - name: greet
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      script: |
        #!/usr/bin/env bash
        echo "========================================="
        echo "$(params.message)"
        echo "Task executed at: $(date)"
        echo "Running on node: $(hostname)"
        echo "========================================="
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
