# TriggerBinding — extracts fields from a GitHub webhook payload
# Maps incoming JSON fields to Tekton parameter names
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  labels:
    app: tekton-tutorial
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: repo-url
      value: $(body.repository.clone_url)
    - name: revision
      value: $(body.head_commit.id)
    - name: commit-message
      value: $(body.head_commit.message)
