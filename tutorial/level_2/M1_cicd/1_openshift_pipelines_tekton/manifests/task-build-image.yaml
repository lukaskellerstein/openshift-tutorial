# Tekton Task — build a container image using Buildah
# Uses Buildah (not Docker) since OpenShift uses Podman/Buildah
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
  labels:
    app: tekton-tutorial
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  params:
    - name: image-name
      type: string
      description: The fully qualified image name (e.g., image-registry.openshift-image-registry.svc:5000/my-project/my-app)
    - name: image-tag
      type: string
      default: latest
      description: The image tag
    - name: dockerfile
      type: string
      default: Dockerfile
      description: Path to the Dockerfile relative to the workspace
  workspaces:
    - name: source
      description: Workspace containing the source code and Dockerfile
  results:
    - name: image-digest
      description: The digest of the built image
    - name: image-url
      description: The full URL of the built image
  steps:
    - name: build
      image: registry.redhat.io/rhel8/buildah:latest
      securityContext:
        capabilities:
          add:
            - SETFCAP
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        IMAGE="$(params.image-name):$(params.image-tag)"
        echo "Building image: ${IMAGE}"

        cd $(workspaces.source.path)/repo

        buildah bud \
          --storage-driver=vfs \
          --no-cache \
          -f $(params.dockerfile) \
          -t "${IMAGE}" \
          .

        echo "Pushing image to registry..."
        buildah push \
          --storage-driver=vfs \
          --digestfile /tmp/image-digest \
          "${IMAGE}" \
          "docker://${IMAGE}"

        DIGEST=$(cat /tmp/image-digest)
        echo -n "${DIGEST}" | tee $(results.image-digest.path)
        echo -n "${IMAGE}" | tee $(results.image-url.path)
        echo ""
        echo "Build complete. Image: ${IMAGE}@${DIGEST}"
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      volumeMounts:
        - name: varlibcontainers
          mountPath: /var/lib/containers
  volumes:
    - name: varlibcontainers
      emptyDir: {}
