# ArgoCD Application — Manual Sync Policy
# Deploys a sample app from a Git repo; requires manual sync to apply changes
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-manual
  namespace: openshift-gitops
  labels:
    app: sample-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  project: default
  source:
    repoURL: https://github.com/redhat-developer/openshift-gitops-getting-started.git
    targetRevision: main
    path: app
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-demo
  syncPolicy: {}
