# Grant the ArgoCD controller permission to manage resources in gitops-demo namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-admin
  namespace: gitops-demo
  labels:
    app: openshift-gitops
    tutorial-level: "2"
    tutorial-module: "M1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
