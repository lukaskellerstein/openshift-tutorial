# ArgoCD App-of-Apps — Root application that manages other Applications
# This pattern allows ArgoCD to self-manage all your Application definitions
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: openshift-gitops
  labels:
    app: app-of-apps
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/gitops-repo.git
    targetRevision: main
    path: argocd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
