# Sample application Deployment — what ArgoCD manages in Git
# This is an example of a manifest stored in your GitOps repo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-sample-app
  labels:
    app: gitops-sample-app
    tutorial-level: "2"
    tutorial-module: "M1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-sample-app
  template:
    metadata:
      labels:
        app: gitops-sample-app
    spec:
      containers:
        - name: app
          image: quay.io/redhatworkshops/gitops-sample-app:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
