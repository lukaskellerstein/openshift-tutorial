# WebApp CustomResourceDefinition
# This is what `make install` generates from the Go types and kubebuilder markers.
# Included here for reference — in practice, use `make install` to apply it.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: webapps.tutorial.openshift.io
  labels:
    app: webapp-operator
    tutorial-level: "2"
    tutorial-module: "M2"
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: tutorial.openshift.io
  names:
    kind: WebApp
    listKind: WebAppList
    plural: webapps
    singular: webapp
    shortNames:
      - wa
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Available
          type: integer
          jsonPath: .status.availableReplicas
        - name: URL
          type: string
          jsonPath: .status.routeURL
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: WebApp is the Schema for the webapps API
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Container image for the web application
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 10
                  default: 1
                  description: Number of desired pod replicas
                port:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 65535
                  default: 8080
                  description: Container port the application listens on
                routeEnabled:
                  type: boolean
                  default: true
                  description: Whether to create an OpenShift Route
                resources:
                  type: object
                  description: CPU and memory requests/limits
                  properties:
                    cpuRequest:
                      type: string
                    cpuLimit:
                      type: string
                    memoryRequest:
                      type: string
                    memoryLimit:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - type
                      - status
                      - lastTransitionTime
                availableReplicas:
                  type: integer
                  format: int32
                routeURL:
                  type: string
