# WebApp CR without an external Route — accessible only within the cluster
apiVersion: tutorial.openshift.io/v1alpha1
kind: WebApp
metadata:
  name: internal-web
  labels:
    app: internal-web
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  image: quay.io/redhattraining/hello-world-nginx:latest
  replicas: 1
  port: 8080
  routeEnabled: false
  resources:
    cpuRequest: "50m"
    cpuLimit: "250m"
    memoryRequest: "32Mi"
    memoryLimit: "64Mi"
