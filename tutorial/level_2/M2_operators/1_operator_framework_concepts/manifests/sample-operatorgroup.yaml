# Sample OperatorGroup -- reference manifest for understanding OLM structure.
# An OperatorGroup defines the set of namespaces an operator can watch.
#
# Three scoping modes:
#   1. All namespaces (omit spec.targetNamespaces) -- operator watches entire cluster
#   2. Specific namespaces (list in spec.targetNamespaces) -- operator watches listed namespaces
#   3. Own namespace (set spec.targetNamespaces to the operator's namespace) -- single-namespace mode
#
# Do NOT apply this manifest -- it is a reference example.
# See L2-M2.2 for hands-on operator installation.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: my-operator-group
  namespace: my-operators
  labels:
    app: my-operator-group
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  targetNamespaces:
    - my-operators
