# Sample Subscription -- reference manifest for understanding OLM structure.
# A Subscription tells OLM to install an operator from a CatalogSource
# and track a specific update channel for future upgrades.
#
# Do NOT apply this manifest -- it references a placeholder operator.
# See L2-M2.2 for hands-on operator installation.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: my-operator
  namespace: openshift-operators
  labels:
    app: my-operator
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  channel: stable
  name: my-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Manual
