# Sample CatalogSource -- reference manifest for understanding OLM structure.
# A CatalogSource points OLM to a repository (index image) of operator bundles.
# You would use a custom CatalogSource when distributing your own operators
# or mirroring operators in a disconnected environment.
#
# Do NOT apply this manifest -- it references an example image that does not exist.
# See L2-M2.2 for hands-on operator installation.
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: my-operator-catalog
  namespace: openshift-marketplace
  labels:
    app: my-operator-catalog
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  sourceType: grpc
  image: quay.io/example/my-operator-index:v1.0.0
  displayName: My Operator Catalog
  publisher: My Organization
  updateStrategy:
    registryPoll:
      interval: 30m
