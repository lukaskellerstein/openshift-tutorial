# Simple test application that connects to the operator-managed PostgreSQL
# Uses the Secret auto-generated by the CrunchyData operator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-test-app
  labels:
    app: pg-test-app
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg-test-app
  template:
    metadata:
      labels:
        app: pg-test-app
        tutorial-level: "2"
        tutorial-module: "M2"
    spec:
      containers:
        - name: psql-client
          image: registry.redhat.io/rhel9/postgresql-15:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "PostgreSQL client pod ready."
              echo "Connection info loaded from operator-generated secret."
              echo "Host: $PGHOST"
              echo "Port: $PGPORT"
              echo "Database: $PGDATABASE"
              echo "User: $PGUSER"
              sleep infinity
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: hippo-pguser-appuser
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: hippo-pguser-appuser
                  key: port
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: hippo-pguser-appuser
                  key: dbname
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: hippo-pguser-appuser
                  key: user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: hippo-pguser-appuser
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
