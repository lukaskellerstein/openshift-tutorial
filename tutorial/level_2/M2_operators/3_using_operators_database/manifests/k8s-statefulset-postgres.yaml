# Kubernetes StatefulSet — the manual K8s approach to deploying PostgreSQL
# Compare with crunchy-postgrescluster.yaml for the operator-managed OpenShift equivalent
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app: postgres
    tutorial-level: "2"
    tutorial-module: "M2"
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: S3cur3P@ssw0rd
  POSTGRES_DB: appdb
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  clusterIP: None
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tutorial-level: "2"
        tutorial-module: "M2"
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
              name: postgresql
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/pgsql/data
          livenessProbe:
            exec:
              command:
                - /usr/libexec/check-container
                - --live
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /usr/libexec/check-container
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
          tutorial-level: "2"
          tutorial-module: "M2"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
