# Subscription with Automatic approval — convenient for dev/test
# OLM will auto-approve InstallPlans, meaning the operator
# installs and upgrades without manual intervention
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: etcd
  namespace: etcd-auto-demo
  labels:
    app: etcd-auto-demo
    tutorial-level: "2"
    tutorial-module: "M2"
spec:
  channel: singlenamespace-alpha
  name: etcd
  source: community-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
