# BuildConfig using Docker strategy for the Products Service
# Compare with products-buildconfig-s2i.yaml for the S2I equivalent
# This uses the existing Dockerfile — same approach as building locally
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: products-service-docker
  labels:
    app: shopinsights
    component: products-service
    tutorial: personalized
    lesson: "04"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/<your-username>/openshift-tutorial.git
    contextDir: tutorial_personalized/shared_app/products-service
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: products-service:latest
  triggers:
    - type: ConfigChange
