apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: analytics-service-v2
  labels:
    app: shopinsights
    component: analytics-service
    tutorial: personalized
    lesson: "02"
spec:
  source:
    type: Git
    git:
      uri: https://github.com/<your-username>/openshift-tutorial.git
    contextDir: tutorial/shared_app/analytics-service-v2
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: analytics-service-v2:latest
  triggers:
    - type: ConfigChange
