# ServiceMeshControlPlane — defines the Istio control plane configuration
# This replaces istioctl install profiles in upstream Istio
# The operator reconciles this resource and deploys Istiod, Kiali, Jaeger, Grafana
apiVersion: maistra.io/v2
kind: ServiceMeshControlPlane
metadata:
  name: basic
  namespace: istio-system
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "03"
spec:
  version: v2.5
  tracing:
    type: Jaeger
    sampling: 10000  # 100% sampling for demo purposes (use 100-1000 in production)
  addons:
    jaeger:
      name: jaeger-small
      install:
        storage:
          type: Memory  # Use Memory for CRC/demo; use Elasticsearch for production
    kiali:
      enabled: true
      name: kiali
    grafana:
      enabled: true
  proxy:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  runtime:
    defaults:
      container:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  security:
    dataPlane:
      mtls: true  # Enable mTLS between sidecars by default
  gateways:
    ingress:
      service:
        type: ClusterIP  # Use ClusterIP for CRC; use LoadBalancer for cloud
    egress:
      enabled: true
