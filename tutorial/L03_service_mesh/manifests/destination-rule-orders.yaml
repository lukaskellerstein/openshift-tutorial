# DestinationRule with circuit breaker and outlier detection for orders-service
#
# connectionPool: limits concurrent connections and pending requests
#   to prevent cascading failures when orders-service is overloaded.
# outlierDetection: ejects unhealthy pods from the load balancing pool
#   based on consecutive errors, giving them time to recover.
#
# This protects analytics-service from being blocked by a slow/failing
# orders-service — requests fail fast with 503 instead of hanging.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: orders-service
  namespace: shopinsights
  labels:
    app: shopinsights
    component: orders-service
    tutorial: personalized
    lesson: "03"
spec:
  host: orders-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 10
        http2MaxRequests: 50
        maxRequestsPerConnection: 5
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
      minHealthPercent: 0
