apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: ""
namespace: shopinsights-dev

commonLabels:
  environment: dev

resources:
  - ../../base

patches:
  # Dev: 1 replica per service (same as base, explicit for clarity)
  - target:
      kind: Deployment
      name: products-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: orders-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: analytics-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: dashboard-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Dev-specific ConfigMap values
  - path: config-patch.yaml
    target:
      kind: ConfigMap
      name: shopinsights-config
