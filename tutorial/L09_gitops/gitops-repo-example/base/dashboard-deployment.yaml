apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
  labels:
    app: shopinsights
    component: dashboard-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopinsights
      component: dashboard-ui
  template:
    metadata:
      labels:
        app: shopinsights
        component: dashboard-ui
    spec:
      containers:
        - name: dashboard-ui
          image: ghcr.io/<your-username>/shopinsights-dashboard:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
