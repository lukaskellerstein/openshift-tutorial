apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  labels:
    app: shopinsights
    component: orders-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopinsights
      component: orders-service
  template:
    metadata:
      labels:
        app: shopinsights
        component: orders-service
    spec:
      containers:
        - name: orders-service
          image: ghcr.io/lukaskellerstein/shopinsights-orders:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: shopinsights-config
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
