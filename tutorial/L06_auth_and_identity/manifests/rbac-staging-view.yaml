# RoleBinding: grant dev-user the "view" ClusterRole on shopinsights-staging
# The "view" role allows read-only access — the user can see Deployments,
# Services, Pods, logs, etc. but cannot create, modify, or delete anything
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-view
  namespace: shopinsights-staging
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "06"
subjects:
  - kind: User
    name: dev-user
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
