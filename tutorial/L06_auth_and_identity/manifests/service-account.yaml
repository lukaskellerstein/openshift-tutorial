# ServiceAccount and limited Role for the analytics-service workload
# The analytics-service needs to read ConfigMaps and Secrets for configuration
# and list pods for service discovery, but should not have broader permissions
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-service
  namespace: shopinsights-dev
  labels:
    app: shopinsights
    component: analytics-service
    tutorial: personalized
    lesson: "06"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: analytics-service-role
  namespace: shopinsights-dev
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "06"
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: analytics-service-binding
  namespace: shopinsights-dev
  labels:
    app: shopinsights
    tutorial: personalized
    lesson: "06"
subjects:
  - kind: ServiceAccount
    name: analytics-service
    namespace: shopinsights-dev
roleRef:
  kind: Role
  name: analytics-service-role
  apiGroup: rbac.authorization.k8s.io
