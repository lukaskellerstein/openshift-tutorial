# OAuth cluster configuration — adds HTPasswd identity provider
# This is a cluster-scoped resource (only one exists, named "cluster")
# Applying this configures the OpenShift OAuth server to authenticate
# users against the HTPasswd file stored in the htpasswd-secret Secret
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - name: shopinsights-htpasswd
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          name: htpasswd-secret
